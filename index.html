// ================================================================
// MATCH MIXMAX ↔ GMAIL (historische tracking naar Gmail-mails mergen)
// ================================================================
// Probleem: Gmail-sync importeert mails met gmail_id maar zonder tracking.
// Mixmax-sync importeert dezelfde mails met mixmax_id + opens/clicks.
// Oplossing: match op ontvanger + onderwerp + datum (±1 dag) en merge tracking
// naar de Gmail-entry. De losse Mixmax-entry wordt vervolgens verwijderd om
// dubbele weergave te voorkomen.
function _normOnderwerp(s) {
  return String(s||'')
    .toLowerCase()
    .replace(/^(re|fwd|fw|aw):\s*/i, '')
    .replace(/\s+/g, ' ')
    .trim();
}
function _firstEmailAddr(s) {
  const m = String(s||'').toLowerCase().match(/[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/i);
  return m ? m[0] : '';
}
function _overlapRecipient(a, b) {
  const as = String(a||'').toLowerCase();
  const bs = String(b||'').toLowerCase();
  if (!as || !bs) return false;
  const aAddr = _firstEmailAddr(as);
  const bAddr = _firstEmailAddr(bs);
  if (aAddr && bAddr && aAddr === bAddr) return true;
  return as.includes(bs) || bs.includes(as);
}
function _datumMs(em) {
  const d = em.iso_datum || em.datum;
  if (!d) return 0;
  const t = new Date(d).getTime();
  return isNaN(t) ? 0 : t;
}

function matchMixmaxMetGmail() {
  if (!Array.isArray(DB.emailHistory)) return { merged: 0, removed: 0 };
  const ONE_DAY = 24 * 60 * 60 * 1000;

  const gmailMails = DB.emailHistory.filter(e => e.gmail_id && !e.mixmax_id);
  const mixmaxMails = DB.emailHistory.filter(e => e.mixmax_id && !e.gmail_id);
  if (gmailMails.length === 0 || mixmaxMails.length === 0) return { merged: 0, removed: 0 };

  const verwijderIds = new Set(); // mixmax_ids die we gaan verwijderen
  let merged = 0;

  for (const g of gmailMails) {
    if (g.richting !== 'uitgaand') continue; // tracking alleen op uitgaande
    const gOnd = _normOnderwerp(g.onderwerp);
    const gTs = _datumMs(g);
    if (!gOnd || !gTs) continue;

    // Kandidaten: zelfde ontvanger + zelfde genormaliseerd onderwerp + datum ±1 dag
    const kandidaat = mixmaxMails.find(m => {
      if (verwijderIds.has(m.mixmax_id)) return false;
      if (_normOnderwerp(m.onderwerp) !== gOnd) return false;
      if (!_overlapRecipient(g.to, m.to)) return false;
      const mTs = _datumMs(m);
      if (!mTs) return false;
      return Math.abs(gTs - mTs) <= ONE_DAY;
    });
    if (!kandidaat) continue;

    // Merge tracking-velden naar Gmail-entry
    if ((parseInt(kandidaat.mixmax_opens)||0) > (parseInt(g.mixmax_opens)||0)) g.mixmax_opens = parseInt(kandidaat.mixmax_opens)||0;
    if ((parseInt(kandidaat.mixmax_clicks)||0) > (parseInt(g.mixmax_clicks)||0)) g.mixmax_clicks = parseInt(kandidaat.mixmax_clicks)||0;
    if (kandidaat.mixmax_replied) g.mixmax_replied = true;
    if ((parseInt(kandidaat.mixmax_downloads)||0) > (parseInt(g.mixmax_downloads)||0)) g.mixmax_downloads = parseInt(kandidaat.mixmax_downloads)||0;
    g.mixmax_id = kandidaat.mixmax_id;
    g._merged_from_mixmax = true;
    verwijderIds.add(kandidaat.mixmax_id);
    merged++;
  }

  // Verwijder de losse Mixmax-entries die nu gemerged zijn
  let removed = 0;
  if (verwijderIds.size > 0) {
    const voor = DB.emailHistory.length;
    DB.emailHistory = DB.emailHistory.filter(e => !(e.mixmax_id && !e.gmail_id && verwijderIds.has(e.mixmax_id)));
    removed = voor - DB.emailHistory.length;
    try { DB.save(); } catch(e) { console.warn('DB.save fout na merge:', e); }
  }

  console.log('[Mixmax↔Gmail merge] gemerged:', merged, 'verwijderd:', removed);
  return { merged, removed };
}

// ================================================================
// AUTO-DETECTIE OFFERTE VERSTUURD (via Gmail emailHistory)
// ================================================================
// Herkenningspatroon: uitgaande mail met PDF-bijlage én onderwerp bevat "offerte"
// of werknummer-patroon (OSnn-nn-nnn). Per lead gematcht op e-mailadres in 'to'.
// Dedup via gmail_id → elke mail wordt maar 1x geregistreerd in offerte_versturingen.
// Popup (showEersteOffertePopup) triggert alleen voor nieuwe offertes die jonger zijn
// dan 2 uur — bij inhaal van historische mails geen popup-spam.
const _OFFERTE_ONDERWERP_RE = /offerte|OS\d{2}-\d{2}-\d{3}/i;
const _OFFERTE_POPUP_MAX_AGE_MS = 2 * 60 * 60 * 1000;

function _mailIsOfferte(em) {
  if (!em) return false;
  if (em.richting !== 'uitgaand') return false;
  if (em.has_pdf !== true) return false;
  const ond = String(em.onderwerp || '');
  return _OFFERTE_ONDERWERP_RE.test(ond);
}

function _mailToMatchesLeadEmail(em, leadEmail) {
  if (!leadEmail) return false;
  const needle = String(leadEmail).toLowerCase().trim();
  if (!needle) return false;
  const to = String(em.to || '').toLowerCase();
  return to.indexOf(needle) !== -1;
}

function _datumUitMail(em) {
  // Geef ISO-datum (YYYY-MM-DD) terug uit iso_datum of datum-string
  if (em.iso_datum) {
    try { return new Date(em.iso_datum).toISOString().slice(0,10); } catch(e) {}
  }
  if (em.datum) {
    try { return new Date(em.datum).toISOString().slice(0,10); } catch(e) {}
  }
  return new Date().toISOString().slice(0,10);
}

async function detecteerOfferteVersturingen() {
  if (!DB || !Array.isArray(DB.leads) || !Array.isArray(DB.emailHistory)) return;
  let nieuweDetecties = 0;
  let popupKandidaat = null; // { leadId, mail } voor 1e popup (nieuwste < 2u)
  const nu = Date.now();
  const gewijzigdeLeads = new Set();

  for (const lead of DB.leads) {
    if (!lead || !lead.email) continue;
    const leadEmail = String(lead.email).toLowerCase().trim();
    if (!leadEmail) continue;

    // Verzamel offerte-mails voor deze lead
    const offerteMails = DB.emailHistory
      .filter(em => _mailIsOfferte(em) && _mailToMatchesLeadEmail(em, leadEmail))
      .sort((a, b) => {
        const da = new Date(a.iso_datum || a.datum || 0).getTime();
        const db = new Date(b.iso_datum || b.datum || 0).getTime();
        return da - db; // ascending (oudste eerst)
      });

    if (offerteMails.length === 0) continue;

    if (!Array.isArray(lead.offerte_versturingen)) lead.offerte_versturingen = [];
    const alGeregistreerdeIds = new Set(
      lead.offerte_versturingen
        .map(v => v && v.auto_gmail_id)
        .filter(Boolean)
    );

    const voorDetectieAantal = lead.offerte_versturingen.length;

    for (const em of offerteMails) {
      const gid = em.gmail_id || '';
      if (gid && alGeregistreerdeIds.has(gid)) continue;

      // Zonder gmail_id: dedup via datum + onderwerp
      if (!gid) {
        const md = _datumUitMail(em);
        const bestaat = lead.offerte_versturingen.some(v =>
          v && !v.auto_gmail_id && v.datum === md && v.notitie && v.notitie.indexOf('[auto] ') === 0
        );
        if (bestaat) continue;
      }

      const maildatum = _datumUitMail(em);
      const notitie = '[auto] ' + (em.onderwerp || 'Offerte verstuurd') + ' — gedetecteerd via Gmail-sync';
      lead.offerte_versturingen.push({
        datum: maildatum,
        notitie: notitie,
        auto_gmail_id: gid || null,
        auto_detected: true
      });
      if (gid) alGeregistreerdeIds.add(gid);
      gewijzigdeLeads.add(lead);
      nieuweDetecties++;

      // Popup-kandidaat: alleen als mail <2u oud EN dit wordt de 1e offerte ooit voor de lead
      if (voorDetectieAantal === 0) {
        const mailTs = new Date(em.iso_datum || em.datum || 0).getTime();
        if (mailTs && (nu - mailTs) < _OFFERTE_POPUP_MAX_AGE_MS) {
          if (!popupKandidaat) popupKandidaat = { leadId: lead.id };
        }
      }
    }

    // offerte_verzend_datum bijwerken met laatste (nieuwste) verzending
    if (lead.offerte_versturingen.length > 0) {
      const laatste = lead.offerte_versturingen
        .slice()
        .sort((a,b) => new Date(b.datum) - new Date(a.datum))[0];
      if (laatste && laatste.datum) {
        lead.offerte_verzend_datum = laatste.datum;
      }
    }
  }

  if (nieuweDetecties > 0) {
    try { await DB.save(); } catch(e) { console.warn('[Offerte-detectie] save-fout', e); }
    // Persisteer naar Supabase: de nieuwe versturingen naar hun tabel en de lead
    // (voor offerte_verzend_datum). Anders wist de eerstvolgende sync ze weer.
    try {
      if (window.sbHelpers) {
        for (const l of gewijzigdeLeads) {
          if (window.sbHelpers.syncOfferteVersturingen) await window.sbHelpers.syncOfferteVersturingen(l);
          if (window.sbHelpers.upsertLead) await window.sbHelpers.upsertLead(l);
        }
      }
    } catch(e) { console.warn('[Offerte-detectie] Supabase-persist fout:', e); }
    console.log('[Offerte-detectie] ' + nieuweDetecties + ' nieuwe verzending(en) geregistreerd');
    try { if (typeof renderPage === 'function') renderPage(); } catch(e) {}
    if (popupKandidaat && typeof showEersteOffertePopup === 'function') {
      try { showEersteOffertePopup(popupKandidaat.leadId); } catch(e) { console.warn(e); }
    }
  }
}

// ================================================================
// AUTO-DETECTIE 'EERSTE OFFERTE VERSTUURD' MAIL ACTIVITEIT (22 mei 2026)
// ================================================================
// Doel: in de klantkaart automatisch tonen wanneer de eerste offerte is verstuurd.
// Match-criteria:
//   - uitgaande mail (richting === 'uitgaand')
//   - onderwerp exact in OFFERTE_MAIL_ONDERWERPEN (case-insensitive, getrimd)
//   - to-veld bevat lead.email
// Bewust GEEN PDF-eis: Mixmax-mails hebben geen has_pdf-veld.
// Handmatig aangevinkte items worden NIET overschreven (gedaan===true → skip).
// Pakt altijd de OUDSTE matchende mail = de eerste offerte-verzending.
// ================================================================
const OFFERTE_MAIL_ONDERWERPEN = [
  'opgave optistaal loods',
  'opgave loods optistaal'
];

function _onderwerpIsOfferteMail(ond) {
  if (!ond) return false;
  return OFFERTE_MAIL_ONDERWERPEN.indexOf(String(ond).trim().toLowerCase()) !== -1;
}

async function detecteerEersteOffertePerMailActiviteit() {
  if (!DB || !Array.isArray(DB.leads) || !Array.isArray(DB.emailHistory)) return 0;
  let nieuweDetecties = 0;
  const gewijzigdeLeads = [];

  for (const lead of DB.leads) {
    if (!lead || !lead.email) continue;
    const leadEmail = String(lead.email).toLowerCase().trim();
    // Strikte validatie: moet '@' bevatten en minimaal 5 tekens lang zijn.
    // Voorkomt false positives bij corrupte data (bv. email='0', 'Bijzitter').
    if (!leadEmail || leadEmail.indexOf('@') === -1 || leadEmail.length < 5) continue;

    // Skip als al aangevinkt (handmatig of eerder auto)
    const huidig = lead.mail_activiteiten && lead.mail_activiteiten.eerste_offerte;
    if (huidig && huidig.gedaan === true) continue;

    // Zoek oudste uitgaande offerte-mail naar deze lead
    let oudsteMail = null;
    let oudsteTs = Infinity;
    for (const em of DB.emailHistory) {
      if (em.richting !== 'uitgaand') continue;
      if (!_onderwerpIsOfferteMail(em.onderwerp)) continue;
      if (String(em.to || '').toLowerCase().indexOf(leadEmail) === -1) continue;
      const ts = new Date(em.iso_datum || em.datum || 0).getTime();
      if (isNaN(ts) || ts <= 0) continue;
      if (ts < oudsteTs) { oudsteTs = ts; oudsteMail = em; }
    }
    if (!oudsteMail) continue;

    let datum = '';
    try { datum = new Date(oudsteTs).toISOString().slice(0, 10); } catch (e) {}
    if (!datum) continue;

    if (!lead.mail_activiteiten) lead.mail_activiteiten = {};
    lead.mail_activiteiten.eerste_offerte = {
      gedaan: true,
      datum: datum,
      notitie: '[auto-detectie] ' + (oudsteMail.onderwerp || 'Opgave-mail'),
      auto_detected: true
    };
    lead.laatst_gewijzigd = new Date().toISOString();
    gewijzigdeLeads.push(lead);
    nieuweDetecties++;
  }

  if (nieuweDetecties > 0) {
    try { await DB.save(); } catch (e) { console.warn('[Eerste-offerte-detectie] save-fout:', e); }
    // Persisteer naar Supabase, anders wist de eerstvolgende sync het vinkje weer.
    try {
      if (window.sbHelpers && window.sbHelpers.upsertLead) {
        for (const l of gewijzigdeLeads) await window.sbHelpers.upsertLead(l);
      }
    } catch (e) { console.warn('[Eerste-offerte-detectie] Supabase-persist fout:', e); }
    console.log('[Eerste-offerte-detectie] ' + nieuweDetecties + ' lead(s) bijgewerkt');
    try { if (typeof renderPage === 'function') renderPage(); } catch (e) {}
  }
  return nieuweDetecties;
}

// Wanneer tab weer zichtbaar wordt: meteen een stille sync draaien
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    maybeSilentGmailSync(120);

  }
});

// ================================================================
// SETTINGS MIGRATIE v24 — voegt nieuwe statussen + jij-vorm blokken toe aan opgeslagen data
// ================================================================
function _migreerSettingsV24() {
  let changed = false;

  // 1. Nieuwe statussen toevoegen als ze nog niet bestaan
  const nieuweStatussen = [
    { id: 'opvolgmail_1_verstuurd', label: 'Opvolgmail 1 verstuurd', kleur: '#3498DB', categorie: 'neutraal' },
    { id: 'opvolgmail_2_verstuurd', label: 'Opvolgmail 2 verstuurd', kleur: '#2980B9', categorie: 'neutraal' },
    { id: 'opvolging_lauw',         label: 'Opvolging lauw',          kleur: '#95A5A6', categorie: 'koud' },
    { id: 'afsluitmail_verstuurd',  label: 'Afsluitmail verstuurd',   kleur: '#8B6F47', categorie: 'koud' },
    { id: 'geen_contact_opnemen',   label: 'Geen contact opnemen',    kleur: '#BDC3C7', categorie: 'koud' },
  ];
  if (!DB.settings.statussen) DB.settings.statussen = [];
  nieuweStatussen.forEach(function(ns) {
    if (!DB.settings.statussen.find(function(s) { return s.id === ns.id; })) {
      DB.settings.statussen.push(ns);
      changed = true;
    }
  });

  // 2. Mailbeheer blokken updaten van u-vorm naar jij-vorm
  const uNaarJij = {
    'Zoals u wellicht heeft gezien, heb ik u een offerte toegestuurd.': 'Zoals je wellicht hebt gezien, heb ik je een offerte toegestuurd.',
    'Uw offerte is nog in behandeling; ik heb nog een vraag voor u.': 'Je offerte is nog in behandeling; ik heb nog een vraag voor je.',
    'Ik heb eerder al geprobeerd u te bereiken.': 'Ik heb eerder al geprobeerd je te bereiken.',
    'Het is al even geleden dat ik contact met u zocht.': 'Het is al even geleden dat ik contact met je zocht.',
    'Helaas kreeg ik u niet te spreken.': 'Helaas kreeg ik je niet te spreken.',
    'Ik bereikte uw voicemail maar heb geen bericht achtergelaten.': 'Ik bereikte je voicemail maar heb geen bericht achtergelaten.',
    'Ik heb een bericht ingesproken op uw voicemail.': 'Ik heb een bericht ingesproken op je voicemail.',
    'Zou u mij terug kunnen bellen?': 'Zou je mij terug kunnen bellen?',
    'U kunt ook per mail reageren op dit bericht.': 'Je kunt ook per mail reageren op dit bericht.',
    'Ik zal binnenkort nogmaals proberen u te bereiken.': 'Ik zal binnenkort nogmaals proberen je te bereiken.',
    'Ik wacht uw reactie af.': 'Ik wacht je reactie af.',
  };
  if (DB.settings.mailbeheer && DB.settings.mailbeheer.blokken) {
    DB.settings.mailbeheer.blokken.forEach(function(blok) {
      (blok.opties || []).forEach(function(optie) {
        if (uNaarJij[optie.tekst]) {
          optie.tekst = uNaarJij[optie.tekst];
          changed = true;
        }
      });
    });
  }

  // 3. Mailbeheer onderwerp updaten
  if (DB.settings.mailbeheer && DB.settings.mailbeheer.onderwerp === 'Betreft uw aanvraag bij Optistaal') {
    DB.settings.mailbeheer.onderwerp = 'Betreft je aanvraag bij Optistaal';
    changed = true;
  }

  // 4. Privénummer verwijderen uit ondertekening (als het er nog in zit)
  if (DB.settings.mailbeheer && DB.settings.mailbeheer.ondertekening &&
      DB.settings.mailbeheer.ondertekening.includes('06-13141312')) {
    DB.settings.mailbeheer.ondertekening =
      DB.settings.mailbeheer.ondertekening.replace(/\n?06-13141312/g, '');
    changed = true;
  }

  if (changed) {
    localStorage.setItem('optistaal_crm_settings', JSON.stringify(DB.settings));
    console.log('v24 migratie: settings bijgewerkt (statussen + jij-vorm)');
  }
}

// INIT
// ================================================================
(async () => {
  await DB.load();
  _migreerSettingsV24();
  migreerBestaandeLeads();
  migreerMerkatoDatums();
  initSyncData();
  checkAfsluitMailTimers();
  checkStatusMailOpvolgingen();
  checkAutoVerloren();
  checkFollowupMails();

  // Check URL parameter voor directe lead-opening
  const urlParams = new URLSearchParams(window.location.search);
  const leadParam = urlParams.get('lead');
  if (leadParam) {
    const lead = DB.leads.find(l => l.id === leadParam);
    if (lead) {
      currentLeadId = leadParam;
      currentPage = 'lead-detail';
      renderSidebar();
      renderLeadDetail();
    } else {
      // V23.1 — Lead in URL maar niet in DB.leads gevonden. Vroeger viel deze
      // stilletjes door naar Dashboard (verwarrend: gebruiker zag iets anders dan
      // verwacht). Nu: duidelijke melding + leads-overzicht zodat het wel
      // navigeerbaar is.
      renderSidebar();
      currentPage = 'leads';
      renderLeads();
      setTimeout(() => {
        toast('Lead "' + leadParam + '" niet gevonden in cloud — mogelijk alleen lokaal aanwezig. Klik in OptiDesk op "Sync naar CRM" om opnieuw te syncen.', 'warning');
      }, 300);
    }
  } else {
    renderSidebar();
    renderDashboard();
  }

  scheduleBackupCheck();

  // Auto-sync Gmail inbox (stille sync, geen foutmeldingen)
  setTimeout(() => maybeSilentGmailSync(0), 3000);
  startGmailAutoSync();

  // Auto-sync intakes (Supabase intake_submissions → CRM leads)
  setTimeout(() => maybeSilentIntakeSync(0), 4500);
  startIntakeAutoSync();

  // Auto-sync Mixmax (messages + livefeed) — alleen als API key ingesteld is
  setTimeout(() => maybeSilentMixmaxSync(0), 6000);
  startMixmaxAutoSync();

  // Auto-pull Linda-updates — elke 5 min in de achtergrond, plus directe pull bij init
  setTimeout(() => maybeSilentLindaPull(0), 8000);
  startLindaAutoSync();

  // Eenmalige historische scan op offertes (voor mails die al in DB.emailHistory staan)
  setTimeout(() => {
    try { detecteerOfferteVersturingen(); } catch(e) { console.warn('Init offerte-detectie fout:', e); }
    try { detecteerEersteOffertePerMailActiviteit(); } catch(e) { console.warn('Init eerste-offerte mail-activiteit detectie fout:', e); }
  }, 7500);
})();
