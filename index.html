<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptiCRM</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap');

:root {
  --smeedijzer: #0B1218;
  --staalgrijs: #141E28;
  --petrol: #2A4A5E;
  --staalblauw: #3D5A80;
  --hemelblauw: #98C1D9;
  --roest: #B5541E;
  --koper: #D47A3A;
  --leer: #8B6F47;
  --beton: #8B8B83;
  --steen: #B8B2A6;
  --kalk: #E5DDD0;
  --papier: #F5F2EC;
  --wit: #FFFFFF;
  --success: #2D8659;
  --warning: #D4A017;
  --danger: #C0392B;
  --sidebar-w: 220px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', -apple-system, sans-serif;
  background: var(--papier);
  color: var(--staalgrijs);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* ========== SIDEBAR ========== */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: linear-gradient(180deg, var(--staalgrijs) 0%, var(--smeedijzer) 100%);
  color: var(--kalk);
  display: flex;
  flex-direction: column;
  height: 100vh;
  z-index: 10;
}
.sidebar-brand { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sidebar-brand h1 { font-size: 16px; font-weight: 700; color: var(--koper); letter-spacing: 1px; }
.sidebar-brand small { font-size: 10px; color: var(--beton); letter-spacing: 0.5px; }
.sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  cursor: pointer; font-size: 13px; font-weight: 500; color: var(--steen);
  transition: all 0.15s; border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.05); color: var(--kalk); }
.nav-item.active { background: rgba(61,90,128,0.2); color: var(--hemelblauw); border-left-color: var(--koper); }
.nav-item .icon { font-size: 16px; width: 22px; text-align: center; }
.nav-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 8px 16px; }
/* Gekleurde hoofdtabs (menu-restyling 10 jun 2026, versie 2 'kleurblokken') */
.nav-item.nav-color { border-radius: 9px; margin: 2px 8px; padding: 10px 12px; border-left: none; color: #fff; }
.nav-item.nav-color:hover { filter: brightness(1.12); color: #fff; }
.nav-item.nav-color.active { outline: 2px solid rgba(255,255,255,0.85); outline-offset: -2px; color: #fff; }
.nav-c-koper { background: var(--koper); }
.nav-c-roest { background: var(--roest); }
.nav-c-staalblauw { background: var(--staalblauw); }
.nav-c-groen { background: #4A7A5E; }
.nav-c-leer { background: var(--leer, #8B6F47); }
.nav-item.nav-color .badge-soft { margin-left: auto; font-size: 10px; color: #fff; opacity: 0.85; }
/* Dropdown-groepen (Archief / Settings) */
.nav-group-header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--steen); transition: all 0.15s; user-select: none; }
.nav-group-header:hover { background: rgba(255,255,255,0.05); color: var(--kalk); }
.nav-group-header .chev { margin-left: auto; font-size: 10px; color: var(--beton); transition: transform 0.2s; }
.nav-group-header.open .chev { transform: rotate(90deg); }
.nav-sub-item { display: flex; align-items: center; gap: 9px; padding: 8px 16px 8px 38px; cursor: pointer; font-size: 12px; color: var(--beton); transition: all 0.12s; border-left: 3px solid transparent; }
.nav-sub-item:hover { background: rgba(255,255,255,0.05); color: var(--kalk); }
.nav-sub-item.active { background: rgba(61,90,128,0.2); color: var(--hemelblauw); border-left-color: var(--koper); }
.nav-sub-item .icon { font-size: 13px; width: 18px; text-align: center; }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: var(--beton); }
.user-badge { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; background: rgba(255,255,255,0.04); }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--petrol); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--hemelblauw); }

/* ========== MAIN AREA ========== */
.main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: var(--wit); border-bottom: 1px solid var(--kalk); min-height: 56px; }
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-left h2 { font-size: 18px; font-weight: 700; color: var(--staalgrijs); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.content { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* ========== BUTTONS ========== */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; border: none; transition: all 0.15s; }
.btn-primary { background: var(--roest); color: var(--wit); }
.btn-primary:hover { background: var(--koper); }
.btn-secondary { background: var(--petrol); color: var(--wit); }
.btn-secondary:hover { background: var(--staalblauw); }
.btn-outline { background: transparent; color: var(--staalgrijs); border: 1px solid var(--steen); }
.btn-outline:hover { background: var(--kalk); }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-danger { background: var(--danger); color: var(--wit); }
.btn-success { background: var(--success); color: var(--wit); }

/* ========== CARDS ========== */
.card { background: var(--wit); border-radius: 8px; border: 1px solid var(--kalk); overflow: hidden; }
.card-header { padding: 14px 18px; border-bottom: 1px solid var(--kalk); display: flex; align-items: center; justify-content: space-between; }
.card-header h3 { font-size: 14px; font-weight: 700; }
.card-body { padding: 18px; }

/* ========== STATS ========== */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
.stat-card { background: var(--wit); border-radius: 8px; border: 1px solid var(--kalk); padding: 16px 18px; }
.stat-card .label { font-size: 11px; font-weight: 600; color: var(--beton); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .value { font-size: 28px; font-weight: 800; color: var(--staalgrijs); margin-top: 4px; }
.stat-card .sub { font-size: 11px; color: var(--beton); margin-top: 2px; }

/* ========== TABLE ========== */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table thead th {
  background: var(--staalgrijs); color: var(--kalk); font-weight: 600; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 8px; text-align: left;
  white-space: nowrap; cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 2;
}
.data-table thead th:hover { background: var(--petrol); }
.data-table thead th .sort-arrow { margin-left: 4px; opacity: 0.4; }
.data-table thead th.sorted .sort-arrow { opacity: 1; color: var(--koper); }
.data-table tbody tr { border-bottom: 1px solid var(--kalk); transition: background 0.1s; cursor: pointer; }
.data-table tbody tr:nth-child(even) { background: rgba(181,84,30,0.04); }
.data-table tbody tr:hover { background: rgba(152,193,217,0.12); }
.data-table tbody td { padding: 8px; vertical-align: middle; }
.table-wrapper { overflow: auto; max-height: calc(100vh - 260px); border-radius: 8px; border: 1px solid var(--kalk); }

/* ========== BADGES ========== */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; white-space: nowrap; }
.badge-hot { background: #FDE8E4; color: var(--danger); }
.badge-goede-kans { background: #E8F5E9; color: var(--success); }
.badge-warm { background: #FFF3E0; color: var(--roest); }
.badge-standaard { background: #E8EDF2; color: var(--petrol); }
.badge-koud { background: #F0F0F0; color: var(--beton); }
.badge-prio-high { background: #FDE8E4; color: var(--danger); }
.badge-prio-medium { background: #FFF3E0; color: var(--roest); }
.badge-prio-low { background: #E8EDF2; color: var(--beton); }

/* ========== SEARCH / FILTER ========== */
.filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.search-input { flex: 1; min-width: 200px; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--steen); font-family: inherit; font-size: 13px; background: var(--wit); outline: none; }
.search-input:focus { border-color: var(--staalblauw); }
.filter-select { padding: 8px 10px; border-radius: 6px; border: 1px solid var(--steen); font-family: inherit; font-size: 12px; background: var(--wit); outline: none; cursor: pointer; }

/* ========== FORMS ========== */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: var(--beton); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--steen); font-family: inherit; font-size: 13px; background: var(--wit); outline: none; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--staalblauw); }
.form-textarea { resize: vertical; min-height: 60px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* ========== MODAL ========== */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(11,18,24,0.6); z-index: 100; justify-content: center; align-items: flex-start; padding-top: 60px; overflow-y: auto; }
.modal-overlay.show { display: flex; }
.modal { background: var(--wit); border-radius: 10px; width: 700px; max-width: 95vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--kalk); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--wit); z-index: 1; }
.modal-header h3 { font-size: 16px; font-weight: 700; }
.modal-close { width: 30px; height: 30px; border: none; background: none; font-size: 18px; cursor: pointer; border-radius: 6px; color: var(--beton); display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--kalk); }
.modal-body { padding: 20px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--kalk); display: flex; justify-content: flex-end; gap: 8px; position: sticky; bottom: 0; background: var(--wit); }

/* ========== LEAD DETAIL ========== */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.detail-section { background: var(--wit); border-radius: 8px; border: 1px solid var(--kalk); }
.detail-section-header { padding: 12px 16px; border-bottom: 1px solid var(--kalk); font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
.detail-section-body { padding: 14px 16px; }
.note-item { padding: 10px 0; border-bottom: 1px solid var(--kalk); }
.note-item:last-child { border-bottom: none; }
.note-meta { font-size: 10px; color: var(--beton); margin-bottom: 4px; }
.note-text { font-size: 12px; line-height: 1.5; }
.task-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--kalk); }
.task-item:last-child { border-bottom: none; }
.task-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--steen); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.task-check.done { background: var(--success); border-color: var(--success); color: #fff; }
.task-info { flex: 1; }
.task-title { font-size: 12px; font-weight: 600; }
.task-meta { font-size: 10px; color: var(--beton); }

/* ========== NOTE TOOLTIP (PUNT 1) ========== */
.note-cell { max-width: 200px; max-height: 48px; overflow: hidden; font-size: 10px; color: var(--beton); line-height: 1.4; position: relative; }
.note-cell:hover .note-balloon { display: block; }
.note-balloon { display: none; position: absolute; left: 0; top: 100%; background: var(--staalgrijs); color: var(--kalk); padding: 10px 14px; border-radius: 6px; font-size: 11px; line-height: 1.5; max-width: 400px; min-width: 220px; white-space: pre-wrap; z-index: 50; box-shadow: 0 4px 20px rgba(0,0,0,0.3); pointer-events: none; }

/* ========== TOAST ========== */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 10px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--wit); animation: slideIn 0.3s ease; max-width: 340px; }
.toast-success { background: var(--success); }
.toast-error { background: var(--danger); }
.toast-info { background: var(--petrol); }
@keyframes slideIn { from { transform: translateX(100px); opacity: 0; } }

/* ========== SETTINGS ========== */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; background: var(--kalk); color: var(--staalgrijs); }
.tag .remove { cursor: pointer; opacity: 0.5; font-size: 13px; }
.tag .remove:hover { opacity: 1; }

/* ========== SCORE BAR ========== */
.score-bar { width: 60px; height: 6px; border-radius: 3px; background: var(--kalk); display: inline-block; vertical-align: middle; margin-right: 6px; }
.score-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

/* ========== TABS ========== */
.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--kalk); margin-bottom: 16px; }
.tab { padding: 8px 16px; font-size: 12px; font-weight: 600; color: var(--beton); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
.tab:hover { color: var(--staalgrijs); }
.tab.active { color: var(--roest); border-bottom-color: var(--roest); }

/* ========== MISC ========== */
.empty-state { text-align: center; padding: 60px 20px; color: var(--beton); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; margin-bottom: 16px; }
.kans-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.offerte-badges { display: flex; gap: 4px; flex-wrap: wrap; }
.mini-badge { display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 8px; font-size: 9px; font-weight: 700; background: var(--kalk); color: var(--beton); }
.mini-badge.has { background: #E8F5E9; color: var(--success); }

/* ========== KALENDER ========== */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--kalk); border-radius: 8px; overflow: hidden; border: 1px solid var(--kalk); }
.cal-header { background: var(--staalgrijs); color: var(--kalk); padding: 8px; font-size: 11px; font-weight: 600; text-align: center; }
.cal-day { background: var(--wit); min-height: 90px; padding: 6px; font-size: 11px; }
.cal-day.other-month { background: var(--papier); color: var(--steen); }
.cal-day.today { background: #FFFBE6; }
.cal-day-num { font-weight: 700; margin-bottom: 4px; }
.cal-task { padding: 2px 5px; border-radius: 4px; font-size: 9px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.cal-task.type-bellen { background: #E3F2FD; color: #1565C0; }
.cal-task.type-afspraak { background: #FFF3E0; color: var(--roest); }
.cal-task.type-mailen { background: #E8F5E9; color: var(--success); }
.cal-task.type-uitzoeken { background: #F3E5F5; color: #7B1FA2; }

/* ========== DATABASE GRID ========== */
.db-grid-wrap { overflow: auto; height: calc(100vh - 140px); border: 1px solid var(--kalk); border-radius: 8px; background: var(--wit); }
table.db-grid { border-collapse: collapse; font-size: 11px; min-width: 100%; }
table.db-grid thead th {
  position: sticky; top: 0; z-index: 10; background: var(--staalgrijs); color: var(--kalk);
  padding: 5px 7px; text-align: left; font-weight: 600; font-size: 10px; white-space: nowrap;
  border-right: 1px solid var(--petrol); cursor: pointer; user-select: none; min-width: 70px;
}
table.db-grid thead th:hover { background: var(--petrol); }
table.db-grid thead th.db-sorted { color: var(--koper); }
table.db-grid thead th:first-child { position: sticky; left: 0; z-index: 15; background: var(--smeedijzer); min-width: 36px; max-width: 36px; text-align: center; }
table.db-grid thead th:nth-child(2) { position: sticky; left: 36px; z-index: 14; min-width: 140px; }
table.db-grid tbody tr { border-bottom: 1px solid #eee; }
table.db-grid tbody tr:nth-child(even) { background: rgba(181,84,30,0.03); }
table.db-grid tbody tr:hover { background: rgba(152,193,217,0.12); }
table.db-grid tbody tr.db-modified { background: rgba(181,84,30,0.08); }
table.db-grid tbody td {
  padding: 2px 6px; border-right: 1px solid #f0ece6; white-space: nowrap; max-width: 180px;
  overflow: hidden; text-overflow: ellipsis;
}
table.db-grid tbody td:first-child { position: sticky; left: 0; z-index: 5; background: var(--papier); border-right: 2px solid var(--kalk); text-align: center; color: var(--beton); font-weight: 600; min-width: 36px; max-width: 36px; }
table.db-grid tbody td:nth-child(2) { position: sticky; left: 36px; z-index: 4; background: var(--wit); border-right: 2px solid var(--kalk); font-weight: 600; }
table.db-grid tbody tr:nth-child(even) td:first-child { background: rgba(245,242,236,0.97); }
table.db-grid tbody tr:nth-child(even) td:nth-child(2) { background: rgba(255,255,255,0.97); }
table.db-grid tbody td.db-edit { cursor: text; }
table.db-grid tbody td.db-edit:hover { background: rgba(152,193,217,0.15); outline: 1px solid var(--hemelblauw); }
table.db-grid tbody td.db-editing { padding: 0; overflow: visible; }
table.db-grid tbody td.db-editing input, table.db-grid tbody td.db-editing select {
  width: 100%; min-width: 90px; padding: 2px 5px; border: 2px solid var(--roest); border-radius: 0;
  font-family: inherit; font-size: 11px; background: #FFFBE6; outline: none;
}
table.db-grid tbody td.db-changed { background: rgba(45,134,89,0.1) !important; border-bottom: 2px solid var(--success); }

/* ========== CHARTS ========== */
.chart-container { background: var(--wit); border-radius: 8px; border: 1px solid var(--kalk); padding: 18px; }
.chart-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; }
.bar-chart { display: flex; flex-direction: column; gap: 6px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label { width: 120px; font-size: 11px; font-weight: 600; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 20px; background: var(--kalk); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; display: flex; align-items: center; padding-left: 6px; font-size: 9px; font-weight: 700; color: #fff; }
.bar-value { width: 40px; font-size: 11px; font-weight: 700; text-align: right; }

/* ========== GLOBAL SEARCH ========== */
.search-results-section { margin-bottom: 18px; }
.search-results-section h4 { font-size: 12px; font-weight: 700; color: var(--beton); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--kalk); }
.search-result-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--kalk); cursor: pointer; transition: background 0.1s; }
.search-result-item:hover { background: rgba(152,193,217,0.08); }
.search-result-item .sr-name { font-size: 13px; font-weight: 600; min-width: 140px; }
.search-result-item .sr-detail { font-size: 11px; color: var(--beton); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.search-result-item .sr-cat { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.quick-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.qab { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--steen); background: var(--wit); color: var(--staalgrijs); transition: all 0.15s; font-family: inherit; }
.qab:hover { background: var(--kalk); border-color: var(--staalblauw); }

/* ========== RESPONSIVE ========== */
@media (max-width: 1400px) { .stats-row { grid-template-columns: repeat(3, 1fr) !important; } }
@media (max-width: 1100px) {
  .stats-row { grid-template-columns: repeat(2, 1fr) !important; }
  .detail-grid, .settings-grid { grid-template-columns: 1fr !important; }
}
@media (max-width: 900px) {
  .sidebar { width: 180px; min-width: 180px; }
  .content { padding: 14px 16px; }
  .data-table { font-size: 10px; }

<!-- ============================================================
     SUPABASE AUTH INIT (sessie 3)

<script>
(function() {
  const SUPABASE_URL = 'https://nvnigvcwkmyqjqpvxift.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_keeSKLqfebtAU7YtQttFOw_GiCdeVoA';
  const ALLOWED_EMAIL = 'verkoop@optistaal.nl';

  // Globale supabase client beschikbaar als window.sbClient
  window.sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { detectSessionInUrl: true, persistSession: true, autoRefreshToken: true }
  });

  const overlay = document.getElementById('auth-overlay');
  const loginBtn = document.getElementById('auth-login-btn');
  const msg = document.getElementById('auth-msg');

  async function checkAuth() {
    try {
      // getSession() is instant (leest uit localStorage). getUser() doet API-call en is traag.
      // Bij snelle init willen we de overlay niet laten flikkeren tijdens een API-roundtrip.
      const { data: { session } } = await window.sbClient.auth.getSession();
      const user = session ? session.user : null;
      if (!user) {
        if (overlay.style.display !== 'flex') overlay.style.display = 'flex';
        if (msg.textContent !== '') msg.textContent = '';
        if (loginBtn.style.display !== 'inline-flex') loginBtn.style.display = 'inline-flex';
        window.sbAuthUser = null;
        return false;
      }
      if (user.email !== ALLOWED_EMAIL) {
        msg.innerHTML = '<span style="color:#C0392B;font-weight:600">Toegang geweigerd voor ' + user.email + '.</span><br>Alleen ' + ALLOWED_EMAIL + ' is toegestaan.';
        loginBtn.style.display = 'none';
        await window.sbClient.auth.signOut();
        setTimeout(() => { msg.textContent = ''; loginBtn.style.display = 'inline-flex'; }, 4000);
        return false;
      }
      // Ingelogd als juiste user - alleen DOM aanraken als nog niet verborgen
      if (overlay.style.display !== 'none') overlay.style.display = 'none';
      window.sbAuthUser = user;
      return true;
    } catch (e) {
      msg.innerHTML = '<span style="color:#C0392B">Fout bij auth-check: ' + (e.message || e) + '</span>';
      return false;
    }
  }

  loginBtn.onclick = async () => {
    msg.textContent = 'Doorsturen naar Google...';
    loginBtn.disabled = true;
    const { error } = await window.sbClient.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + window.location.pathname }
    });
    if (error) {
      msg.innerHTML = '<span style="color:#C0392B">Fout: ' + error.message + '</span>';
      loginBtn.disabled = false;
    }
  };

  // Reageer op login/logout events
  // Bewust GEEN reload — Supabase fires SIGNED_IN soms meermaals bij init en dat zou een loop geven.
  // TOKEN_REFRESHED, USER_UPDATED, INITIAL_SESSION worden ook genegeerd om flicker te voorkomen.
  window.sbClient.auth.onAuthStateChange((event) => {
    if (event === 'SIGNED_OUT' || event === 'SIGNED_IN') {
      checkAuth();
    }
  });

  // Initiële check
  checkAuth();
})();
</script>

<!-- ============================================================
     SUPABASE WRITE HELPERS (sessie 3 — 29 mei 2026)
     Wordt aangeroepen na lokale wijzigingen om Supabase te syncen
     ============================================================ -->
<script>
(function() {
  const LEAD_KERN = new Set(['id','naam','email','telefoon','bedrijf','adres','postcode','plaats','provincie','land','gemeente','status','prioriteit','lead_score','scoringskans','referentie','datum_aanvraag','beslisdatum','beoogde_start_bouw','aangemaakt','laatst_gewijzigd','datum_beslissing','offertebedrag','ordernummer','leverdatum','gewonnen','verloren','verliesreden','opmerking','linda_status','linda_lead_id','linda_pushed_op','linda_laatst_bijgewerkt_op','linda_volgende_actie_datum']);
  const LEAD_OFFERTE = new Set(['offerte_ref','offerte_datum','offerte_datum_1','offerte_datum_2','offerte_datum_3','offerte_datum_4','offerte_aantal_versies','offerte_totaal_excl','offerte_sd','offerte_ld','offerte_rk','offerte_bestand','offerte_verzend_datum','aantal_versies','verkoopprijs_excl','verkoopprijs_incl','prijs_m2','prijs_per_m2','levertijd','levertijd_weken','transport','transport_inbegrepen','oppervlakte','oppervlakte_m2','totaal_incl','last_sync','source','priority','request_date','created_at']);
  const LEAD_MIXMAX = new Set(['mail_activiteiten']);
  const LEAD_EXCLUDE = new Set(['notities','taken','afspraken','followup_mails','offerte_versturingen','offerte_engagement']);
  const DATE_FIELDS = new Set(['datum_aanvraag','beslisdatum','beoogde_start_bouw','datum_beslissing','leverdatum','linda_volgende_actie_datum']);
  const NUMERIC_FIELDS = new Set(['offertebedrag']);
  const INT_FIELDS = new Set(['lead_score','scoringskans']);

  function safeDate(v) {
    if (!v || typeof v !== 'string') return null;
    const m = v.match(/^(\d{4}-\d{2}-\d{2})/);
    return m ? m[1] : null;
  }
  // Converteer "dd-mm-yyyy HH:mm" of "dd-mm-yyyy" naar ISO (Supabase verwacht ISO)
  function nlToIso(v) {
    if (!v) return null;
    if (typeof v !== 'string') return null;
    if (v.includes('T')) return v; // al ISO
    let m = v.match(/^(\d{2})-(\d{2})-(\d{4})\s+(\d{2}):(\d{2})(?::(\d{2}))?/);
    if (m) return `${m[3]}-${m[2]}-${m[1]}T${m[4]}:${m[5]}:${m[6]||'00'}Z`;
    m = v.match(/^(\d{4}-\d{2}-\d{2})\s+(\d{2}):(\d{2})(?::(\d{2}))?/);
    if (m) return `${m[1]}T${m[2]}:${m[3]}:${m[4]||'00'}Z`;
    m = v.match(/^(\d{2})-(\d{2})-(\d{4})$/);
    if (m) return `${m[3]}-${m[2]}-${m[1]}T00:00:00Z`;
    m = v.match(/^(\d{4}-\d{2}-\d{2})$/);
    if (m) return `${m[1]}T00:00:00Z`;
    return null;
  }
  function safeInt(v) {
    if (v === null || v === undefined || v === '') return null;
    const n = parseInt(v, 10);
    return isNaN(n) ? null : n;
  }
  function safeNum(v) {
    if (v === null || v === undefined || v === '') return null;
    const s = String(v).replace(',', '.').replace(/[^\d.\-]/g, '');
    const n = parseFloat(s);
    return isNaN(n) ? null : n;
  }

  function splitLead(lead) {
    const kern = {}, bouw_specs = {}, offerte_meta = {}, mixmax_tracking = {};
    for (const k in lead) {
      if (LEAD_EXCLUDE.has(k)) continue;
      const v = lead[k];
      if (LEAD_KERN.has(k)) {
        if (DATE_FIELDS.has(k)) kern[k] = safeDate(v);
        else if (NUMERIC_FIELDS.has(k)) kern[k] = safeNum(v);
        else if (INT_FIELDS.has(k)) kern[k] = safeInt(v);
        else kern[k] = (v === undefined ? null : v);
      } else if (LEAD_OFFERTE.has(k)) {
        offerte_meta[k] = v;
      } else if (LEAD_MIXMAX.has(k)) {
        mixmax_tracking[k] = v;
      } else {
        bouw_specs[k] = v;
      }
    }
    if (!kern.id) return null;
    kern.bouw_specs = bouw_specs;
    kern.offerte_meta = offerte_meta;
    kern.mixmax_tracking = mixmax_tracking;
    kern.laatst_gewijzigd = new Date().toISOString();
    if (!kern.naam) kern.naam = '(zonder naam)';
    if (!kern.status) kern.status = 'standaard';
    if (!kern.prioriteit) kern.prioriteit = 'medium';
    if (kern.lead_score === null || kern.lead_score === undefined) kern.lead_score = 0;
    if (!kern.land) kern.land = 'Nederland';
    return kern;
  }

  window.sbHelpers = {
    async upsertLead(lead) {
      if (!window.sbClient || !window.sbAuthUser) return;
      const row = splitLead(lead);
      if (!row) return;
      const { error } = await window.sbClient.from('leads').upsert(row, { onConflict: 'id' });
      if (error) { console.error('[Supabase] upsertLead failed:', error.message); window.toast && window.toast('Sync-fout: ' + error.message, 'error'); }
    },
    async deleteLead(leadId) {
      if (!window.sbClient || !window.sbAuthUser) return;
      const { error } = await window.sbClient.from('leads').delete().eq('id', leadId);
      if (error) { console.error('[Supabase] deleteLead failed:', error.message); window.toast && window.toast('Sync-fout: ' + error.message, 'error'); }
    },
    async upsertNotitie(notitie, leadId) {
      if (!window.sbClient || !window.sbAuthUser) return;
      const row = {
        id: notitie.id, lead_id: leadId,
        inhoud: notitie.inhoud || '',
        auteur: notitie.auteur || 'Castillo',
        datum: nlToIso(notitie.datum) || new Date().toISOString(),
        type: notitie.type || 'algemeen'
      };
      const { error } = await window.sbClient.from('lead_notities').upsert(row, { onConflict: 'id' });
      if (error) { console.error('[Supabase] upsertNotitie failed:', error.message); window.toast && window.toast('Sync-fout: ' + error.message, 'error'); }
    },
    async deleteNotitie(notitieId) {
      if (!window.sbClient || !window.sbAuthUser) return;
      const { error } = await window.sbClient.from('lead_notities').delete().eq('id', notitieId);
      if (error) console.error('[Supabase] deleteNotitie failed:', error.message);
    },
    async upsertTaak(taak, leadId) {
      if (!window.sbClient || !window.sbAuthUser) return;
      const row = {
        id: taak.id, lead_id: leadId,
        titel: taak.titel || '(geen titel)',
        omschrijving: taak.omschrijving || '',
        deadline: nlToIso(taak.deadline),
        status: taak.status || 'pending',
        prioriteit: taak.prioriteit || 'medium',
        type: taak.type || 'bellen'
      };
      const { error } = await window.sbClient.from('lead_taken').upsert(row, { onConflict: 'id' });
      if (error) { console.error('[Supabase] upsertTaak failed:', error.message); window.toast && window.toast('Sync-fout: ' + error.message, 'error'); }
    },
    async deleteTaak(taakId) {
      if (!window.sbClient || !window.sbAuthUser) return;
      const { error } = await window.sbClient.from('lead_taken').delete().eq('id', taakId);
      if (error) console.error('[Supabase] deleteTaak failed:', error.message);
    },
    // Schrijf gesyncte Gmail-mails weg naar Supabase (zelfde project als de CRM-data).
    // Ontdubbeld op gmail_id; lead_id wordt bewust NIET meegestuurd zodat een
    // bestaande lead-koppeling behouden blijft. Mails zonder gmail_id worden
    // overgeslagen (die kunnen niet ontdubbeld worden).
    async upsertEmails(emails) {
      if (!window.sbClient || !window.sbAuthUser) return;
      if (!Array.isArray(emails) || emails.length === 0) return;
      const rows = emails.filter(e => e && e.gmail_id).map(e => ({
        gmail_id: e.gmail_id,
        from_email: e.from_email || '',
        from_naam: e.from_naam || '',
        from_raw: e.from_raw || e.from || '',
        to_emails: Array.isArray(e.to_emails) ? e.to_emails : [],
        to_raw: e.to_raw || e.to || '',
        onderwerp: e.onderwerp || '(geen onderwerp)',
        snippet: e.snippet || '',
        datum: e.datum || '',
        iso_datum: e.iso_datum || null,
        richting: e.richting || 'inkomend',
        has_pdf: !!e.has_pdf,
        labels: Array.isArray(e.labels) ? e.labels : []
      }));
      if (rows.length === 0) return;
      for (let i = 0; i < rows.length; i += 500) {
        const chunk = rows.slice(i, i + 500);
        const { error } = await window.sbClient.from('emails').upsert(chunk, { onConflict: 'gmail_id' });
        if (error) { console.error('[Supabase] upsertEmails failed:', error.message); window.toast && window.toast('Mail-sync-fout: ' + error.message, 'error'); break; }
      }
    },
    // Schrijf offerte-versturingen weg naar de aparte tabel lead_offerte_versturingen
    // (die staan NIET in de lead-rij). Alleen items zonder id zijn nieuw; de
    // gegenereerde id's worden teruggezet zodat ze niet dubbel worden ingevoerd.
    async syncOfferteVersturingen(lead) {
      if (!window.sbClient || !window.sbAuthUser || !lead || !lead.id) return;
      const lijst = Array.isArray(lead.offerte_versturingen) ? lead.offerte_versturingen : [];
      const nieuwe = lijst.filter(v => v && !v.id);
      if (nieuwe.length === 0) return;
      const payload = nieuwe.map(v => {
        const d = String(v.datum || '');
        return {
          lead_id: lead.id,
          datum: /^\d{4}-\d{2}-\d{2}/.test(d) ? d.slice(0, 10) : null,
          notitie: v.notitie || '',
          auto_gmail_id: v.auto_gmail_id || null,
          auto_detected: v.auto_detected === true
        };
      });
      const { data, error } = await window.sbClient.from('lead_offerte_versturingen').insert(payload).select('id');
      if (error) { console.error('[Supabase] syncOfferteVersturingen failed:', error.message); window.toast && window.toast('Sync-fout: ' + error.message, 'error'); return; }
      if (Array.isArray(data)) nieuwe.forEach((v, i) => { if (data[i] && data[i].id) v.id = data[i].id; });
    },
    async updateOfferteVersturing(versturing) {
      if (!window.sbClient || !window.sbAuthUser || !versturing || !versturing.id) return;
      const d = String(versturing.datum || '');
      const { error } = await window.sbClient.from('lead_offerte_versturingen').update({
        datum: /^\d{4}-\d{2}-\d{2}/.test(d) ? d.slice(0, 10) : null,
        notitie: versturing.notitie || ''
      }).eq('id', versturing.id);
      if (error) { console.error('[Supabase] updateOfferteVersturing failed:', error.message); window.toast && window.toast('Sync-fout: ' + error.message, 'error'); }
    },
    async deleteOfferteVersturing(versturingId) {
      if (!window.sbClient || !window.sbAuthUser || !versturingId) return;
      const { error } = await window.sbClient.from('lead_offerte_versturingen').delete().eq('id', versturingId);
      if (error) { console.error('[Supabase] deleteOfferteVersturing failed:', error.message); window.toast && window.toast('Sync-fout: ' + error.message, 'error'); }
    }
  };
})();
</script>

const IDB = {
  dbName: 'optistaal_crm',
  dbVersion: 1,
  storeName: 'data',
  _db: null,

  open() {
    if (this._db) return Promise.resolve(this._db);
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this.dbName, this.dbVersion);
      req.onupgradeneeded = (e) => {
        e.target.result.createObjectStore(this.storeName);
      };
      req.onsuccess = (e) => {
        this._db = e.target.result;
        resolve(this._db);
      };
      req.onerror = (e) => reject(e.target.error);
    });
  },

  async get(key) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.storeName, 'readonly');
      const req = tx.objectStore(this.storeName).get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = (e) => reject(e.target.error);
    });
  },

  async set(key, value) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.storeName, 'readwrite');
      tx.objectStore(this.storeName).put(value, key);
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e.target.error);
    });
  },

  async del(key) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.storeName, 'readwrite');
      tx.objectStore(this.storeName).delete(key);
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e.target.error);
    });
  }
};

  // === V23 SUPABASE LOAD (sessie 3 — 29 mei 2026) ===
  // Leest leads/notities/taken/emails uit Supabase project nvnigvcwkmyqjqpvxift
  // en plat de jsonb-kolommen (bouw_specs, offerte_meta, mixmax_tracking) zodat
  // de bestaande UI-code zonder wijzigingen kan blijven werken.
  async loadFromSupabase() {
    if (!window.sbClient) return null;
    try {
      // Wacht op sessie (max 3 sec) — bij eerste page-load kan auth-check nog bezig zijn
      let session = null;
      for (let i = 0; i < 30; i++) {
        const { data } = await window.sbClient.auth.getSession();
        session = data && data.session;
        if (session) break;
        await new Promise(r => setTimeout(r, 100));
      }
      if (!session) return null;
      const t0 = Date.now();
      // Pagination helper: Supabase REST heeft hard cap van 1000 per query
      async function fetchAll(table, orderCol) {
        const PAGE = 1000;
        let all = [], from = 0;
        for (let i = 0; i < 50; i++) { // veilige max 50k rijen
          let q = window.sbClient.from(table).select('*');
          if (orderCol) q = q.order(orderCol, { ascending: false });
          const { data, error } = await q.range(from, from + PAGE - 1);
          if (error) throw error;
          if (!data || data.length === 0) break;
          all = all.concat(data);
          if (data.length < PAGE) break;
          from += PAGE;
        }
        return all;
      }
      // Parallel ophalen, met pagination
      const [leads, notities, taken, oversturingen, emails] = await Promise.all([
        fetchAll('leads'),
        fetchAll('lead_notities'),
        fetchAll('lead_taken'),
        fetchAll('lead_offerte_versturingen'),
        fetchAll('emails', 'iso_datum')
      ]);

      // Converteer ISO timestamptz naar OptiCRM-formaat "dd-mm-yyyy HH:mm"
      function isoToNL(iso) {
        if (!iso) return '';
        if (typeof iso !== 'string') return '';
        // Als al in dd-mm-yyyy formaat staat, laat met rust
        if (/^\d{2}-\d{2}-\d{4}/.test(iso)) return iso;
        try {
          const d = new Date(iso);
          if (isNaN(d.getTime())) return iso;
          const dd = String(d.getDate()).padStart(2,'0');
          const mm = String(d.getMonth()+1).padStart(2,'0');
          const yyyy = d.getFullYear();
          const hh = String(d.getHours()).padStart(2,'0');
          const mn = String(d.getMinutes()).padStart(2,'0');
          return `${dd}-${mm}-${yyyy} ${hh}:${mn}`;
        } catch { return iso; }
      }

      // Groepeer per lead_id + datum-conversie
      const notMap = {}, takMap = {}, ovMap = {};
      notities.forEach(n => {
        n.datum = isoToNL(n.datum);
        (notMap[n.lead_id] = notMap[n.lead_id] || []).push(n);
      });
      taken.forEach(t => {
        t.deadline = isoToNL(t.deadline);
        (takMap[t.lead_id] = takMap[t.lead_id] || []).push(t);
      });
      oversturingen.forEach(o => { (ovMap[o.lead_id] = ovMap[o.lead_id] || []).push(o); });

      // Sorteer notities per lead op datum ASC (oudste eerst, nieuwste achteraan).
      // De render-code doet vervolgens .reverse() waardoor de nieuwste bovenaan komt.
      // Datum-formaat is "dd-mm-yyyy HH:mm" of "dd-mm-yyyy" na isoToNL.
      const parseNLDate = (s) => {
        if (!s || typeof s !== 'string') return 0;
        const m = s.match(/^(\d{2})-(\d{2})-(\d{4})(?:\s+(\d{2}):(\d{2}))?/);
        if (!m) return 0;
        const yyyy = m[3], mm = m[2], dd = m[1];
        const hh = m[4] || '00', mn = m[5] || '00';
        return new Date(yyyy + '-' + mm + '-' + dd + 'T' + hh + ':' + mn + ':00').getTime();
      };
      for (const lid in notMap) {
        notMap[lid].sort((a, b) => parseNLDate(a.datum) - parseNLDate(b.datum));
      }

      // Plat maken: jsonb naar velden, zodat bestaande UI-code blijft werken
      const flatLeads = leads.map(l => {
        const base = Object.assign({}, l);
        if (l.bouw_specs && typeof l.bouw_specs === 'object') Object.assign(base, l.bouw_specs);
        if (l.offerte_meta && typeof l.offerte_meta === 'object') Object.assign(base, l.offerte_meta);
        if (l.mixmax_tracking && typeof l.mixmax_tracking === 'object') Object.assign(base, l.mixmax_tracking);
        delete base.bouw_specs;
        delete base.offerte_meta;
        delete base.mixmax_tracking;
        base.notities = notMap[l.id] || [];
        base.taken = takMap[l.id] || [];
        base.offerte_versturingen = ovMap[l.id] || [];
        base.afspraken = base.afspraken || [];
        base.followup_mails = base.followup_mails || [];
        base.offerte_engagement = base.offerte_engagement || [];
        return base;
      });

      // Email-formaat: zorg dat bestaande UI velden vindt
      const flatEmails = emails.map(e => Object.assign({}, e, {
        to: e.to_raw || (e.to_emails || []).join(', '),
        from: e.from_raw || (e.from_naam ? (e.from_naam + ' <' + e.from_email + '>') : e.from_email)
      }));

      console.log('[Supabase] Geladen in ' + (Date.now()-t0) + 'ms: '
        + flatLeads.length + ' leads, ' + notities.length + ' notities, '
        + taken.length + ' taken, ' + flatEmails.length + ' emails');
      return { leads: flatLeads, emails: flatEmails };
    } catch (e) {
      console.error('[Supabase] Load failed:', e.message || e);
      return null;
    }
  },

  async load() {
    try {
      // === V23 SUPABASE FIRST (sessie 3) ===
      // Probeer eerst Supabase; bij succes vervangt het IndexedDB-data
      const sbData = await this.loadFromSupabase();
      if (sbData && sbData.leads && sbData.leads.length > 0) {
        this.leads = sbData.leads;
        this.emailHistory = sbData.emails;
        // Settings/keys nog uit localStorage hieronder
        const s = localStorage.getItem('optistaal_crm_settings');

        this.lastSync = localStorage.getItem('optistaal_crm_lastsync') || null;
        this.claudeApiKey = localStorage.getItem('optistaal_crm_apikey') || '';
        this.mixmaxApiKey = localStorage.getItem('optistaal_crm_mixmax') || '';
        this.trackingApiKey = localStorage.getItem('optistaal_crm_tracking') || '';
        this.gmailSyncUrl = localStorage.getItem('optistaal_crm_gmail_sync_url') || '';
        this.lastGmailSync = localStorage.getItem('optistaal_crm_last_gmail_sync') || null;
        this.gmailSyncDagen = parseInt(localStorage.getItem('optistaal_crm_gmail_dagen')||'90',10) || 90;
        this.gmailSyncMax = parseInt(localStorage.getItem('optistaal_crm_gmail_max')||'150',10) || 150;
        this.gmailAutoSyncMin = parseInt(localStorage.getItem('optistaal_crm_gmail_auto_min')||'5',10) || 5;
        this.gmailAutoSyncAan = (localStorage.getItem('optistaal_crm_gmail_auto_aan')||'1') === '1';
        this.lastIntakeSync = localStorage.getItem('optistaal_crm_last_intake_sync') || null;
        this.intakeAutoSyncMin = parseInt(localStorage.getItem('optistaal_crm_intake_auto_min')||'5',10) || 5;
        this.intakeAutoSyncAan = (localStorage.getItem('optistaal_crm_intake_auto_aan')||'1') === '1';
        this.lastMixmaxSync = localStorage.getItem('optistaal_crm_mixmax_sync') || null;
        this.lastMixmaxLivefeedSync = localStorage.getItem('optistaal_crm_mixmax_livefeed_sync') || null;
        this.mixmaxAutoSyncMin = parseInt(localStorage.getItem('optistaal_crm_mixmax_auto_min')||'5',10) || 5;
        this.mixmaxAutoSyncAan = (localStorage.getItem('optistaal_crm_mixmax_auto_aan')||'1') === '1';
        this.lastBackupDate = localStorage.getItem('optistaal_crm_last_backup_date') || null;
        return;
      }
      // === FALLBACK: oud IndexedDB-pad ===
      // Migratie: als leads/emails nog in localStorage staan, verhuis naar IndexedDB
      // ALLEEN migreren als IndexedDB nog leeg is (voorkom overschrijven bestaande data)
      const oldLeads = localStorage.getItem('optistaal_crm_leads');
      const oldEmails = localStorage.getItem('optistaal_crm_emails');
      if (oldLeads) {
        const existingLeads = await IDB.get('leads');
        if (!existingLeads || existingLeads.length === 0) {
          await IDB.set('leads', JSON.parse(oldLeads));
          console.log('Migratie: leads verhuisd van localStorage naar IndexedDB');
        } else {
          console.log('Migratie overgeslagen: IndexedDB bevat al', existingLeads.length, 'leads');
        }
        localStorage.removeItem('optistaal_crm_leads');
      }
      if (oldEmails) {
        const existingEmails = await IDB.get('emails');
        if (!existingEmails || existingEmails.length === 0) {
          await IDB.set('emails', JSON.parse(oldEmails));
          console.log('Migratie: emails verhuisd van localStorage naar IndexedDB');
        } else {
          console.log('Migratie overgeslagen: IndexedDB bevat al', existingEmails.length, 'emails');
        }
        localStorage.removeItem('optistaal_crm_emails');
      }
      // Grote data uit IndexedDB
      const leads = await IDB.get('leads');
      if (leads) this.leads = leads;
      const emails = await IDB.get('emails');
      if (emails) this.emailHistory = emails;
      // Kleine data uit localStorage (blijft)
      const s = localStorage.getItem('optistaal_crm_settings');
      if (s) {
        const defaultMailbeheer = this.settings.mailbeheer;
        this.settings = JSON.parse(s);
        if (!this.settings.mailbeheer) this.settings.mailbeheer = defaultMailbeheer;
      }
      const g = localStorage.getItem('optistaal_crm_gcal');
      if (g) this.gcalEvents = JSON.parse(g);
      this.lastSync = localStorage.getItem('optistaal_crm_lastsync') || null;
      this.claudeApiKey = localStorage.getItem('optistaal_crm_apikey') || '';
      this.mixmaxApiKey = localStorage.getItem('optistaal_crm_mixmax') || '';
      this.trackingApiKey = localStorage.getItem('optistaal_crm_tracking') || '';
      this.gmailSyncUrl = localStorage.getItem('optistaal_crm_gmail_sync_url') || '';
      this.lastGmailSync = localStorage.getItem('optistaal_crm_last_gmail_sync') || null;
      this.gmailSyncDagen = parseInt(localStorage.getItem('optistaal_crm_gmail_dagen')||'90',10) || 90;
      this.gmailSyncMax = parseInt(localStorage.getItem('optistaal_crm_gmail_max')||'150',10) || 150;
      this.gmailAutoSyncMin = parseInt(localStorage.getItem('optistaal_crm_gmail_auto_min')||'5',10) || 5;
      this.gmailAutoSyncAan = (localStorage.getItem('optistaal_crm_gmail_auto_aan')||'1') === '1';
      this.lastIntakeSync = localStorage.getItem('optistaal_crm_last_intake_sync') || null;
      this.intakeAutoSyncMin = parseInt(localStorage.getItem('optistaal_crm_intake_auto_min')||'5',10) || 5;
      this.intakeAutoSyncAan = (localStorage.getItem('optistaal_crm_intake_auto_aan')||'1') === '1';
      this.lastMixmaxSync = localStorage.getItem('optistaal_crm_mixmax_sync') || null;
      this.lastMixmaxLivefeedSync = localStorage.getItem('optistaal_crm_mixmax_livefeed_sync') || null;
      this.mixmaxAutoSyncMin = parseInt(localStorage.getItem('optistaal_crm_mixmax_auto_min')||'5',10) || 5;
      this.mixmaxAutoSyncAan = (localStorage.getItem('optistaal_crm_mixmax_auto_aan')||'1') === '1';
      this.lastBackupDate = localStorage.getItem('optistaal_crm_last_backup_date') || null;
    } catch(e) { console.error('Load failed:', e); }
  },

  genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); },

  getStatusInfo(id) {
    return this.settings.statussen.find(s => s.id === id) || { label: id, kleur: '#8B8B83', categorie: 'neutraal' };
  },

  getEmailsForLead(lead) {
    const addrs = [lead.email, lead.email2].filter(Boolean).map(e => e.toLowerCase().trim()).filter(Boolean);
    if (!addrs.length) return [];
    return this.emailHistory.filter(e => {
      try {
        const to = String(e.to||'').toLowerCase();
        const from = String(e.from||'').toLowerCase();
        return addrs.some(addr => to.includes(addr) || from.includes(addr));
      } catch(err) { return false; }
    }).sort((a, b) => (b.iso_datum || b.datum || '').localeCompare(a.iso_datum || a.datum || ''));
  },

  // Email status per lead — detectie op richting-veld + fallback op from-domein
  getEmailStatusForLead(lead) {
    if (!lead.email) return { status: 'geen', label: '—', kleur: '#BDC3C7', opens: 0, clicks: 0, replies: 0, sent: 0 };
    const leadMails = this.getEmailsForLead(lead);

    // Outgoing: expliciet richting='uitgaand' OF from-adres van optistaal.nl
    const sentMails = leadMails.filter(e =>
      e.richting === 'uitgaand' ||
      (e.from && String(e.from).toLowerCase().includes('optistaal.nl'))
    );
    const hasSent = sentMails.length > 0;
    const aantalVerstuurd = sentMails.length;

    // Mixmax tracking (alleen op verstuurde mails)
    const totalOpens = sentMails.reduce((s, e) => s + (parseInt(e.mixmax_opens)||0), 0);
    const totalClicks = sentMails.reduce((s, e) => s + (parseInt(e.mixmax_clicks)||0), 0);
    const mixmaxReplies = sentMails.filter(e => e.mixmax_replied).length;

    // Inkomende Gmail-mails tellen ook als reply
    const inkomendeMails = leadMails.filter(e => e.richting === 'inkomend');
    const totalReplies = Math.max(mixmaxReplies, inkomendeMails.length);

    // Bepaal hoofd-status
    let kleur = '#BDC3C7';
    let status = 'geen';
    if (totalReplies > 0) { kleur = '#2D8659'; status = 'beantwoord'; }
    else if (totalOpens > 0) { kleur = '#3498DB'; status = 'geopend'; }
    else if (hasSent) { kleur = '#9B59B6'; status = 'verzonden'; }

    return { status, kleur, opens: totalOpens, clicks: totalClicks, replies: totalReplies, sent: aantalVerstuurd };
  },

  getGcalForDate(dateStr) { return this.gcalEvents.filter(e => e.datum === dateStr); },

  // PUNT 8: Gekalibreerde lead score met notitie-types, decay en negatieve scoring
  berekenLeadScore(lead) {
    const w = this.settings.leadScoreGewichten;
    const now = new Date();
    let score = 0;

    // 1. Status punten
    const statusKey = 'status_' + (lead.status || 'standaard');
    score += w[statusKey] || w.status_standaard || 100;

    // 2. Notitie-punten (per type, met recency-weging)
    let laatsteInteractie = null;
    if (lead.notities && lead.notities.length > 0) {
      lead.notities.forEach(n => {
        const d = parseDate(n.datum);
        if (d && (!laatsteInteractie || d > laatsteInteractie)) laatsteInteractie = d;
        if (n.type && typeof n.scoreWaarde === 'number') {
          let noteScore = n.scoreWaarde;
          if (d) {
            const dagenOud = Math.floor((now - d) / (1000*60*60*24));
            if (dagenOud <= 7) noteScore *= 1.5;
            else if (dagenOud <= 30) noteScore *= 1.2;
            else if (dagenOud <= 90) noteScore *= 1.0;
            else if (dagenOud <= 180) noteScore *= 0.7;
            else noteScore *= 0.4;
          }
          score += noteScore;
        } else {
          score += 50;
        }
      });
    }

    // 3. Email engagement
    const emailSt = this.getEmailStatusForLead(lead);
    score += (emailSt.opens || 0) * (w.email_open || 50);
    score += (emailSt.clicks || 0) * (w.email_click || 150);
    score += (emailSt.replies || 0) * (w.email_reply || 300);

    // 4. Scoringskans
    const kans = parseFloat(lead.scoringskans) || 0;
    score += kans * (w.scoringskans_factor || 8);

    // 5b. Offerte-engagement (kliks op offerte-links naar optistaal.nl)
    //     Per sessie wordt een score berekend: per bezoek + per minuut + per sessie,
    //     gecapt op engagement_max_per_sessie. Tijdstippen tellen mee als 'laatste
    //     interactie' voor de score-decay onderaan.
    if (Array.isArray(lead.offerte_engagement) && lead.offerte_engagement.length > 0) {
      const perBezoek = w.engagement_per_bezoek || 5;
      const perMinuut = w.engagement_per_minuut || 2;
      const perSessie = w.engagement_per_sessie || 10;
      const maxPerSessie = w.engagement_max_per_sessie || 100;
      const sessies = {};
      for (const e of lead.offerte_engagement) {
        const k = e.sessie_start || e.tijdstip || '';
        if (!sessies[k]) sessies[k] = [];
        sessies[k].push(e);
        const ts = parseDate(e.tijdstip || e.sessie_start);
        if (ts && !isNaN(ts) && (!laatsteInteractie || ts > laatsteInteractie)) laatsteInteractie = ts;
      }
      let engagementScore = 0;
      for (const sleutel in sessies) {
        let sScore = perSessie;
        for (const e of sessies[sleutel]) {
          sScore += perBezoek;
          sScore += perMinuut * ((Number(e.duur_seconden) || 0) / 60);
        }
        if (sScore > maxPerSessie) sScore = maxPerSessie;
        engagementScore += sScore;
      }
      score += engagementScore;
    }

    // 5. Beslisdatum urgentie
    if (lead.beslisdatum) {
      const bd = parseDate(lead.beslisdatum);
      if (bd) {
        const dagen = Math.floor((bd - now) / (1000*60*60*24));
        if (dagen >= 0 && dagen < 30) score += w.beslisdatum_lt30 || 1000;
        else if (dagen >= 0 && dagen < 60) score += w.beslisdatum_30_60 || 500;
        else if (dagen >= 0 && dagen < 120) score += w.beslisdatum_60_120 || 200;
        else if (dagen >= 0) score += w.beslisdatum_gt120 || 100;
        else if (dagen < -90) score -= 200;
        else if (dagen < -30) score -= 100;
        else score -= 50;
      }
    }

    // 6. Score-verval (decay)
    if (laatsteInteractie) {
      const dagenStil = Math.floor((now - laatsteInteractie) / (1000*60*60*24));
      if (dagenStil > 180) score *= 0.4;
      else if (dagenStil > 90) score *= 0.6;
      else if (dagenStil > 60) score *= 0.75;
      else if (dagenStil > 30) score *= 0.9;
    } else {
      const aanvr = parseDate(lead.datum_aanvraag);
      if (aanvr) {
        const dagenStil = Math.floor((now - aanvr) / (1000*60*60*24));
        if (dagenStil > 365) score *= 0.3;
        else if (dagenStil > 180) score *= 0.5;
        else if (dagenStil > 90) score *= 0.7;
      }
    }

    return Math.max(0, Math.round(score));
  }
};

function esc(s) { const d = document.createElement('div'); d.textContent = String(s || ''); return d.innerHTML.replace(/`/g,'&#96;').replace(/\$/g,'&#36;'); }

  const t = document.createElement('div'); t.className = 'toast toast-' + type; t.textContent = msg;

function parseDate(str) {
  if (!str) return null;
  if (/^\d{2}-\d{2}-\d{4}/.test(str)) { const [d, m, y] = str.split(/[-\s]/); return new Date(parseInt(y), parseInt(m)-1, parseInt(d)); }
  return new Date(str);
}
function formatDate(str) { if (!str) return ''; const d = parseDate(str); if (!d || isNaN(d)) return str; return d.toLocaleDateString('nl-NL', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
function dagenTot(str) { if (!str) return null; const d = parseDate(str); if (!d || isNaN(d)) return null; return Math.floor((d - new Date()) / (1000*60*60*24)); }
function formatBedrag(v) { if (!v && v !== 0) return ''; const n = parseFloat(String(v).replace(/[^\d.,\-]/g, '').replace(',', '.')); if (isNaN(n)) return v; return '€ ' + n.toLocaleString('nl-NL', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
function getStatusBadgeClass(status) { const info = DB.getStatusInfo(status); if (info.categorie === 'warm') { return status === 'hot' ? 'badge-hot' : 'badge-goede-kans'; } if (info.categorie === 'koud') return 'badge-koud'; return 'badge-standaard'; }
function getPrioBadgeClass(prio) { if (prio === 'high' || prio === 'hoog') return 'badge-prio-high'; if (prio === 'medium') return 'badge-prio-medium'; return 'badge-prio-low'; }
function scoreColor(score) { if (score >= 2000) return '#C0392B'; if (score >= 1000) return '#D47A3A'; if (score >= 500) return '#D4A017'; if (score >= 200) return '#2D8659'; return '#8B8B83'; }
function kansColor(k) { if (k >= 75) return '#2D8659'; if (k >= 50) return '#D4A017'; if (k >= 25) return '#D47A3A'; return '#C0392B'; }
function toISODate(str) { if (!str) return ''; const d = parseDate(str); if (!d || isNaN(d)) return str; return d.toISOString().slice(0,10); }

function navBadge(id, colored) {
  // Teller-badges per pagina. colored=true → witte tekst op gekleurd blok.
  const soft = (n) => colored
    ? `<span class="badge-soft">${n}</span>`
    : `<span style="margin-left:auto;font-size:10px;opacity:0.6">${n}</span>`;
  const hot = (n, bg) => `<span style="margin-left:auto;background:${bg};color:#fff;border-radius:8px;padding:1px 6px;font-size:10px;font-weight:700">${n}</span>`;
  if (id === 'leads') return soft(DB.leads.filter(l=>l.gewonnen!=='ja'&&l.verloren!=='ja').length);
  if (id === 'focus') {
    const c = DB.leads.filter(l => l.focus && l.focus.actief).length;
    return c ? (colored ? soft(c) : hot(c, 'var(--roest)')) : '';
  }
  if (id === 'taken') {
    const today = new Date().toISOString().slice(0,10);
    const c = DB.leads.reduce((s,l) => s + (l.taken||[]).filter(t => t.deadline && t.deadline.startsWith(today) && t.status !== 'afgerond').length, 0);
    return c ? (colored ? soft(c) : hot(c, 'var(--roest)')) : '';
  }
  if (id === 'bellen-top50') {
    const c = DB.leads.filter(l => l.gewonnen!=='ja' && l.verloren!=='ja' && l.status!=='ijskast').length;
    return soft(Math.min(c,50));
  }
  if (id === 'voorbehoud') {
    const c = DB.leads.filter(l => l.status === 'orders_met_voorbehoud').length;
    return c ? soft(c) : '';
  }
  if (id === 'afsluitmail') {
    const c = getAfsluitMailLeads().length;
    return c ? hot(c, 'var(--roest)') : '';
  }
  if (id === 'antieke-statusmail') {
    const c = DB.leads.filter(l => l.status === 'antieke_statusmail_wachtrij').length;
    return c ? hot(c, 'var(--koper)') : '';
  }
  return '';
}

    let matchField = '';
    const fields = [l.naam, l.email, l.telefoon, l.plaats, l.adres, l.postcode, l.provincie, l.opmerking, l.vergunning_status, l.verliesreden,
      l.dakvorm, l.breedte, l.lengte, l.goot, l.nok, l.helling, l.dakpaneel, l.wandpaneel, l.offertebedrag];
    for (const f of fields) { if (f && String(f).toLowerCase().includes(q)) { matchField = String(f); break; } }
    if (!matchField) {
      for (const n of (l.notities||[])) { if ((n.inhoud||'').toLowerCase().includes(q)) { matchField = 'Notitie: ' + n.inhoud.substring(0, 120); break; } }
    }
    if (!matchField) {
      for (const t of (l.taken||[])) { if ((t.titel||'').toLowerCase().includes(q) || (t.omschrijving||'').toLowerCase().includes(q)) { matchField = 'Taak: ' + t.titel; break; } }
    }
    if (matchField) {
      let cat = 'Actief'; let catClr = 'var(--staalblauw)';
      if (l.gewonnen === 'ja') { cat = 'Gewonnen'; catClr = 'var(--success)'; }
      else if (l.verloren === 'ja') { cat = 'Verloren'; catClr = 'var(--danger)'; }
      else if (l.status === 'ijskast') { cat = 'IJskast'; catClr = 'var(--beton)'; }
      else if (l.status === 'niets_mee_doen') { cat = 'Niets mee doen'; catClr = '#BDC3C7'; }
      else if (l.status === 'statusmail_verstuurd') { cat = 'Statusmail'; catClr = '#9B59B6'; }
      else if (l.status === 'orders_met_voorbehoud') { cat = 'Voorbehoud'; catClr = 'var(--warning)'; }
      results.push({ lead: l, matchField, cat, catClr });
    }
  });
  // Groepeer per categorie
  const groups = {};
  results.forEach(r => { if (!groups[r.cat]) groups[r.cat] = []; groups[r.cat].push(r); });
  const order = ['Actief','Voorbehoud','Statusmail','Gewonnen','Verloren','IJskast','Niets mee doen'];
  let html = '<div style="margin-bottom:14px"><input class="search-input" style="max-width:500px" placeholder="Zoek in alle leads, notities, taken..." value="'+esc(globalSearchQuery)+'" oninput="globalSearchQuery=this.value" onkeydown="if(event.key===\'Enter\')globalSearch(this.value)"> <span style="font-size:12px;color:var(--beton);margin-left:10px">'+results.length+' resultaten in '+Object.keys(groups).length+' categorieën</span></div>';
  if (results.length === 0) { html += '<div class="empty-state"><div class="icon">&#128269;</div><p>Geen resultaten voor "'+esc(globalSearchQuery)+'"</p></div>'; }
  order.forEach(cat => {
    if (!groups[cat]) return;
    const items = groups[cat];
    html += '<div class="search-results-section"><h4>'+esc(cat)+' ('+items.length+')</h4><div class="card"><div class="card-body" style="padding:0">';
    items.forEach(r => {
      const si = DB.getStatusInfo(r.lead.status);
      html += '<div class="search-result-item" onclick="openLead(\''+r.lead.id+'\')"><span class="sr-name">'+esc(r.lead.naam)+'</span><span class="sr-detail" title="'+esc(r.matchField)+'">'+esc(r.matchField.substring(0,100))+'</span><span class="badge" style="background:'+si.kleur+'15;color:'+si.kleur+';font-size:9px">'+esc(si.label)+'</span><span class="sr-cat" style="background:'+r.catClr+'20;color:'+r.catClr+'">'+esc(r.cat)+'</span></div>';
    });
    html += '</div></div></div>';
  });
  document.getElementById('content').innerHTML = html;
}

// CSV IMPORT (PUNT 5: dubbele BOM fix)
// ================================================================
function handleCSVImport(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      // Snapshot voor rollback (observatie 6, 22 mei 2026)
      await maakSnapshot('Voor CSV import: ' + (file.name || 'onbekend'));
      const text = e.target.result.replace(/^\uFEFF+/, '');
      // Robust CSV parser that handles quoted fields with semicolons/newlines
      function parseCSV(txt, delim) {
        // Strip all double quotes first to prevent orphan-quote issues
        txt = txt.replace(/"/g, '');
        const result = []; let row = []; let cell = '';
        for (let c = 0; c < txt.length; c++) {
          const ch = txt[c];
          if (ch === delim) { row.push(cell.trim()); cell = ''; }
          else if (ch === '\n' || (ch === '\r' && txt[c+1] === '\n')) {
            if (ch === '\r') c++;
            row.push(cell.trim()); if (row.length > 1 || row[0]) result.push(row); row = []; cell = '';
          } else { cell += ch; }
        }
        if (cell || row.length) { row.push(cell.trim()); result.push(row); }
        return result;
      }
      const parsed = parseCSV(text, ';');
      const headers = parsed[0].map(h => h.replace(/^\uFEFF+/, ''));
      let imported = 0;
      for (let i = 1; i < parsed.length; i++) {
        const vals = parsed[i];
        if (vals.length < 5) continue;
        const row = {};
        headers.forEach((h, idx) => row[h] = (vals[idx] || '').trim());
        const naam = row['Naam'] || row['\uFEFFNaam'] || row['\uFEFF\uFEFFNaam'];
        if (!naam) continue;
        const lead = {
          id: DB.genId(), naam, email: row['Email']||'', telefoon: row['Telefoon']||'',
          adres: row['Adres']||'', postcode: row['Postcode']||'', plaats: row['Plaats']||'',
          land: row['Land']||'', provincie: row['Provincie']||'',
          vergunning_status: row['Vergunning status']||'',
          status: (row['Status']||'standaard').toLowerCase().replace(/\s+/g, '_'),
          prioriteit: (row['Prioriteit']||'medium').toLowerCase(),
          beslisdatum: row['Beslisdatum']||'', datum_aanvraag: row['Datum Aanvraag']||'',
          beoogde_start_bouw: row['Beoogde start bouw']||'',
          lead_score: parseInt(row['Lead Score'])||0,
          gewonnen: (row['Gewonnen']||'').toLowerCase(), verloren: (row['Verloren']||'').toLowerCase(),
          verliesreden: row['Verliesreden']||'', datum_beslissing: '',
          offertebedrag: row['Offertebedrag']||'', opmerking: row['Opmerking in de aanvraag']||'',
          scoringskans: parseFloat(row['Geschatte scoringskans %'])||0,
          dakvorm: row['Dakvorm']||'', breedte: row['Breedte']||'', lengte: row['Lengte']||'',
          goot: row['Goot']||'', nok: row['Nok']||'', helling: row['Helling']||'',
          dakpaneel: row['Dakpaneel']||'', dikte_dakisolatie: row['Dikte dakisolatie']||'',
          wandpaneel: row['Wandpaneel']||'', dikte_wandisolatie: row['Dikte wondisolatie']||'',
          aantal_sd: row['Aantal SD']||'', aantal_ld: row['Aantal LD']||'', aantal_rk: row['Aantal RK']||'',
          referentie: row['Referentie']||'', gemeente: row['Gemeente']||'', oppervlakte: row['Oppervlakte m2']||'',
          dak_coating: row['Dak coating']||'', dak_kleur: row['Dak kleur']||'', wand_kleur: row['Wand kleur']||'',
          totaal_incl: row['Totaal incl']||'', prijs_m2: row['Prijs per m2']||'',
          levertijd: row['Levertijd weken']||'', transport: row['Transport inbegrepen']||'',
          goten: row['Goten']||'', tussenwand: row['Tussenwand']||'',
          offerte_datum_1: row['Offerte Datum 1']||'', offerte_datum_2: row['Offerte datum 2']||'',
          offerte_datum_3: row['Offerte datum 3']||'', offerte_datum_4: row['Offerte datum 4']||'',
          offerte_aantal_versies: row['Aantal versies']||'',
          offerte_totaal_excl: row['Offerte Totaal Excl']||'',
          offerte_sd: row['Offerte SD Beschrijving']||'', offerte_ld: row['Offerte LD Beschrijving']||'', offerte_rk: row['Offerte RK Beschrijving']||'',
          sd1_breedte: row['SD1 Breedte']||'', sd1_hoogte: row['SD1 Hoogte']||'', sd1_beslag: row['SD1 Beslag']||'',
          sd2_breedte: row['SD2 Breedte']||'', sd2_hoogte: row['SD2 Hoogte']||'', sd2_beslag: row['SD2 Beslag']||'',
          sd3_breedte: row['SD3 Breedte']||'', sd3_hoogte: row['SD3 Hoogte']||'', sd3_beslag: row['SD3 Beslag']||'',
          sd4_breedte: row['SD4 Breedte']||'', sd4_hoogte: row['SD4 Hoogte']||'', sd4_beslag: row['SD4 Beslag']||'',
          ordernummer: row['Ordernummer']||'', leverdatum: row['Leverdatum']||'',
          notities: [], taken: [],
          aangemaakt: row['Datum Aanvraag'] || new Date().toISOString(),
          laatst_gewijzigd: new Date().toISOString(),
        };
        for (let n = 1; n <= 12; n++) {
          const inhoud = row['Notitie '+n+' Inhoud'];
          if (inhoud) lead.notities.push({ id: DB.genId(), inhoud, auteur: row['Notitie '+n+' Auteur']||'Onbekend', datum: row['Notitie '+n+' Datum']||'' });
        }
        for (let t = 1; t <= 2; t++) {
          const titel = row['Taak '+t+' Titel'];
          if (titel) lead.taken.push({ id: DB.genId(), titel, omschrijving: row['Taak '+t+' Omschrijving']||'', deadline: row['Taak '+t+' Deadline']||'', status: (row['Taak '+t+' Status']||'open').toLowerCase(), prioriteit: (row['Taak '+t+' Prioriteit']||'medium').toLowerCase(), type: 'bellen' });
        }
        // Auto-bereken beslisdatum als beoogde_start_bouw gevuld is maar beslisdatum niet
        if (lead.beoogde_start_bouw && !lead.beslisdatum) {
          const d = new Date(lead.beoogde_start_bouw);
          d.setMonth(d.getMonth() - 2);
          lead.beslisdatum = d.toISOString().slice(0,10);
        }
        lead.lead_score = DB.berekenLeadScore(lead);
        DB.leads.push(lead);
        imported++;
      }
      DB.save(); toast(imported + ' leads geïmporteerd', 'success'); renderPage();
    } catch(err) { toast('Import fout: ' + err.message, 'error'); console.error(err); }
  };
  reader.readAsText(file, 'UTF-8'); event.target.value = '';
}

function handleCSVMergeImport(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();

    try {
      await maakSnapshot('Voor CSV merge import: ' + (file.name || 'onbekend'));
      const text = e.target.result.replace(/^\uFEFF+/, '');
      function parseCSV2(txt, delim) {
        txt = txt.replace(/"/g, '');
        const result = []; let row = []; let cell = '';
        for (let c = 0; c < txt.length; c++) {
          const ch = txt[c];
          if (ch === delim) { row.push(cell.trim()); cell = ''; }
          else if (ch === '\n' || (ch === '\r' && txt[c+1] === '\n')) {
            if (ch === '\r') c++;
            row.push(cell.trim()); if (row.length > 1 || row[0]) result.push(row); row = []; cell = '';
          } else { cell += ch; }
        }
        if (cell || row.length) { row.push(cell.trim()); result.push(row); }
        return result;
      }
      const parsed = parseCSV2(text, ';');
      const headers = parsed[0].map(h => h.replace(/^\uFEFF+/, ''));
      let updated = 0, added = 0;
      for (let i = 1; i < parsed.length; i++) {

        if (!existing) existing = DB.leads.find(l => l.naam && l.naam.toLowerCase() === naam.toLowerCase());

          const csvMap = {'email':'Email','telefoon':'Telefoon','adres':'Adres','postcode':'Postcode',

            'aantal_sd':'Aantal SD','aantal_ld':'Aantal LD','aantal_rk':'Aantal RK'};
          fields.forEach(f => {
            const csvKey = csvMap[f];
            const val = csvKey ? row[csvKey] : '';
            if (val) { if (f === 'scoringskans') existing[f] = parseFloat(val)||0; else existing[f] = val; }
          });
          if (row['Status']) existing.status = row['Status'].toLowerCase().replace(/\s+/g, '_');
          if (row['Prioriteit']) existing.prioriteit = row['Prioriteit'].toLowerCase();
          existing.lead_score = DB.berekenLeadScore(existing);
          existing.laatst_gewijzigd = new Date().toISOString();
          updated++;
        } else {
          // Maak nieuwe lead aan (zelfde als normale import)
          const lead = {
            id: DB.genId(), naam, email: row['Email']||'', telefoon: row['Telefoon']||'',
            adres: row['Adres']||'', postcode: row['Postcode']||'', plaats: row['Plaats']||'',
            land: row['Land']||'', provincie: row['Provincie']||'',

            gewonnen: '', verloren: '', verliesreden: '', datum_beslissing: '',
            offertebedrag: row['Offertebedrag']||'', opmerking: row['Opmerking in de aanvraag']||'',
            scoringskans: parseFloat(row['Geschatte scoringskans %'])||0,
            dakvorm: row['Dakvorm']||'', breedte: row['Breedte']||'', lengte: row['Lengte']||'',
            goot: row['Goot']||'', nok: row['Nok']||'', helling: row['Helling']||'',
            dakpaneel: row['Dakpaneel']||'', dikte_dakisolatie: row['Dikte dakisolatie']||'',
            wandpaneel: row['Wandpaneel']||'', dikte_wandisolatie: row['Dikte wondisolatie']||'',
            aantal_sd: row['Aantal SD']||'', aantal_ld: row['Aantal LD']||'', aantal_rk: row['Aantal RK']||'',
            notities: [], taken: [], aangemaakt: new Date().toISOString(), laatst_gewijzigd: new Date().toISOString(),
          };
          // Auto-bereken beslisdatum als beoogde_start_bouw gevuld is maar beslisdatum niet
          if (lead.beoogde_start_bouw && !lead.beslisdatum) {
            const d = new Date(lead.beoogde_start_bouw);
            d.setMonth(d.getMonth() - 2);
            lead.beslisdatum = d.toISOString().slice(0,10);
          }
          lead.lead_score = DB.berekenLeadScore(lead);
          DB.leads.push(lead);
          added++;
        }
      }
      DB.save();
      toast(updated + ' bijgewerkt, ' + added + ' nieuw toegevoegd', 'success');
      renderPage();
    } catch(err) { toast('Merge fout: ' + err.message, 'error'); console.error(err); }
  };
  reader.readAsText(file, 'UTF-8'); event.target.value = '';
}

          };
          // Auto-bereken beslisdatum als beoogde_start_bouw gevuld is maar beslisdatum niet

          }
          lead.lead_score = DB.berekenLeadScore(lead);

      }
