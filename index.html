// ---- AUTO-CLOSE: check afsluitmail timer (7 dagen) ----
function checkAfsluitMailTimers() {
  const today = new Date().toISOString().slice(0,10);
  const todayMs = new Date(today).getTime();
  let count = 0;
  DB.leads.forEach(l => {
    if (l.afsluitmail_verstuurd && l.verloren !== 'ja' && l.gewonnen !== 'ja') {
      const sentMs = new Date(l.afsluitmail_verstuurd).getTime();
      const diffDays = Math.round((todayMs - sentMs) / (1000*60*60*24));
      if (diffDays >= 14) {
        l.verloren = 'ja';
        l.verliesreden = 'Geen reactie op afsluitmail';
        l.datum_verloren = today;
        l.status = 'niets_mee_doen';
        l.lead_score = DB.berekenLeadScore(l);
        l.laatst_gewijzigd = new Date().toISOString();
        if (!l.notities) l.notities = [];
        l.notities.push({ id: 'n'+Date.now()+count, datum: today, auteur: 'Systeem', inhoud: 'Lead automatisch afgesloten: geen reactie binnen 14 dagen na afsluitmail (verstuurd op '+l.afsluitmail_verstuurd+'). Alle taken verwijderd.' });
        _crmRondAlleOpenTakenAf(l); // verwijder alle open taken
        delete l.afsluitmail_verstuurd;
        // BUGFIX 10 jun 2026: wijzigingen ook naar Supabase pushen (anders weg na sync)
        if (window.sbHelpers) {
          (l.taken||[]).forEach(t => window.sbHelpers.upsertTaak(t, l.id));
          window.sbHelpers.upsertNotitie(l.notities[l.notities.length-1], l.id);
          window.sbHelpers.upsertLead(l);
        }
        count++;
      }
    }
  });
  if (count > 0) {
    DB.save();
    toast(count + ' lead(s) automatisch afgesloten wegens geen reactie op afsluitmail.','info');
  }
}

function activeerOpvolging(leadId, opvolgingType) {
  if (!opvolgingType || opvolgingType === 'geen') return;
  const l = DB.leads.find(x => x.id === leadId);
  if (!l) return;
  const today = new Date().toISOString().slice(0,10);
  l.statusmail_opvolging = {
    type: opvolgingType,
    verstuurd_op: today,
    deadline: berekenDeadline(opvolgingType)
  };
  l.laatst_gewijzigd = new Date().toISOString();
  if (!l.notities) l.notities = [];
  const labels = { afsluiten_14d: 'Opvolging ingesteld: bij geen reactie binnen 14 dagen → status "geen reactie"', herinnering_10d: 'Opvolging ingesteld: bij geen reactie binnen 10 dagen → herinneringsmail genereren', verwijderen_10d: 'Opvolging ingesteld: bij geen reactie binnen 10 dagen → lead verwijderen' };
  l.notities.push({ id: 'n'+Date.now(), datum: today, auteur: 'Systeem', inhoud: labels[opvolgingType] || 'Opvolging ingesteld' });
  // BUGFIX 10 jun 2026: ook naar Supabase pushen (anders weg na sync)
  window.sbHelpers && window.sbHelpers.upsertNotitie(l.notities[l.notities.length-1], leadId);
  window.sbHelpers && window.sbHelpers.upsertLead(l);
  DB.save();

  // Google Calendar reminder aanmaken als API key beschikbaar
  maakCalendarReminder(l, opvolgingType);
}

function berekenDeadline(type) {
  const dagen = type === 'afsluiten_14d' ? 14 : 10;
  const d = new Date();
  d.setDate(d.getDate() + dagen);
  return d.toISOString().slice(0,10);
}

// Check alle opvolgingen bij openen CRM
function checkStatusMailOpvolgingen() {
  const today = new Date().toISOString().slice(0,10);
  const todayMs = new Date(today).getTime();
  const acties = [];

  DB.leads.forEach(l => {
    if (!l.statusmail_opvolging) return;
    if (l.verloren === 'ja' || l.gewonnen === 'ja') { delete l.statusmail_opvolging; return; }
    const opv = l.statusmail_opvolging;
    const deadlineMs = new Date(opv.deadline).getTime();
    if (todayMs < deadlineMs) return; // nog niet verlopen

    if (opv.type === 'afsluiten_14d') {
      l.verloren = 'ja';
      l.verliesreden = 'Geen reactie op statusmail';
      l.datum_verloren = today;
      l.laatst_gewijzigd = new Date().toISOString();
      if (!l.notities) l.notities = [];
      l.notities.push({ id: 'n'+Date.now()+Math.random(), datum: today, auteur: 'Systeem', inhoud: 'Lead automatisch afgesloten: geen reactie binnen 14 dagen na statusmail.' });
      delete l.statusmail_opvolging;
      acties.push({ type: 'afgesloten', lead: l });
    } else if (opv.type === 'herinnering_10d') {
      acties.push({ type: 'herinnering', lead: l });
      // Opvolging niet verwijderen tot gebruiker actie onderneemt
    } else if (opv.type === 'verwijderen_10d') {
      acties.push({ type: 'verwijderen', lead: l });
    }
  });

  if (acties.length > 0) {
    DB.save();
    toonOpvolgingMeldingen(acties);
  }
}

function toonOpvolgingMeldingen(acties) {
  let html = '<div style="max-height:400px;overflow-y:auto">';
  acties.forEach((a, i) => {
    const l = a.lead;
    if (a.type === 'afgesloten') {
      html += `<div style="padding:10px 12px;margin-bottom:8px;background:#F8D7DA;border-radius:6px;border-left:4px solid #C0392B">
        <strong>${esc(l.naam)}</strong> — Automatisch afgesloten (geen reactie 14 dagen)
      </div>`;
    } else if (a.type === 'herinnering') {
      html += `<div style="padding:10px 12px;margin-bottom:8px;background:#FFF3CD;border-radius:6px;border-left:4px solid #F39C12">
        <strong>${esc(l.naam)}</strong> — Geen reactie na 10 dagen. Herinneringsmail klaar om te genereren.
        <div style="margin-top:8px"><button class="btn btn-sm btn-primary" onclick="closeModal();generateStatusMail('${l.id}')">Herinneringsmail maken</button>
        <button class="btn btn-sm btn-outline" style="margin-left:6px" onclick="annuleerOpvolging('${l.id}')">Annuleren</button></div>
      </div>`;
    } else if (a.type === 'verwijderen') {
      html += `<div style="padding:10px 12px;margin-bottom:8px;background:#F8D7DA;border-radius:6px;border-left:4px solid #E74C3C">
        <strong>${esc(l.naam)}</strong> — Geen reactie na 10 dagen. Lead wordt verwijderd.
        <div style="margin-top:8px"><button class="btn btn-sm btn-danger" onclick="verwijderLeadOpvolging('${l.id}')">Definitief verwijderen</button>
        <button class="btn btn-sm btn-outline" style="margin-left:6px" onclick="annuleerOpvolging('${l.id}')">Annuleren</button></div>
      </div>`;
    }
  });
  html += '</div>';
  openModal('Opvolgingen — actie vereist', html, '<button class="btn btn-outline" onclick="closeModal()">Later</button>');

function checkAutoVerloren() {
  const today = new Date().toISOString().slice(0,10);
  const today_d = new Date(today);
  const MS_PER_DAY = 1000*60*60*24;
  let updated = 0;

  DB.leads.forEach(l => {
    // Alleen kijken naar leads met status statusmail_verstuurd
    if (l.status !== 'statusmail_verstuurd') return;
    if (l.verloren === 'ja' || l.gewonnen === 'ja') return; // Already decided

    // Vind de statusmail-notitie
    const statusmailNote = (l.notities||[]).find(n => n.inhoud === 'Statusmail verstuurd');
    if (!statusmailNote) return;

    // Check if 14+ days old
    const noteDate = parseDate(statusmailNote.datum);
    if (!noteDate) return;
    const daysPassed = Math.floor((today_d - noteDate) / MS_PER_DAY);
    if (daysPassed < 14) return; // Not yet 14 days

    // Check if there's a newer note (any activity after statusmail)
    const newerNote = (l.notities||[]).find(n => {
      const nDate = parseDate(n.datum);
      if (!nDate) return false;
      return nDate > noteDate && n !== statusmailNote;
    });
    if (newerNote) return; // There's activity, don't auto-verloren

    // Check if there's email activity after statusmail
    const leadsEmails = DB.getEmailsForLead(l);
    const emailAfterStatusmail = leadsEmails.some(e => {
      const eDate = e.iso_datum ? parseDate(e.iso_datum) : parseDate(e.datum);
      if (!eDate) return false;
      return eDate > noteDate;
    });
    if (emailAfterStatusmail) return; // There's email activity, don't auto-verloren

    // Auto-verloren: geen reactie op statusmail
    l.verloren = 'ja';
    l.verliesreden = 'Geen reactie op statusmail';
    l.datum_beslissing = today;
    l.status = 'niets_mee_doen';
    l.lead_score = DB.berekenLeadScore(l);
    l.laatst_gewijzigd = new Date().toISOString();
    if (!l.notities) l.notities = [];
    l.notities.push({ id: 'n'+Date.now()+Math.random(), datum: today, auteur: 'Systeem', inhoud: 'Automatisch naar verloren (14+ dagen, geen reactie op statusmail)' });
    _crmRondAlleOpenTakenAf(l);  // v22.4 — auto-pad: automatisch zonder popup
    updated++;
  });

  if (updated > 0) {
    DB.save();
    console.log('Auto-verloren: ' + updated + ' leads');
  }
}

function annuleerOpvolging(leadId) {
  const l = DB.leads.find(x => x.id === leadId);

function maakCalendarReminder(lead, opvolgingType) {
  if (!lead.statusmail_opvolging) return;
  const opv = lead.statusmail_opvolging;
  const deadline = opv.deadline;
  const labels = { afsluiten_14d: 'CRM: Lead afsluiten als geen reactie', herinnering_10d: 'CRM: Herinneringsmail sturen', verwijderen_10d: 'CRM: Lead verwijderen als geen reactie' };
  const titel = labels[opvolgingType] || 'CRM Opvolging';
  const beschrijving = `Lead: ${lead.naam}\\nEmail: ${lead.email||'onbekend'}\\nPlaats: ${lead.plaats||'onbekend'}\\nActie: ${titel}\\n\\nOpen de CRM om actie te ondernemen.`;

  // Google Calendar URL (opent direct in browser)
  const dtStart = deadline.replace(/-/g, '');
  const dtEnd = dtStart; // all-day event
  const gcalUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(titel + ' — ' + lead.naam)}&dates=${dtStart}/${dtEnd}&details=${encodeURIComponent(beschrijving.replace(/\\n/g, '\n'))}&trp=false`;

  // Open Google Calendar in nieuw tabblad
  window.open(gcalUrl, '_blank');
  toast('Google Calendar reminder geopend — sla het event op in je agenda.', 'info');
}

async function syncMixmax(silent) {
  if (!DB.mixmaxApiKey) {
    if (!silent) toast('Geen Mixmax API key ingesteld. Ga naar Instellingen.', 'error');
    return;
  }
  if (!silent) toast('Mixmax sync gestart...', 'info');
  try {
    // Haal berichten op van Mixmax API
    const resp = await fetch('https://api.mixmax.com/v1/messages?limit=300', {
      headers: { 'X-API-Token': DB.mixmaxApiKey }
    });
    if (!resp.ok) {
      const errText = await resp.text();
      if (!silent) toast('Mixmax fout: ' + resp.status + ' ' + errText.substring(0, 100), 'error');
      return;
    }
    const data = await resp.json();
    const messages = data.results || data || [];
    if (!Array.isArray(messages)) { if (!silent) toast('Onverwacht Mixmax formaat', 'error'); return; }

    // Log eerste bericht voor debug (alleen bij handmatig)
    if (messages.length > 0 && !silent) {
      console.log('Mixmax sample bericht:', JSON.stringify(messages[0], null, 2));
      console.log('Mixmax veldnamen:', Object.keys(messages[0]));
    }

    let imported = 0, trackingFound = 0;
    for (const msg of messages) {
      // Recipients: Mixmax geeft array van objecten met .email veld
      const recipArr = msg.recipients || msg.to || [];
      const to = (Array.isArray(recipArr) ? recipArr : []).map(r => typeof r === 'object' ? (r.email || r.address || '') : String(r)).filter(Boolean).join(', ');
      const fromRaw = msg.from || msg.sender || '';
      const from = typeof fromRaw === 'object' ? (fromRaw.email || fromRaw.address || '') : String(fromRaw);
      const subject = msg.subject || '';
      const sentAt = msg.sentAt || msg.createdAt || msg.date || msg.timestamp || '';
      const datumObj = sentAt ? new Date(sentAt) : null;
      const datum = datumObj ? datumObj.toLocaleDateString('nl-NL', { day:'2-digit', month:'short', year:'numeric' }) : '';
      const msgId = msg._id || msg.id || '';

      // Tracking: prioriteer numOpens/numClicks (getallen) boven opens/clicks (arrays)
      const opens = parseInt(msg.numOpens) || (Array.isArray(msg.opens) ? msg.opens.length : (parseInt(msg.opens) || 0));
      const clicks = parseInt(msg.numClicks) || (Array.isArray(msg.clicks) ? msg.clicks.length : (parseInt(msg.clicks) || 0));
      const replied = !!(msg.wasReplied || msg.replied || msg.hasReplied);
      const downloads = parseInt(msg.numDownloads) || (Array.isArray(msg.downloaded) ? msg.downloaded.length : 0);

      if (opens > 0 || clicks > 0 || replied) trackingFound++;

      // Check of dit bericht al bestaat
      if (msgId && DB.emailHistory.some(e => e.mixmax_id === msgId)) {
        const existing = DB.emailHistory.find(e => e.mixmax_id === msgId);
        existing.mixmax_opens = opens;
        existing.mixmax_clicks = clicks;
        if (replied) existing.mixmax_replied = true;
        existing.mixmax_downloads = downloads;
        continue;
      }

      DB.emailHistory.push({
        mixmax_id: msgId,
        richting: 'uitgaand',
        to: to,
        from: from,
        onderwerp: subject,
        datum: datum,
        snippet: (msg.body || msg.text || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim().substring(0, 400),
        mixmax_opens: opens,
        mixmax_clicks: clicks,
        mixmax_replied: replied,
        mixmax_downloads: downloads,
        _raw_keys: Object.keys(msg).join(','),
      });
      imported++;
    }

    DB.lastSync = new Date().toISOString();
    DB.lastMixmaxSync = new Date().toISOString();
    DB.save();
    // Merge Mixmax-tracking met bestaande Gmail-mails (historische match)
    let mergeStats = { merged: 0, removed: 0 };
    try { mergeStats = matchMixmaxMetGmail(); } catch(e) { console.warn('Mixmax↔Gmail merge fout:', e); }
    // Auto-detectie 'Eerste offerte verstuurd' mail-activiteit
    try { await detecteerEersteOffertePerMailActiviteit(); } catch(e) { console.warn('Eerste-offerte mail-activiteit detectie fout:', e); }
    if (!silent) {
      toast('Mixmax sync klaar: ' + imported + ' nieuw, ' + (messages.length - imported) + ' bijgewerkt, ' + trackingFound + ' met tracking' + (mergeStats.merged ? ', ' + mergeStats.merged + ' gekoppeld aan Gmail-mails' : ''), 'success');
    } else if (imported > 0 || trackingFound > 0 || mergeStats.merged > 0) {
      toast('Mixmax-sync: ' + imported + ' nieuw · ' + trackingFound + ' met tracking' + (mergeStats.merged ? ' · ' + mergeStats.merged + ' gekoppeld' : ''), 'info');
    }
    console.log('[Mixmax] sync:', { totaal: messages.length, nieuw: imported, tracking: trackingFound, merge: mergeStats, methode: silent ? 'silent' : 'manueel' });
    const syncEl = document.getElementById('mixmaxLastSync');
    if (syncEl) syncEl.textContent = new Date(DB.lastMixmaxSync).toLocaleString('nl-NL');
    if (!silent) renderPage();
  } catch (err) {
    if (!silent) toast('Mixmax sync fout: ' + err.message, 'error');
    console.error('Mixmax sync error:', err);
  }
}

// Haal ook livefeed op voor recente tracking events
async function syncMixmaxLivefeed(silent) {
  if (!DB.mixmaxApiKey) {
    if (!silent) toast('Geen Mixmax API key ingesteld.', 'error');
    return;
  }
  if (!silent) toast('Livefeed ophalen...', 'info');
  try {
    const resp = await fetch('https://api.mixmax.com/v1/livefeed?limit=200', {
      headers: { 'X-API-Token': DB.mixmaxApiKey }
    });
    if (!resp.ok) {
      const errText = await resp.text();
      if (!silent) toast('Livefeed fout: ' + resp.status, 'error');
      console.error('Livefeed error:', errText);
      return;
    }
    const data = await resp.json();
    const events = data.results || data || [];
    if (!Array.isArray(events)) { if (!silent) toast('Onverwacht livefeed formaat', 'error'); return; }

    // Log eerste event voor debug (alleen bij handmatig)
    if (events.length > 0 && !silent) {
      console.log('Livefeed sample event:', JSON.stringify(events[0], null, 2));
      console.log('Livefeed veldnamen:', Object.keys(events[0]));
    }

    // Livefeed geeft bericht-niveau data (numOpens, numClicks, wasReplied, recipients)
    let matched = 0, unmatched = 0, trackingUpdated = 0;
    for (const ev of events) {
      const msgId = ev._id || ev.messageId || ev.message || ev.id || '';
      const recipArr = ev.recipients || ev.to || [];
      const recipEmails = (Array.isArray(recipArr) ? recipArr : []).map(r => typeof r === 'object' ? (r.email || '') : String(r)).filter(Boolean).join(', ');

      // Tracking data uit livefeed item
      const opens = parseInt(ev.numOpens) || 0;
      const clicks = parseInt(ev.numClicks) || 0;
      const replied = !!(ev.wasReplied || ev.replied);

      // Match op message ID
      let existing = msgId ? DB.emailHistory.find(e => e.mixmax_id === msgId) : null;

      // Als geen match op ID, probeer op recipient email
      if (!existing && recipEmails) {
        const recip = recipEmails.toLowerCase();
        existing = DB.emailHistory.find(e => e.mixmax_id && recip.split(',').some(r => (e.to||'').toLowerCase().includes(r.trim())));
      }

      if (!existing) { unmatched++; continue; }
      matched++;

      // Update tracking met absolute waarden (niet incrementeel)
      if (opens > (existing.mixmax_opens||0)) { existing.mixmax_opens = opens; trackingUpdated++; }
      if (clicks > (existing.mixmax_clicks||0)) { existing.mixmax_clicks = clicks; trackingUpdated++; }
      if (replied && !existing.mixmax_replied) { existing.mixmax_replied = true; trackingUpdated++; }
    }
    DB.lastMixmaxLivefeedSync = new Date().toISOString();
    localStorage.setItem('optistaal_crm_mixmax_livefeed_sync', DB.lastMixmaxLivefeedSync);
    DB.save();
    if (!silent) {
      toast('Livefeed: ' + events.length + ' items, ' + matched + ' gekoppeld, ' + trackingUpdated + ' tracking updates', 'success');
    } else if (trackingUpdated > 0) {
      toast('Mixmax livefeed: ' + trackingUpdated + ' tracking-updates', 'info');
    }
    console.log('[Mixmax livefeed]', { events: events.length, matched, unmatched, trackingUpdated, methode: silent ? 'silent' : 'manueel' });
    if (!silent) renderPage();
  } catch (err) {
    if (!silent) toast('Livefeed fout: ' + err.message, 'error');
    console.error('Livefeed error:', err);
  }
}

// GMAIL INBOX SYNC (via Google Apps Script + Supabase CORS proxy)
// ================================================================
const GMAIL_SYNC_PROXY = 'https://lokhqftkaslfmkmjglix.supabase.co/functions/v1/gmail-sync-proxy';
const GMAIL_SYNC_URL   = 'https://lokhqftkaslfmkmjglix.supabase.co/functions/v1/gmail-sync';
const GMAIL_SEND_URL   = 'https://lokhqftkaslfmkmjglix.supabase.co/functions/v1/gmail-send';
const GMAIL_OAUTH_URL  = 'https://lokhqftkaslfmkmjglix.supabase.co/functions/v1/gmail-oauth-callback';

async function syncGmailInbox(silent) {
  if (!silent) toast('Gmail sync gestart...', 'info');
  try {
    // Probeer eerst directe Gmail API (OAuth); anders fallback naar Apps Script proxy
    let resp, usingDirect = false;
    const statusCheck = await fetch(GMAIL_SEND_URL).then(r => r.json()).catch(() => ({ connected: false }));
    if (statusCheck.connected) {
      // Directe Gmail API via OAuth — snel en betrouwbaar
      resp = await fetch(GMAIL_SYNC_URL + '?dagen=' + (DB.gmailSyncDagen||90) + '&max=' + (DB.gmailSyncMax||150));
      usingDirect = true;
    } else if (DB.gmailSyncUrl) {
      // Fallback: Apps Script proxy
      resp = await fetch(GMAIL_SYNC_PROXY + '?url=' + encodeURIComponent(DB.gmailSyncUrl));
    } else {
      if (!silent) toast('Gmail niet verbonden. Ga naar Instellingen → Gmail Verbinding.', 'error');
      return;
    }
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();

    if (data.error) throw new Error(data.error);

    const emails = data.emails || [];
    if (!Array.isArray(emails)) { if (!silent) toast('Onverwacht Gmail formaat', 'error'); return; }

    let added = 0, updated = 0;
    for (const em of emails) {
      const existIdx = DB.emailHistory.findIndex(h =>
        (em.gmail_id && h.gmail_id && h.gmail_id === em.gmail_id) ||
        (em.mixmax_id && h.mixmax_id && h.mixmax_id === em.mixmax_id) ||
        (!em.gmail_id && !em.mixmax_id && h.onderwerp === em.onderwerp && h.datum === em.datum && String(h.to||'') === String(em.to||''))
      );
      if (existIdx >= 0) {
        const ex = DB.emailHistory[existIdx];
        if (em.snippet && (!ex.snippet || ex.snippet.length < em.snippet.length)) ex.snippet = em.snippet;
        if (em.has_pdf !== undefined) ex.has_pdf = em.has_pdf;
        if (em.gmail_id && !ex.gmail_id) ex.gmail_id = em.gmail_id;
        if (em.from_naam && !ex.from_naam) ex.from_naam = em.from_naam;
        if (em.iso_datum && !ex.iso_datum) ex.iso_datum = em.iso_datum;
        if (em.richting && !ex.richting) ex.richting = em.richting;
        updated++;
      } else {
        DB.emailHistory.push(em);
        added++;
      }
    }
    // Persisteer gesyncte mails naar Supabase (zelfde project als de CRM-data),
    // zodat ze niet meer verdwijnen zodra het geheugen uit Supabase wordt ververst.
    try { if (window.sbHelpers && window.sbHelpers.upsertEmails) await window.sbHelpers.upsertEmails(emails); }
    catch(e) { console.warn('Email-persist naar Supabase mislukt:', e); }
    DB.lastGmailSync = new Date().toISOString();
    localStorage.setItem('optistaal_crm_last_gmail_sync', DB.lastGmailSync);
    DB.save();
    if (!silent) toast('Gmail sync: ' + added + ' nieuw, ' + updated + ' bijgewerkt (van ' + emails.length + ' berichten)' + (usingDirect ? ' ✓ direct' : ''), 'success');
    console.log('Gmail sync:', { totaal: emails.length, nieuw: added, bijgewerkt: updated, methode: usingDirect ? 'directe API' : 'Apps Script' });
    const syncEl = document.getElementById('gmailLastSync');
    if (syncEl) syncEl.textContent = new Date(DB.lastGmailSync).toLocaleString('nl-NL');
    // Auto-detectie offerte verstuurd: scan uitgaande mails met PDF + subject-match
    try { await detecteerOfferteVersturingen(); } catch(e) { console.warn('Offerte-detectie fout:', e); }
    try { await detecteerEersteOffertePerMailActiviteit(); } catch(e) { console.warn('Eerste-offerte mail-activiteit detectie fout:', e); }
    renderPage();
  } catch (err) {
    if (!silent) toast('Gmail sync fout: ' + err.message, 'error');
    console.error('Gmail sync error:', err);
  }
}

// ================================================================
// LEAD ANALYSE — Automatisch advies op basis van alle lead-data
// ================================================================
function analyzeLead(leadId) {
  const lead = DB.leads.find(l => l.id === leadId);
  if (!lead) return;
  const now = new Date();
  const adviezen = [];

  // 1. Beslisdatum check
  if (lead.beslisdatum) {
    const bd = new Date(lead.beslisdatum);
    const dagenOver = Math.floor((now - bd) / 86400000);
    if (dagenOver > 0) {
      adviezen.push({ prio: 'hoog', icon: '&#9888;', titel: 'Beslisdatum verlopen',
        tekst: 'De beslisdatum is ' + dagenOver + ' dagen geleden verlopen (' + formatDate(lead.beslisdatum) + '). Stel een nieuwe datum in of neem contact op.',
        actie: 'beslisdatum' });
    } else if (dagenOver > -7) {
      adviezen.push({ prio: 'midden', icon: '&#9200;', titel: 'Beslisdatum nadert',
        tekst: 'Nog ' + Math.abs(dagenOver) + ' dagen tot de beslisdatum. Overweeg een follow-up.',
        actie: 'contact' });
    }
  } else {
    adviezen.push({ prio: 'laag', icon: '&#128197;', titel: 'Geen beslisdatum',
      tekst: 'Er is nog geen beslisdatum ingesteld. Dit maakt opvolging lastig.',
      actie: 'beslisdatum' });
  }

  // 2. E-mail activiteit
  const emails = DB.getEmailsForLead(lead);
  const uitgaand = emails.filter(e => e.richting === 'uitgaand');
  const inkomend = emails.filter(e => e.richting === 'inkomend');
  const laatsteMail = emails[0];
  if (laatsteMail) {
    const mailDatum = new Date(laatsteMail.iso_datum || laatsteMail.datum);
    const dagenGeleden = Math.floor((now - mailDatum) / 86400000);
    if (dagenGeleden > 14) {
      adviezen.push({ prio: 'hoog', icon: '&#9993;', titel: 'Lang geen contact',
        tekst: 'Laatste e-mail is ' + dagenGeleden + ' dagen geleden. Stuur een follow-up of bel.',
        actie: 'contact' });
    } else if (dagenGeleden > 7) {
      adviezen.push({ prio: 'midden', icon: '&#9993;', titel: 'Opvolging nodig',
        tekst: 'Laatste e-mail is ' + dagenGeleden + ' dagen geleden.',
        actie: 'contact' });
    }
    if (inkomend.length > 0 && inkomend[0] === laatsteMail) {
      adviezen.push({ prio: 'hoog', icon: '&#8617;', titel: 'Klant wacht op antwoord',
        tekst: 'De laatste e-mail is een inkomend bericht van de klant. Reageer zo snel mogelijk.',
        actie: 'contact' });
    }
  } else {
    if (lead.email) {
      adviezen.push({ prio: 'midden', icon: '&#9993;', titel: 'Nog geen e-mailcontact',
        tekst: 'Er is nog geen e-mail uitgewisseld met deze lead. Stuur een eerste mail.',
        actie: 'contact' });
    }
  }

  // 3. Mixmax engagement
  const emailStatus = DB.getEmailStatusForLead(lead);
  if (emailStatus.opens > 0 && emailStatus.clicks === 0 && emailStatus.replies === 0) {
    adviezen.push({ prio: 'midden', icon: '&#128065;', titel: 'Geopend maar geen reactie',
      tekst: 'E-mails zijn ' + emailStatus.opens + 'x geopend maar niet beantwoord. De klant is geïnteresseerd maar twijfelt. Bel op.',
      actie: 'bellen' });
  }
  if (emailStatus.clicks > 0 && emailStatus.replies === 0) {
    adviezen.push({ prio: 'hoog', icon: '&#128279;', titel: 'Links geklikt, geen reply',
      tekst: 'De klant heeft ' + emailStatus.clicks + 'x op links geklikt (waarschijnlijk offerte bekeken). Dit is een warm signaal — bel direct.',
      actie: 'bellen' });
  }

  // 4. Slagkans beoordeling
  const kans = parseFloat(lead.scoringskans) || 0;
  const bedrag = parseFloat(lead.verkoopprijs_excl || lead.offertebedrag) || 0;
  if (kans >= 60 && bedrag > 0) {
    adviezen.push({ prio: 'hoog', icon: '&#11088;', titel: 'Hoge slagkans + offertebedrag',
      tekst: 'Slagkans ' + kans + '% met offertebedrag ' + formatBedrag(bedrag) + '. Dit is een prioriteitslead.',
      actie: null });
  }
  if (kans <= 20 && kans > 0 && emailStatus.clicks > 0) {
    adviezen.push({ prio: 'midden', icon: '&#128200;', titel: 'Slagkans mogelijk te laag',
      tekst: 'De slagkans staat op ' + kans + '% maar de klant klikt actief op links. Overweeg de kans te verhogen.',
      actie: 'kans' });
  }

  // 5. Notitie-analyse
  const notities = lead.notities || [];
  const recenteNotities = notities.filter(n => {
    const nd = new Date(n.datum);
    return (now - nd) < 30 * 86400000;
  });
  if (notities.length > 0 && recenteNotities.length === 0) {
    adviezen.push({ prio: 'laag', icon: '&#128221;', titel: 'Geen recente notities',
      tekst: 'Laatste notitie is ouder dan 30 dagen. Voeg een update toe over de huidige stand van zaken.',
      actie: null });
  }
  // Zoek naar negatieve signalen in notities
  const negatiefPatroon = /annuleer|afzeg|twijfel|duur|te duur|ander|concurrent|geen interesse|uitgesteld|on hold/i;
  const negNotities = notities.filter(n => negatiefPatroon.test(n.inhoud || ''));
  if (negNotities.length > 0 && kans > 40) {
    adviezen.push({ prio: 'midden', icon: '&#9888;', titel: 'Negatieve signalen in notities',
      tekst: 'Er zijn notities met mogelijke negatieve signalen (twijfel, concurrent, etc.) maar de slagkans staat nog op ' + kans + '%. Klopt dit nog?',
      actie: 'kans' });
  }
  // Zoek naar positieve signalen
  const positiefPatroon = /akkoord|besteld|opdracht|go|groen licht|start|getekend|betaald|aanbetaling/i;
  const posNotities = notities.filter(n => positiefPatroon.test(n.inhoud || ''));
  if (posNotities.length > 0 && kans < 70) {
    adviezen.push({ prio: 'midden', icon: '&#128200;', titel: 'Positieve signalen in notities',
      tekst: 'Notities bevatten positieve signalen (akkoord, opdracht, etc.) maar de slagkans staat op ' + kans + '%. Verhoog de kans.',
      actie: 'kans' });
  }

  // 6. Taken check
  const openTaken = (lead.taken || []).filter(t => t.status !== 'afgerond');
  const verlopenTaken = openTaken.filter(t => t.deadline && new Date(t.deadline) < now);
  if (verlopenTaken.length > 0) {
    adviezen.push({ prio: 'hoog', icon: '&#9745;', titel: verlopenTaken.length + ' verlopen taken',
      tekst: 'Er zijn open taken waarvan de deadline verlopen is. Rond ze af of stel ze bij.',
      actie: null });
  }

  // 7. Vergunning check
  if (lead.vergunning_status && /wacht|aangevraagd|in behandeling/i.test(lead.vergunning_status)) {
    adviezen.push({ prio: 'laag', icon: '&#127959;', titel: 'Vergunning in behandeling',
      tekst: 'De vergunningsstatus is "' + lead.vergunning_status + '". Neem periodiek contact op voor updates.',
      actie: null });
  }

  // 8. Offertebedrag check
  if (!bedrag && lead.breedte && lead.lengte) {
    adviezen.push({ prio: 'midden', icon: '&#128176;', titel: 'Geen offertebedrag',
      tekst: 'Er zijn bouwgegevens aanwezig maar nog geen offertebedrag. Maak een offerte.',
      actie: null });
  }

  // Sorteer op prioriteit
  const prioOrd = { hoog: 0, midden: 1, laag: 2 };
  adviezen.sort((a, b) => prioOrd[a.prio] - prioOrd[b.prio]);

  // Samenvatting
  const score = lead.lead_score || 0;
  let samenvatting = '';
  if (adviezen.filter(a => a.prio === 'hoog').length === 0) {
    samenvatting = 'Deze lead ziet er goed uit. Geen urgente acties nodig.';
  } else {
    samenvatting = adviezen.filter(a => a.prio === 'hoog').length + ' urgente actiepunten gevonden.';
  }

  // Bouw modal
  const prioKleuren = { hoog: 'var(--roest)', midden: 'var(--koper)', laag: 'var(--beton)' };
  const prioLabels = { hoog: 'URGENT', midden: 'AANDACHT', laag: 'INFO' };
  const adviesHTML = adviezen.length ? adviezen.map(a => {
    let actieBtn = '';
    if (a.actie === 'beslisdatum') actieBtn = '<button class="btn btn-sm btn-outline" style="margin-top:6px" onclick="closeModal();toggleLeadEditMode()">Beslisdatum aanpassen</button>';
    if (a.actie === 'contact') actieBtn = '<button class="btn btn-sm btn-primary" style="margin-top:6px" onclick="closeModal();showAddNoteModal(\''+leadId+'\')">Notitie toevoegen</button> <button class="btn btn-sm btn-secondary" style="margin-top:6px" onclick="closeModal();generateStatusMail(\''+leadId+'\')">Statusmail sturen</button>';
    if (a.actie === 'bellen') actieBtn = '<button class="btn btn-sm btn-primary" style="margin-top:6px" onclick="closeModal();showAddTaskModal(\''+leadId+'\')">Belactie inplannen</button>';
    if (a.actie === 'kans') actieBtn = '<button class="btn btn-sm btn-outline" style="margin-top:6px" onclick="closeModal();toggleLeadEditMode()">Slagkans aanpassen</button>';
    return '<div style="padding:12px 16px;border-left:4px solid '+prioKleuren[a.prio]+';background:'+prioKleuren[a.prio]+'08;border-radius:0 8px 8px 0;margin-bottom:8px">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:16px">'+a.icon+'</span><span style="font-weight:700;font-size:13px;color:'+prioKleuren[a.prio]+'">'+prioLabels[a.prio]+'</span><span style="font-weight:700;font-size:13px">'+a.titel+'</span></div>'+
      '<p style="font-size:12px;color:var(--staalgrijs);margin:0">'+a.tekst+'</p>'+actieBtn+'</div>';
  }).join('') : '<p style="color:var(--success);font-weight:600;text-align:center;padding:20px">Geen verbeterpunten gevonden. Deze lead is up-to-date.</p>';

  openModal('🔬 Analyse: ' + esc(lead.naam), `
    <div style="background:var(--papier);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:16px">
      <div style="text-align:center"><div style="font-size:28px;font-weight:800;color:${scoreColor(score)}">${score}</div><div style="font-size:10px;color:var(--beton)">Lead Score</div></div>
      <div style="text-align:center"><div style="font-size:28px;font-weight:800;color:var(--petrol)">${kans}%</div><div style="font-size:10px;color:var(--beton)">Slagkans</div></div>
      <div style="text-align:center"><div style="font-size:28px;font-weight:800">${emails.length}</div><div style="font-size:10px;color:var(--beton)">E-mails</div></div>
      <div style="text-align:center"><div style="font-size:28px;font-weight:800">${notities.length}</div><div style="font-size:10px;color:var(--beton)">Notities</div></div>
      <div style="flex:1;text-align:right;font-size:12px;color:var(--staalgrijs)">${samenvatting}</div>
    </div>
    <div style="max-height:400px;overflow-y:auto">${adviesHTML}</div>
  `, '<button class="btn btn-outline" onclick="closeModal()">Sluiten</button>');
}

function wgs84ToRd(lat, lon) {
  const phi0=52.1551744, lambda0=5.38720621, x0=155000, y0=463000;
  const dP=0.36*(lat-phi0), dL=0.36*(lon-lambda0);
  const x=x0+190094.945*dL-11832.228*dL*dP-114.221*dL*dP*dP-32.391*dL*dL*dL-2.34*dL*dL*dL*dP-0.608*dL*dP*dP*dP-0.008*dP+0.148*dL*dL*dL*dP*dP*dP;
  const y=y0+309056.544*dP+3638.893*dL*dL+73.077*dP*dP-157.984*dL*dL*dP+59.788*dP*dP*dP+0.433*dL-6.439*dL*dL*dP*dP-0.032*dL*dP+0.092*dL*dL*dL*dL-0.054*dL*dL*dL*dL*dP;
  return {x:Math.round(x),y:Math.round(y)};
}

function calculateWindgebied(lat, lon, provincie, gemeente) {
  // Bron: NEN-EN 1991-1-4 Nationale Bijlage, figuur NB.1
  // Waddeneilanden = altijd Zone I
  const wadden = ['texel','vlieland','terschelling','ameland','schiermonnikoog'];
  const gem = (gemeente||'').toLowerCase().trim();
  if (wadden.some(w => gem.includes(w))) return 'I (kustgebied)';
  const prov = (provincie||'').toLowerCase().trim();
  // Zone III: Drenthe, Overijssel, Gelderland, Utrecht, Noord-Brabant, Limburg
  if (['drenthe','overijssel','gelderland','utrecht','noord-brabant','limburg'].some(p => prov.includes(p))) return 'III (binnenland)';
  // Zone II volledig: Zuid-Holland, Zeeland, Flevoland, Groningen, Friesland (vasteland)
  if (['zuid-holland','zeeland','flevoland'].some(p => prov.includes(p))) return 'II (overgangsgebied)';
  if (prov.includes('groningen') || prov.includes('friesland') || prov.includes('frysl')) return 'II (overgangsgebied)';
  // Noord-Holland: boven Heemskerk/Uitgeest/Wormerland/Purmerend/Edam-Volendam = Zone I
  if (prov.includes('noord-holland')) {
    return lat > 52.50 ? 'I (kustgebied)' : 'II (overgangsgebied)';
  }
  // Fallback als provincie onbekend: schatting op basis van lon
  if (lon < 5.0 && lat > 52.5) return 'I (kustgebied)';
  if (lon < 5.5) return 'II (overgangsgebied)';
  return 'III (binnenland)';
}

function getPolygonCentroid(geometry) {
  if(!geometry)return null;
  let coords;
  if(geometry.type==='Polygon') coords=geometry.coordinates[0];
  else if(geometry.type==='MultiPolygon') coords=geometry.coordinates[0][0];
  else return null;
  let sLon=0,sLat=0;
  for(const c of coords){sLon+=c[0];sLat+=c[1];}
  return {lon:sLon/coords.length,lat:sLat/coords.length};
}

async function locatieOpzoeken(leadId) {
  const lead = DB.leads.find(l=>l.id===leadId);
  if(!lead) return;

  // Bouw adres query
  const adres = (lead.bouwlocatie||lead.adres||'').trim();
  const postcode = (lead.postcode||'').trim();
  const plaats = (lead.plaats||'').trim();

  if(!adres && !postcode && !plaats) {
    toast('Geen adres/postcode/plaats ingevuld bij deze lead','error');
    return;
  }

  // Valideer compleetheid van het adres
  const heeftHuisnummer = adres && /[a-zA-Z]/.test(adres) && /\d/.test(adres);
  const geldigePostcode = postcode && /^\s*\d{4}\s*[a-zA-Z]{2}\s*$/.test(postcode);
  const geldigePlaats = plaats && /^[a-zA-Z\s\-']{2,}$/.test(plaats);
  const adresCompleet = heeftHuisnummer && (geldigePostcode || geldigePlaats);
  const regioMogelijk = geldigePostcode || geldigePlaats;

  if(!regioMogelijk) {
    toast('Adres te incompleet voor locatie-opzoeken. Vul minimaal een geldige postcode of plaatsnaam in.','error');
    return;
  }

  if(!adresCompleet) {
    toast('Adres incompleet (geen huisnummer) — alleen regio-gegevens worden opgehaald, geen perceeldata.','warning');
  }

  toast('Locatie opzoeken...','info');
  const btn = document.getElementById('locatieBtn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Zoeken...';}

  try {
    // Stap 1: Geocoding via PDOK
    const query = [adres, postcode, plaats].filter(Boolean).join(' ');
    const geoResp = await fetch('https://api.pdok.nl/bzk/locatieserver/search/v3_1/free?q='+encodeURIComponent(query)+'&fq=type:adres&rows=1');
    if(!geoResp.ok) throw new Error('PDOK geocoding mislukt');
    const geoData = await geoResp.json();
    const doc = geoData.response?.docs?.[0];
    if(!doc || !doc.centroide_ll) {
      toast('Adres niet gevonden in PDOK. Controleer bouwlocatie/adres.','error');
      return;
    }

    const coords = doc.centroide_ll.replace('POINT(','').replace(')','').split(' ');
    const lon = parseFloat(coords[0]);
    const lat = parseFloat(coords[1]);
    if(isNaN(lat)||isNaN(lon)) throw new Error('Ongeldige coördinaten');

    console.log('Locatie gevonden:', lat, lon, doc.weergavenaam);

    // Stap 2: PDOK lookup voor extra details (gemeente, provincie, wijk, buurt)
    let pdokDetails = {};
    try {
      const lookupResp = await fetch('https://api.pdok.nl/bzk/locatieserver/search/v3_1/lookup?id='+encodeURIComponent(doc.id));
      if(lookupResp.ok) {
        const lookupData = await lookupResp.json();
        const ld = lookupData.response?.docs?.[0];
        if(ld) {
          pdokDetails = {
            adres_volledig: ld.weergavenaam||doc.weergavenaam,
            provincie: ld.provincienaam,
            gemeente: ld.gemeentenaam,
            wijk: ld.wijknaam,
            buurt: ld.buurtnaam,
            waterschap: ld.waterschapsnaam,
          };
        }
      }
    } catch(e) { console.warn('PDOK lookup fout:', e); }

    // Stap 3: Windgebied berekenen (kan altijd op basis van coördinaten)
    const windgebied = calculateWindgebied(lat, lon, pdokDetails.provincie, pdokDetails.gemeente);

    // Stap 4: Basis locatieData (altijd beschikbaar)
    lead.locatieData = {
      latitude: lat,
      longitude: lon,
      opgehaald: new Date().toISOString(),
      adres_volledig: pdokDetails.adres_volledig || '',
      provincie: pdokDetails.provincie || '',
      gemeente: pdokDetails.gemeente || '',
      windgebied,
    };

    // Stap 5: Perceeldata ALLEEN ophalen als adres compleet is (met huisnummer)
    if(adresCompleet) {
      console.log('Adres compleet — ophalen perceeldata (BRK, BAG, Erfgoed, AHN, Bodem)...');
      const [brkData, bagData, erfgoedData, ahnHoogte, bodemData] = await Promise.all([
        fetchBRKData(lat, lon),
        fetchBAGData(lat, lon),
        fetchErfgoedData(lat, lon),
        fetchAHNHoogte(lat, lon),
        fetchBodemData(lat, lon),
      ]);
      console.log('Perceeldata resultaten:', {ahnHoogte, bodemData, brkData: !!brkData, bagData: !!bagData});

      // Ruimtelijke Plannen (apart, want kan traag zijn)
      let rpData = {};
      try {
        rpData = await fetchRuimtelijkePlannenData(lat, lon) || {};
      } catch(e) { console.warn('Ruimtelijke Plannen fout:', e); }

      // Perceelgegevens toevoegen
      Object.assign(lead.locatieData, {
        wijk: pdokDetails.wijk || '',
        buurt: pdokDetails.buurt || '',
        waterschap: pdokDetails.waterschap || '',
        // BRK
        perceeloppervlakte: brkData?.perceeloppervlakte,
        kadastraleAanduiding: brkData?.perceelcode,
        kadastraleGemeente: brkData?.kadastraleGemeente,
        sectie: brkData?.sectie,
        perceelnummer: brkData?.perceelnummer,
        // BAG
        gebruiksoppervlakte: bagData?.gebruiksoppervlakte,
        gebruiksdoel: bagData?.gebruiksdoel,
        // Erfgoed
        isRijksmonument: erfgoedData?.isRijksmonument||false,
        rijksmonumentNummer: erfgoedData?.rijksmonumentNummer,
        rijksmonumentNaam: erfgoedData?.rijksmonumentNaam,
        isBeschermdStadsgezicht: erfgoedData?.isBeschermdStadsgezicht||false,
        // Ruimtelijke plannen
        bestemming: rpData.bestemming,
        plantype: rpData.plantype,
        plannaam: rpData.plannaam,
        bouwhoogte: rpData.bouwhoogte,
        goothoogte: rpData.goothoogte,
        bouwvlakInfo: rpData.bouwvlakInfo,
        gebiedsaanduidingen: rpData.gebiedsaanduidingen||[],
        allePlannen: rpData.allePlannen||[],
        omgevingsloketUrl: rpData.omgevingsloketUrl,
        // AHN maaiveldhoogte
        maaiveldhoogte: ahnHoogte,
        // Bodem
        bodemtype: bodemData?.bodemtype||null,
        bodemcode: bodemData?.bodemcode||null,
        grondsoort: bodemData?.grondsoort||null,
      });
      toast('Locatiegegevens compleet opgehaald!','success');
    } else {
      console.warn('Adres incompleet (geen huisnummer) — perceeldata overgeslagen');
      toast('Regio-gegevens opgehaald (provincie, gemeente, windgebied). Perceeldata niet beschikbaar zonder huisnummer.','warning');
    }

    // Vul provincie in als die nog leeg is
    if(!lead.provincie && pdokDetails.provincie) lead.provincie = pdokDetails.provincie;

    lead.laatst_gewijzigd = new Date().toISOString();
    DB.save();
    renderLeadDetail();

  } catch(err) {
    console.error('Locatie opzoeken fout:', err);
    toast('Locatie opzoeken mislukt: '+err.message,'error');
  } finally {
    if(btn){btn.disabled=false;btn.textContent='📍 Locatie opzoeken';}
  }
}

async function fetchBRKData(lat, lon) {
  try {
    const delta=0.0005;
    const bbox=`${lat-delta},${lon-delta},${lat+delta},${lon+delta},EPSG:4326`;
    const url=`https://service.pdok.nl/kadaster/kadastralekaart/wfs/v5_0?service=WFS&version=1.1.0&request=GetFeature&typeName=kadastralekaartv5:perceel&outputFormat=json&srsName=EPSG:4326&bbox=${bbox}`;
    const resp=await fetch(url);
    if(!resp.ok) return null;
    const data=await resp.json();
    if(!data.features||data.features.length===0) return null;

    // Zoek feature dichtst bij het punt
    let best=null, minDist=Infinity;
    for(const f of data.features){
      const c=getPolygonCentroid(f.geometry);
      if(c){const d=Math.sqrt(Math.pow(c.lon-lon,2)+Math.pow(c.lat-lat,2));if(d<minDist){minDist=d;best=f;}}
    }
    if(!best) best=data.features[0];

    const p=best.properties;
    return {
      perceeloppervlakte: p.kadastraleGrootteWaarde||null,
      kadastraleGemeente: p.kadastraleGemeenteWaarde||p.AKRKadastraleGemeenteCodeWaarde||null,
      sectie: p.sectie||null,
      perceelnummer: p.perceelnummer||null,
      perceelcode: p.AKRKadastraleGemeenteCodeWaarde&&p.sectie&&p.perceelnummer ? p.AKRKadastraleGemeenteCodeWaarde+'-'+p.sectie+'-'+p.perceelnummer : null,
    };
  } catch(e){console.warn('BRK fout:',e);return null;}
}

async function fetchBAGData(lat, lon) {
  try {
    const delta=0.0002;
    // Probeer WFS 2.0.0 formaat (lon,lat)
    const bbox=`${lon-delta},${lat-delta},${lon+delta},${lat+delta},EPSG:4326`;
    const url=`https://service.pdok.nl/lv/bag/wfs/v2_0?service=WFS&version=2.0.0&request=GetFeature&typeName=bag:verblijfsobject&outputFormat=json&srsName=EPSG:4326&bbox=${bbox}`;
    const resp=await fetch(url);
    if(!resp.ok) return null;
    const data=await resp.json();
    if(!data.features||data.features.length===0) {
      // Probeer alternatief formaat (lat,lon) met WFS 1.1.0
      const bbox2=`${lat-delta},${lon-delta},${lat+delta},${lon+delta},EPSG:4326`;
      const url2=`https://service.pdok.nl/lv/bag/wfs/v2_0?service=WFS&version=1.1.0&request=GetFeature&typeName=bag:verblijfsobject&outputFormat=json&srsName=EPSG:4326&bbox=${bbox2}`;
      const resp2=await fetch(url2);
      if(!resp2.ok) return null;
      const data2=await resp2.json();
      if(!data2.features||data2.features.length===0) return null;
      const p2=data2.features[0].properties;
      return {gebruiksoppervlakte:p2.oppervlakte||null,gebruiksdoel:p2.gebruiksdoel||null};
    }
    const p=data.features[0].properties;
    return {gebruiksoppervlakte:p.oppervlakte||null,gebruiksdoel:p.gebruiksdoel||null};
  } catch(e){console.warn('BAG fout:',e);return null;}
}

async function fetchErfgoedData(lat, lon) {
  const result={isBeschermdStadsgezicht:false,isRijksmonument:false,rijksmonumentNummer:null,rijksmonumentNaam:null};
  try {
    const bbox=`${lon-0.001},${lat-0.001},${lon+0.001},${lat+0.001}`;
    // Rijksmonumenten (punten)
    const pUrl=`https://api.pdok.nl/rce/beschermde-gebieden-cultuurhistorie/ogc/v1/collections/rce_inspire_points/items?bbox=${bbox}&f=json&limit=50`;
    try {
      const pr=await fetch(pUrl);
      if(pr.ok){
        const pd=await pr.json();
        for(const f of (pd.features||[])){
          const p=f.properties||{};
          const cls=(p.siteprotectionclassification||'').toLowerCase();
          const des=(p.designation||'').toLowerCase();
          const txt=(p.text||'').toLowerCase();
          const lid=(p.localid||'');
          if(cls.includes('rijksmonument')||des.includes('rijksmonument')||lid.toLowerCase().includes('rm')){
            result.isRijksmonument=true;
            const m=lid.match(/RM\.?(\d+)/i)||lid.match(/(\d{4,})/);
            result.rijksmonumentNummer=m?m[1]:lid;
            result.rijksmonumentNaam=p.text||null;
          }
          if(cls.includes('stadsgezicht')||cls.includes('dorpsgezicht')||des.includes('stadsgezicht')) result.isBeschermdStadsgezicht=true;
        }
      }
    }catch(e){}
    // Beschermde gebieden (polygonen)
    const pgUrl=`https://api.pdok.nl/rce/beschermde-gebieden-cultuurhistorie/ogc/v1/collections/rce_inspire_polygons/items?bbox=${bbox}&f=json&limit=50`;
    try {
      const pgr=await fetch(pgUrl);
      if(pgr.ok){
        const pgd=await pgr.json();
        for(const f of (pgd.features||[])){
          const p=f.properties||{};
          const cls=(p.siteprotectionclassification||'').toLowerCase();
          const des=(p.designation||'').toLowerCase();
          if(cls.includes('stadsgezicht')||cls.includes('dorpsgezicht')||des.includes('stadsgezicht')) result.isBeschermdStadsgezicht=true;
          if(!result.isRijksmonument&&(cls.includes('rijksmonument')||des.includes('rijksmonument'))){
            result.isRijksmonument=true;
            const lid=(p.localid||'');
            const m=lid.match(/RM\.?(\d+)/i)||lid.match(/(\d{4,})/);
            result.rijksmonumentNummer=m?m[1]:lid;
            result.rijksmonumentNaam=p.text||null;
          }
        }
      }
    }catch(e){}
  }catch(e){console.warn('Erfgoed fout:',e);}
  return result;
}

async function fetchRuimtelijkePlannenData(lat, lon) {
  const apiKey=DB.ruimtelijkePlannenApiKey;
  if(!apiKey) return null;
  const baseUrl='https://ruimte.omgevingswet.overheid.nl/ruimtelijke-plannen/api/opvragen/v4';
  const rd=wgs84ToRd(lat,lon);
  const result={bestemming:null,plantype:null,plannaam:null,bouwhoogte:null,goothoogte:null,bouwvlakInfo:null,gebiedsaanduidingen:[],allePlannen:[],omgevingsloketUrl:`https://omgevingswet.overheid.nl/regels-op-de-kaart/viewer/locatie/${lat.toFixed(6)}/${lon.toFixed(6)}`};

  try {
    const geo={type:'Polygon',coordinates:[[[rd.x-1,rd.y-1],[rd.x+1,rd.y-1],[rd.x+1,rd.y+1],[rd.x-1,rd.y+1],[rd.x-1,rd.y-1]]]};
    const headers={'Accept':'application/hal+json','Content-Type':'application/json','x-api-key':apiKey,'Content-Crs':'epsg:28992','Accept-Crs':'epsg:28992'};
    const body=JSON.stringify({_geo:{intersects:geo},planstatus:['vastgesteld','onherroepelijk','vigerend']});

    const planResp=await fetch(baseUrl+'/plannen/_zoek?_pageSize=50',{method:'POST',headers,body});
    if(!planResp.ok){console.warn('Ruimtelijke Plannen API:',planResp.status);return result;}
    const planData=await planResp.json();
    let plannen=planData._embedded?.plannen||[];
    if(plannen.length===0) return result;

    // Categoriseer
    const hoofd=[],paraplu=[],overig=[];
    for(const p of plannen){
      const naam=(p.naam||'').toLowerCase();
      const type=(p.type||p.typePlan||'').toLowerCase();
      const status=(p.planstatusInfo?.planstatus||'').toLowerCase();
      if(!['vastgesteld','onherroepelijk','vigerend'].includes(status)) continue;
      if(naam.includes('paraplu')||naam.includes('facet')) paraplu.push(p);
      else if(type.includes('bestemmingsplan')) hoofd.push(p);
      else overig.push(p);
    }

    result.allePlannen=plannen.map(p=>p.naam).filter(Boolean).slice(0,5);
    const toProcess=[...hoofd,...paraplu,...overig].slice(0,3);
    if(toProcess.length===0) return result;

    const main=toProcess[0];
    result.plannaam=main.naam||null;
    result.plantype=main.type||main.typePlan||null;

    // Haal details op van eerste plan
    const geoBody=JSON.stringify({_geo:{intersects:geo}});
    for(const plan of toProcess){
      const pid=plan.identificatie||plan.id;
      if(!pid) continue;

      const [bestR,maatR,gebR,bouwR]=await Promise.all([
        fetch(baseUrl+'/plannen/'+encodeURIComponent(pid)+'/bestemmingsvlakken/_zoek?_pageSize=10',{method:'POST',headers,body:geoBody}).catch(()=>null),
        fetch(baseUrl+'/plannen/'+encodeURIComponent(pid)+'/maatvoeringen/_zoek?_pageSize=20',{method:'POST',headers,body:geoBody}).catch(()=>null),
        fetch(baseUrl+'/plannen/'+encodeURIComponent(pid)+'/gebiedsaanduidingen/_zoek?_pageSize=20',{method:'POST',headers,body:geoBody}).catch(()=>null),
        fetch(baseUrl+'/plannen/'+encodeURIComponent(pid)+'/bouwvlakken/_zoek?_pageSize=10',{method:'POST',headers,body:geoBody}).catch(()=>null),
      ]);

      if(!result.bestemming&&bestR?.ok){
        const d=await bestR.json();
        const b=(d._embedded?.bestemmingsvlakken||d._embedded?.bestemmingen||[])[0];
        if(b) result.bestemming=b.naam||b.bestemmingshoofdgroep||b.type||null;
      }
      if(maatR?.ok){
        const d=await maatR.json();
        for(const mv of (d._embedded?.maatvoeringen||[])){
          const n=(mv.naam||mv.omschrijving||'').toLowerCase();
          let w=mv.waarde||mv.waardeNumeriek||null;
          if(!w&&mv.omvang&&Array.isArray(mv.omvang)){for(const o of mv.omvang){if(o.waarde){w=o.waarde;break;}}}
          if(w){
            if(!result.bouwhoogte&&(n.includes('bouwhoogte')||n.includes('maximale hoogte'))) result.bouwhoogte=w+' m';
            if(!result.goothoogte&&n.includes('goothoogte')) result.goothoogte=w+' m';
          }
        }
      }
      if(gebR?.ok){
        const d=await gebR.json();
        for(const ga of (d._embedded?.gebiedsaanduidingen||[])){
          const n=ga.naam||ga.gebiedsaanduidinggroep;
          if(n&&!result.gebiedsaanduidingen.includes(n)) result.gebiedsaanduidingen.push(n);
        }
      }
      if(!result.bouwvlakInfo&&bouwR?.ok){
        const d=await bouwR.json();
        const bv=(d._embedded?.bouwvlakken||[])[0];
        if(bv) result.bouwvlakInfo=bv.naam||'bouwvlak';
      }
    }
    return result;
  }catch(e){console.warn('Ruimtelijke Plannen fout:',e);return result;}
}

async function fetchAHNHoogte(lat, lon) {
  // AHN4 DTM (maaiveld) via WMS GetFeatureInfo
  try {
    const rd = wgs84ToRd(lat, lon);
    const buf = 5;
    const bbox = (rd.x-buf)+','+(rd.y-buf)+','+(rd.x+buf)+','+(rd.y+buf);
    // Probeer eerst 1.1.1 (X,Y), dan 1.3.0 (I,J)
    let data = null;
    for (const ver of ['1.1.1','1.3.0']) {
      const pxParam = ver==='1.1.1' ? 'X=2&Y=2' : 'I=2&J=2';
      const crsParam = ver==='1.1.1' ? 'SRS=EPSG:28992' : 'CRS=EPSG:28992';
      const url = 'https://service.pdok.nl/rws/ahn/wms/v1_0?SERVICE=WMS&VERSION='+ver+'&REQUEST=GetFeatureInfo&LAYERS=dtm_05m&QUERY_LAYERS=dtm_05m&'+crsParam+'&BBOX='+bbox+'&WIDTH=5&HEIGHT=5&'+pxParam+'&INFO_FORMAT=application/json';
      try {
        const resp = await fetch(url);
        if (resp.ok) { data = await resp.json(); break; }
      } catch(e) { continue; }
    }
    if (!data) return null;
    console.log('AHN response:', JSON.stringify(data).slice(0,500));
    const feat = (data.features||[])[0];
    if (feat && feat.properties) {
      // Probeer diverse property namen
      const p = feat.properties;
      const raw = p.value_list ?? p.GRAY_INDEX ?? p.gray_index ?? p.value ?? p.hoogte ?? p.dtm_05m;
      const hoogte = (raw !== null && raw !== undefined) ? parseFloat(raw) : NaN;
      if (!isNaN(hoogte) && hoogte > -10) {
        return Math.round(hoogte * 100) / 100;
      }
    }
    return null;
  } catch(e) { console.warn('AHN hoogte fout:', e); return null; }
}

async function fetchBodemData(lat, lon) {
  // BRO Bodemkaart via WFS (meer betrouwbaar dan WMS GetFeatureInfo)
  try {
    const rd = wgs84ToRd(lat, lon);
    const buf = 100;
    const bbox = (rd.x-buf)+','+(rd.y-buf)+','+(rd.x+buf)+','+(rd.y+buf)+',EPSG:28992';
    // Probeer eerst WFS
    const wfsUrl = 'https://service.pdok.nl/bzk/bro-bodemkaart/wfs/v1_0?SERVICE=WFS&VERSION=2.0.0&REQUEST=GetFeature&TYPENAMES=bodemvlakken&BBOX='+bbox+'&COUNT=1&OUTPUTFORMAT=application/json';
    try {
      const resp = await fetch(wfsUrl);
      if (resp.ok) {
        const data = await resp.json();
        console.log('Bodem WFS response:', JSON.stringify(data).slice(0,500));
        const feat = (data.features||[])[0];
        if (feat && feat.properties) {
          const p = feat.properties;
          return {
            bodemtype: p.bodemsubgroep_omschrijving || p.bodemsubgroep || p.bodemtype || p.omschrijving || p.maparea_name || null,
            bodemcode: p.maparea_code || p.code || p.bodemcode || null,
            grondsoort: p.grondsoort_omschrijving || p.grondsoort || p.grondwatertrap || p.maparea_soilunitcode || null,
          };
        }
      }
    } catch(e) { console.log('WFS bodem poging mislukt, probeer WMS:', e); }
    // Fallback: WMS GetFeatureInfo met grote bbox
    const bbox2 = (rd.x-buf)+','+(rd.y-buf)+','+(rd.x+buf)+','+(rd.y+buf);
    for (const ver of ['1.1.1','1.3.0']) {
      const pxParam = ver==='1.1.1' ? 'X=50&Y=50' : 'I=50&J=50';
      const crsParam = ver==='1.1.1' ? 'SRS=EPSG:28992' : 'CRS=EPSG:28992';
      const url = 'https://service.pdok.nl/bzk/bro-bodemkaart/wms/v1_0?SERVICE=WMS&VERSION='+ver+'&REQUEST=GetFeatureInfo&LAYERS=bodemvlakken&QUERY_LAYERS=bodemvlakken&'+crsParam+'&BBOX='+bbox2+'&WIDTH=100&HEIGHT=100&'+pxParam+'&INFO_FORMAT=application/json';
      try {
        const resp = await fetch(url);
        if (resp.ok) {
          const data = await resp.json();
          console.log('Bodem WMS response:', JSON.stringify(data).slice(0,500));
          const feat = (data.features||[])[0];
          if (feat && feat.properties) {
            const p = feat.properties;
            return {
              bodemtype: p.bodemsubgroep_omschrijving || p.bodemsubgroep || p.bodemtype || p.omschrijving || null,
              bodemcode: p.maparea_code || p.code || p.bodemcode || null,
              grondsoort: p.grondsoort_omschrijving || p.grondsoort || p.grondwatertrap || null,
            };
          }
        }
      } catch(e) { continue; }
    }
    return null;
  } catch(e) { console.warn('Bodemkaart fout:', e); return null; }
}

function diagnoseMixmaxMatching() {
  const emails = DB.emailHistory;
  if (emails.length === 0) { toast('Geen emails in CRM. Sync eerst Mixmax.', 'error'); return; }

  // Verzamel alle unieke to-adressen uit emailHistory
  const allTo = new Set();
  emails.forEach(e => {
    (e.to||'').split(',').forEach(addr => {
      const clean = addr.trim().toLowerCase().replace(/.*<(.+?)>.*/, '$1');
      if (clean && clean.includes('@')) allTo.add(clean);
    });
  });

  // Check leads met en zonder email
  const leadsMetEmail = DB.leads.filter(l => l.email && l.email.trim());
  const leadsZonderEmail = DB.leads.filter(l => !l.email || !l.email.trim());

  // Check matches
  let matched = 0, unmatched = 0;
  const matchedLeads = [];
  const unmatchedEmails = [...allTo];

  leadsMetEmail.forEach(l => {
    const em = l.email.toLowerCase().trim();
    const found = [...allTo].some(a => a.includes(em) || em.includes(a));
    if (found) {
      matched++;
      matchedLeads.push(l.naam + ' (' + l.email + ')');
      // Remove matched email from unmatched list
      const idx = unmatchedEmails.findIndex(a => a.includes(em) || em.includes(a));
      if (idx >= 0) unmatchedEmails.splice(idx, 1);
    } else {
      unmatched++;
    }
  });

  // Toon met tracking data
  const withTracking = emails.filter(e => (e.mixmax_opens||0) > 0 || (e.mixmax_clicks||0) > 0 || e.mixmax_replied);

  let html = `<div style="max-height:500px;overflow-y:auto;font-size:12px">
    <h4 style="margin-bottom:8px">📊 Mixmax Matching Diagnose</h4>
    <table style="width:100%;border-collapse:collapse;margin-bottom:12px">
      <tr><td style="padding:4px 8px;border-bottom:1px solid #eee">Emails in CRM</td><td style="padding:4px 8px;border-bottom:1px solid #eee;font-weight:700">${emails.length}</td></tr>
      <tr><td style="padding:4px 8px;border-bottom:1px solid #eee">Unieke ontvangers</td><td style="padding:4px 8px;border-bottom:1px solid #eee;font-weight:700">${allTo.size}</td></tr>
      <tr><td style="padding:4px 8px;border-bottom:1px solid #eee">Emails met tracking</td><td style="padding:4px 8px;border-bottom:1px solid #eee;font-weight:700">${withTracking.length}</td></tr>
      <tr><td style="padding:4px 8px;border-bottom:1px solid #eee">Leads MET email</td><td style="padding:4px 8px;border-bottom:1px solid #eee;font-weight:700">${leadsMetEmail.length}</td></tr>
      <tr><td style="padding:4px 8px;border-bottom:1px solid #eee">Leads ZONDER email</td><td style="padding:4px 8px;border-bottom:1px solid #eee;font-weight:700;color:${leadsZonderEmail.length > 0 ? 'var(--danger)' : 'var(--success)'}">${leadsZonderEmail.length}</td></tr>
      <tr><td style="padding:4px 8px;border-bottom:1px solid #eee">Gekoppelde leads</td><td style="padding:4px 8px;border-bottom:1px solid #eee;font-weight:700;color:var(--success)">${matched}</td></tr>
    </table>`;

  if (withTracking.length > 0) {
    html += `<h4 style="margin:12px 0 6px">📬 Emails met tracking data:</h4><table style="width:100%;border-collapse:collapse;font-size:11px">
      <tr style="background:#f5f5f5"><th style="padding:4px;text-align:left">Aan</th><th style="padding:4px">Opens</th><th style="padding:4px">Clicks</th><th style="padding:4px">Reply</th><th style="padding:4px;text-align:left">Lead match?</th></tr>`;
    withTracking.forEach(e => {
      const toAddr = (e.to||'').toLowerCase();
      const matchedLead = DB.leads.find(l => l.email && toAddr.includes(l.email.toLowerCase().trim()));
      html += `<tr style="border-bottom:1px solid #eee">
        <td style="padding:4px;max-width:200px;overflow:hidden;text-overflow:ellipsis">${esc(e.to||'')}</td>
        <td style="padding:4px;text-align:center">${e.mixmax_opens||0}</td>
        <td style="padding:4px;text-align:center">${e.mixmax_clicks||0}</td>
        <td style="padding:4px;text-align:center">${e.mixmax_replied ? '✓' : ''}</td>
        <td style="padding:4px;color:${matchedLead ? 'var(--success)' : 'var(--danger)'}">
          ${matchedLead ? '✓ ' + esc(matchedLead.naam) : '✗ Geen match'}
        </td>
      </tr>`;
    });
    html += '</table>';
  }

  if (leadsZonderEmail.length > 0) {
    html += `<h4 style="margin:12px 0 6px;color:var(--danger)">⚠️ Leads zonder email (${leadsZonderEmail.length}):</h4><div style="font-size:11px;color:var(--beton)">`;
    leadsZonderEmail.slice(0, 20).forEach(l => { html += esc(l.naam) + '<br>'; });
    if (leadsZonderEmail.length > 20) html += `...en nog ${leadsZonderEmail.length - 20} meer`;
    html += '</div>';
  }

  // Toon sample Mixmax entries (raw data debug)
  const mixmaxEntries = emails.filter(e => e.mixmax_id);
  if (mixmaxEntries.length > 0) {
    html += `<h4 style="margin:12px 0 6px">🔧 Sample Mixmax entry (debug):</h4>`;
    const sample = mixmaxEntries[0];
    html += `<pre style="font-size:10px;background:#f5f5f5;padding:8px;border-radius:4px;overflow-x:auto;max-height:200px">${esc(JSON.stringify(sample, null, 2))}</pre>`;
  }

  html += '</div>';
  openModal('Mixmax Diagnose', html, '<button class="btn btn-outline" onclick="closeModal()">Sluiten</button>');
}

  const overdue = allTasks.filter(t => t.status !== 'afgerond' && t.deadline && t.deadline < today);
  const open = allTasks.filter(t => t.status !== 'afgerond');
  const done = allTasks.filter(t => t.status === 'afgerond');

  let filtered = allTasks;
  if (takenFilter === 'open') filtered = filtered.filter(t => t.status !== 'afgerond');
  else if (takenFilter === 'afgerond') filtered = filtered.filter(t => t.status === 'afgerond');
  else if (takenFilter === 'overdue') filtered = filtered.filter(t => t.status !== 'afgerond' && t.deadline && t.deadline < today);
  if (takenTypeFilter) filtered = filtered.filter(t => t.type === takenTypeFilter);
  filtered.sort((a,b) => (a.deadline||'zzzz').localeCompare(b.deadline||'zzzz'));

  const typeOpts = DB.settings.taakTypes.map(t => `<option value="${t.id}" ${takenTypeFilter===t.id?'selected':''}>${t.label}</option>`).join('');

function renderKalender() {
  document.getElementById('topbar').innerHTML = `<div class="topbar-left"><button class="btn btn-outline btn-sm" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--}renderKalender()">←</button><h2>${new Date(calYear,calMonth).toLocaleDateString('nl-NL',{month:'long',year:'numeric'})}</h2><button class="btn btn-outline btn-sm" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++}renderKalender()">→</button></div><div class="topbar-right"><button class="btn btn-primary btn-sm" onclick="openAfspraakModal()">+ Afspraak</button><button class="btn btn-outline btn-sm" onclick="calMonth=new Date().getMonth();calYear=new Date().getFullYear();renderKalender()">Vandaag</button></div>`;
  const firstDay = new Date(calYear,calMonth,1);
  const lastDay = new Date(calYear,calMonth+1,0);
  let startDay = (firstDay.getDay()||7)-1;
  const today = new Date().toISOString().slice(0,10);
  const taskMap = {};
  DB.leads.forEach(l => { (l.taken||[]).forEach(t => { if (t.deadline) { const d=parseDate(t.deadline); if (d&&d.getMonth()===calMonth&&d.getFullYear()===calYear) { const key=d.getDate(); if(!taskMap[key])taskMap[key]=[]; taskMap[key].push({...t,leadNaam:l.naam,leadId:l.id,source:'crm'}); }}});});
  DB.gcalEvents.forEach(ev => { if (ev.datum) { const d=parseDate(ev.datum); if (d&&d.getMonth()===calMonth&&d.getFullYear()===calYear) { const key=d.getDate(); if(!taskMap[key])taskMap[key]=[]; taskMap[key].push({titel:ev.titel,type:'gcal',tijd:ev.tijd,locatie:ev.locatie,source:'gcal',bron:ev.bron||'google_calendar',leadId:ev.leadId||'',telefoon:ev.telefoon||'',notitie:ev.notitie||''});}}});
  // Sorteer alle items per dag op tijd (taken zonder tijd onderaan)
  Object.keys(taskMap).forEach(k => {
    taskMap[k].sort((a, b) => {
      const ta = (a.source === 'gcal' ? a.tijd : a.deadline_tijd) || '99:99';
      const tb = (b.source === 'gcal' ? b.tijd : b.deadline_tijd) || '99:99';
      return ta.localeCompare(tb);
    });
  });
  const dagen = ['Ma','Di','Wo','Do','Vr','Za','Zo'];
  let html = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:11px"><span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#E3F2FD;border:1px solid #1565C0;margin-right:4px"></span>CRM taken</span><span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#FCE4EC;border:1px solid #C62828;margin-right:4px"></span>Google Calendar</span></div><div class="cal-grid">`;
  dagen.forEach(d => html += '<div class="cal-header">'+d+'</div>');
  for (let i=0;i<startDay;i++) html+='<div class="cal-day other-month"></div>';
  for (let d=1;d<=lastDay.getDate();d++) {
    const dateStr = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday = dateStr===today?'today':'';
    const dayItems = taskMap[d]||[];
    html += `<div class="cal-day ${isToday}" onclick="openAfspraakModal('${dateStr}')" style="cursor:pointer"><div class="cal-day-num">${d}</div>${dayItems.slice(0,4).map(t => {
      if (t.source==='gcal') {
        const tip = esc(t.titel) + (t.tijd?' · '+t.tijd:'') + (t.telefoon?' · '+t.telefoon:'') + (t.notitie?' · '+t.notitie:'') + (t.locatie?' · '+t.locatie:'');
        const isCrm = t.bron==='crm';
        const bg = isCrm?'background:#FFF3E0;color:var(--roest)':'background:#FCE4EC;color:#C62828';
        const click = t.leadId?'onclick="event.stopPropagation();openLead(\''+t.leadId+'\')"':'';
        return '<div class="cal-task" style="'+bg+'" title="'+tip+'" '+click+'>'+esc(t.titel)+'</div>';
      }
      const tijdPrefix = t.deadline_tijd ? '<strong style="margin-right:3px">'+esc(t.deadline_tijd)+'</strong>' : '';
      const tipMetTijd = esc(t.leadNaam)+': '+esc(t.titel)+(t.deadline_tijd?' · '+t.deadline_tijd:'');
      const doneStijl = t.status==='afgerond' ? 'opacity:0.45;text-decoration:line-through' : '';
      return '<div class="cal-task type-'+(t.type||'bellen')+'" style="'+doneStijl+'" onclick="event.stopPropagation();openLead(\''+t.leadId+'\')" title="'+tipMetTijd+'">'+tijdPrefix+esc(t.titel)+'</div>';
    }).join('')}${dayItems.length>4?'<div style="font-size:9px;color:var(--beton)">+'+(dayItems.length-4)+' meer</div>':''}</div>`;
  }
  const totalCells = startDay+lastDay.getDate();
  for (let i=totalCells;i<42;i++) html+='<div class="cal-day other-month"></div>';
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function openAfspraakModal(dateStr) {
  const defaultDate = dateStr || new Date().toISOString().slice(0,10);
  const leadOptions = DB.leads.map(l => `<option value="${l.id}">${esc(l.naam)}</option>`).sort((a,b) => a.localeCompare(b));

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group"><label class="form-label">Datum *</label><input class="form-input" id="fAfspraakDatum" type="date" value="${defaultDate}"></div>
      <div class="form-group"><label class="form-label">Tijd</label><input class="form-input" id="fAfspraakTijd" type="time" value="09:00"></div>
    </div>
    <div class="form-group"><label class="form-label">Locatie</label><input class="form-input" id="fAfspraakLocatie" placeholder="Adres of online"></div>
    <div class="form-group"><label class="form-label">Koppelen aan lead (optioneel)</label><select class="form-input" id="fAfspraakLead"><option value="">— Geen —</option>${leadOptions.join('')}</select></div>
  `, `<button class="btn btn-outline" onclick="closeModal()">Annuleren</button><button class="btn btn-primary" onclick="saveAfspraak()">Opslaan</button>`);
}

function saveAfspraak() {
  const titel = document.getElementById('fAfspraakTitel').value.trim();
  const datum = document.getElementById('fAfspraakDatum').value;
  const tijd = document.getElementById('fAfspraakTijd').value || '';
  const locatie = document.getElementById('fAfspraakLocatie').value.trim();
  const leadId = document.getElementById('fAfspraakLead').value;
  if (!titel || !datum) { toast('Vul titel en datum in', 'error'); return; }
  const afspraak = {
    id: 'afsp_' + Date.now(),
    titel: titel,
    datum: datum,
    tijd: tijd,
    locatie: locatie,
    link: '',
    bron: 'crm',
    leadId: leadId || ''
  };
  DB.gcalEvents.push(afspraak);
  // Als er een lead gekoppeld is, ook een taak toevoegen
  if (leadId) {
    const lead = DB.leads.find(l => l.id === leadId);
    if (lead) {
      lead.taken.push({
        id: DB.genId(),
        titel: titel,
        omschrijving: locatie ? 'Locatie: ' + locatie : '',
        deadline: datum,
        status: 'open',
        prioriteit: 'medium',
        type: 'afspraak'
      });
      lead.laatst_gewijzigd = new Date().toISOString();
    }
  }
  DB.save();
  closeModal();
  toast('Afspraak toegevoegd', 'success');
  renderKalender();
}

function getBelPrioriteit(lead) {
  // Alleen actieve leads (niet gewonnen/verloren/ijskast)
  if (lead.gewonnen === 'ja' || lead.verloren === 'ja') return null;
  if (lead.status === 'ijskast') return null;

  let score = 0;
  const now = new Date();

  // 1. Lead score als basis (max ~40% invloed)
  score += Math.min(lead.lead_score || 0, 2000) * 0.2;

  // 2. Dagen sinds laatste contact (hoe langer, hoe urgenter — maar niet als afsluitmail-categorie)
  const lastContact = getLastContactDate(lead);
  const dagenStil = lastContact ? Math.floor((now - lastContact) / (1000*60*60*24)) : 999;
  if (dagenStil > 365) return null; // Dit is afsluitmail-terrein
  if (dagenStil >= 14 && dagenStil <= 365) {
    score += Math.min(dagenStil * 1.5, 400); // Max 400 punten voor inactiviteit
  }

  // 3. Beslisdatum urgentie
  if (lead.beslisdatum) {
    const bd = parseDate(lead.beslisdatum);
    if (bd) {
      const dagenTotBesluit = Math.floor((bd - now) / (1000*60*60*24));
      if (dagenTotBesluit <= 0 && dagenTotBesluit >= -60) {
        score += 300; // Beslisdatum net verlopen — urgent!
      } else if (dagenTotBesluit > 0 && dagenTotBesluit <= 14) {
        score += 250; // Binnen 2 weken
      } else if (dagenTotBesluit > 14 && dagenTotBesluit <= 30) {
        score += 150; // Binnen een maand
      } else if (dagenTotBesluit < -60) {
        score += 50; // Al lang verlopen, minder urgent
      }
    }
  }

  // 4. Offertebedrag (hogere bedragen = meer prioriteit)
  const bedrag = parseFloat(lead.offertebedrag) || 0;
  if (bedrag >= 100000) score += 200;
  else if (bedrag >= 50000) score += 150;
  else if (bedrag >= 25000) score += 100;
  else if (bedrag > 0) score += 50;

  // 5. Scoringskans
  const kans = parseFloat(lead.scoringskans) || 0;
  score += kans * 2; // Max 200 bij 100%

  // 6. Status bonus
  const si = DB.getStatusInfo(lead.status);
  if (si.categorie === 'warm') score += 150;
  else if (si.categorie === 'neutraal') score += 50;

  // 7. Heeft telefoonnummer? (anders nutteloos om te bellen)
  if (!lead.telefoon || lead.telefoon === '—' || lead.telefoon === '') score -= 500;

  // 8. Laatste notitie-type: inkomend contact = extra prioriteit
  if (lead.notities && lead.notities.length > 0) {
    const laatste = [...lead.notities].sort((a,b) => {
      const da = parseDate(a.datum); const db = parseDate(b.datum);
      return (db||0) - (da||0);
    })[0];
    if (laatste && laatste.type) {
      if (['klant_belt_terug','klant_vraagt_info','klant_wil_afspraak'].includes(laatste.type)) score += 200;
      if (['klant_concurrent','geen_reactie_na_vm'].includes(laatste.type)) score -= 100;
    }
  }

  return { lead, score: Math.round(score), dagenStil, lastContact };
}

// ===== AFSLUITMAIL =====
function getAfsluitMailLeads() {
  const now = new Date();
  const oneYearAgo = new Date(now.getFullYear()-1, now.getMonth(), now.getDate());
  const sixMonthsAgo = new Date(now.getFullYear(), now.getMonth()-6, now.getDate());
  return DB.leads.filter(l => {
    if (l.gewonnen === 'ja' || l.verloren === 'ja') return false;
    if (l.status === 'ijskast') return false;
    let laatsteInteractie = null;
    if (l.notities && l.notities.length > 0) {
      l.notities.forEach(n => {
        const d = parseDate(n.datum);
        if (d && (!laatsteInteractie || d > laatsteInteractie)) laatsteInteractie = d;
      });
    }
    const emails = DB.getEmailsForLead ? DB.getEmailsForLead(l) : [];
    emails.forEach(e => {
      const d = parseDate(e.datum || e.date);
      if (d && (!laatsteInteractie || d > laatsteInteractie)) laatsteInteractie = d;
    });
    if (!laatsteInteractie) {
      laatsteInteractie = parseDate(l.datum_aanvraag);
    }
    if (!laatsteInteractie) return true;
    const interactieOud = laatsteInteractie < oneYearAgo;
    let beslisdatumVerlopen = false;
    if (l.beslisdatum) {
      const bd = parseDate(l.beslisdatum);
      if (bd && bd < sixMonthsAgo) beslisdatumVerlopen = true;
    }
    return interactieOud || (beslisdatumVerlopen && laatsteInteractie < sixMonthsAgo);
  }).sort((a,b) => {
    const da = getLastContactDate(a);
    const db = getLastContactDate(b);
    return (da||0) - (db||0);
  });
}
function getLastContactDate(lead) {
  let latest = null;
  (lead.notities||[]).forEach(n => { const d = parseDate(n.datum); if (d && (!latest || d > latest)) latest = d; });
  const emails = DB.getEmailsForLead ? DB.getEmailsForLead(lead) : [];
  emails.forEach(e => { const d = parseDate(e.datum || e.date); if (d && (!latest || d > latest)) latest = d; });
  if (!latest) latest = parseDate(lead.datum_aanvraag);
  return latest;
}
