    },
    loopdeuren: {
      aantal: lead.aantal_ld || 0,
      types: lead.ld_types || null,
      beschrijving: lead.loopdeur_beschrijving || null
    },
    raamkozijnen: {
      aantal: lead.aantal_rk || 0,
      types: lead.rk_types || null,
      beschrijving: lead.raamkozijn_beschrijving || null
    }
  };

  var leadPayload = {
    crm_lead_id: lead.id,
    werknummer: lead.referentie || null,
    voornaam: voornaam,
    achternaam: achternaam,
    bedrijf: lead.bedrijf || null,
    telefoon: lead.telefoon || null,
    email: lead.email || null,
    bouwadres: lead.adres || null,
    bouwpostcode: lead.postcode || null,
    bouwplaats: lead.plaats || null,
    bouwprovincie: lead.provincie || null,
    datum_aanvraag: datumAanvraag,
    offertebedrag: bedrag,
    offerte_pdf_url: lead.offerte_pdf_url || null,
    bouwgegevens: bouwgegevens,
    // Reset teruggezet_op: als Linda hem eerder teruggezet had, maakt deze re-push
    // hem weer actief in haar lijst.
    teruggezet_op: null
    // status_collega + volgende_actie_datum bewust niet meegestuurd —
    // bij UPSERT willen we Linda's status NIET overschrijven
  };

  try {
    // UPSERT (insert of update) — on_conflict op crm_lead_id
    var res = await fetch(LINDA_SB_URL + '/rest/v1/linda_leads?on_conflict=crm_lead_id', {
      method: 'POST',
      headers: {
        'apikey': LINDA_SB_KEY,
        'Authorization': 'Bearer ' + LINDA_SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=representation'
      },
      body: JSON.stringify(leadPayload)
    });
    if (!res.ok) {
      var errTxt = await res.text();
      console.error('Linda push lead-fout:', res.status, errTxt);
      toast('Push mislukt: ' + res.status + ' ' + errTxt.slice(0,80), 'error');
      return;
    }
    var insertedRows = await res.json();
    var lindaLeadId = insertedRows && insertedRows[0] && insertedRows[0].id;
    if (!lindaLeadId) {
      // Fallback: ophalen via crm_lead_id
      var sel = await fetch(LINDA_SB_URL + '/rest/v1/linda_leads?crm_lead_id=eq.' + encodeURIComponent(lead.id) + '&select=id', {
        headers: { 'apikey': LINDA_SB_KEY, 'Authorization': 'Bearer ' + LINDA_SB_KEY }
      });
      if (sel.ok) { var rows = await sel.json(); lindaLeadId = rows[0] && rows[0].id; }
    }
    if (!lindaLeadId) { toast('Push mislukt: kon linda_lead_id niet bepalen','error'); return; }

    // Push alle notities van Castillo (auteur != linda) — dedup via unique index op crm_note_id
    var notities = (lead.notities || []).filter(function(n){ return (n.auteur||'').toLowerCase() !== 'linda'; });
    if (notities.length > 0) {
      var notiePayloads = notities.map(function(n){
        return {
          linda_lead_id: lindaLeadId,
          author: 'castillo',
          tekst: n.inhoud || '',
          datum: parseNotitieDatum(n.datum) || new Date().toISOString(),
          crm_note_id: String(n.id)
        };
      });
      var resN = await fetch(LINDA_SB_URL + '/rest/v1/linda_notities', {
        method: 'POST',
        headers: {
          'apikey': LINDA_SB_KEY,
          'Authorization': 'Bearer ' + LINDA_SB_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=ignore-duplicates,return=minimal'
        },
        body: JSON.stringify(notiePayloads)
      });
      if (!resN.ok) {
        var errTxt2 = await resN.text();
        console.warn('Linda push notities-fout:', resN.status, errTxt2);
        // Niet-fataal — leadgegevens zijn al gepushed
      }
    }

    // Markeer lokaal dat de lead bij Linda staat
    lead.linda_pushed_op = new Date().toISOString();
    lead.linda_lead_id = lindaLeadId;
    DB.save();
    toast('Lead naar Linda gepushed','success');
    if (currentPage === 'lead-detail') renderLeadDetail();
  } catch(e) {
    console.error('Linda push fout:', e);
    toast('Push mislukt: ' + (e.message||e),'error');
  }
}

// ----------------------------------------------------------------
// Pull Linda-updates: nieuwe notities + status-wijzigingen
// silent=true → geen toast bij "geen updates", wel bij echte wijzigingen
// ----------------------------------------------------------------
async function pullLindaUpdates(silent) {
  try {
    var headers = { 'apikey': LINDA_SB_KEY, 'Authorization': 'Bearer ' + LINDA_SB_KEY };

    // 1) Nieuwe Linda-notities (nog niet teruggehaald)
    var notesRes = await fetch(LINDA_SB_URL + '/rest/v1/linda_notities?author=eq.linda&pulled_to_crm_op=is.null&select=id,linda_lead_id,tekst,datum', { headers: headers });
    if (!notesRes.ok) throw new Error('Notities ophalen: HTTP ' + notesRes.status);
    var newNotes = await notesRes.json();

    // 2) Lead-status updates: alle leads met laatst_bijgewerkt_op > pulled_back_op (of NULL)
    var leadsRes = await fetch(LINDA_SB_URL + '/rest/v1/linda_leads?select=id,crm_lead_id,status_collega,volgende_actie_datum,laatst_bijgewerkt_op,pulled_back_op,teruggezet_op,sales_status', { headers: headers });
    if (!leadsRes.ok) throw new Error('Leads ophalen: HTTP ' + leadsRes.status);
    var allLindaLeads = await leadsRes.json();
    var changedLeads = allLindaLeads.filter(function(l){
      if (!l.laatst_bijgewerkt_op) return false;
      if (!l.pulled_back_op) return true;
      return new Date(l.laatst_bijgewerkt_op).getTime() > new Date(l.pulled_back_op).getTime();
    });

    // Map crm_lead_id -> linda_lead_record (voor lookups)
    var bycrm = {};
    allLindaLeads.forEach(function(l){ bycrm[l.crm_lead_id] = l; });

    var notesAdded = 0;
    var statusUpdated = 0;
    var teruggezet = 0;
    var orphanNotes = 0;
    var pulledNoteIds = [];
    var pulledLeadIds = [];

    // 3) Notities toevoegen aan OptiCRM-leads
    for (var i = 0; i < newNotes.length; i++) {
      var n = newNotes[i];
      // Zoek lead via linda_lead_id -> crm_lead_id
      var lindaLead = allLindaLeads.find(function(ll){ return ll.id === n.linda_lead_id; });
      if (!lindaLead) { orphanNotes++; continue; }
      var crmLead = DB.leads.find(function(l){ return l.id === lindaLead.crm_lead_id; });
      if (!crmLead) { orphanNotes++; continue; }
      if (!Array.isArray(crmLead.notities)) crmLead.notities = [];
      // Datum naar dd-mm-yyyy hh:mm voor consistente weergave in CRM
      var datumStr;
      try {
        var d = new Date(n.datum);
        datumStr = ('0'+d.getDate()).slice(-2) + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + d.getFullYear() + ' ' + ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
      } catch(e) { datumStr = String(n.datum||''); }
      crmLead.notities.push({
        id: 'linda-' + n.id,
        inhoud: n.tekst || '',
        auteur: 'Linda',
        datum: datumStr,
        linda_note_id: n.id
      });
      notesAdded++;
      pulledNoteIds.push(n.id);
    }

    // 4) Lead-updates toepassen op OptiCRM-leads
    //    Twee paden:
    //    a) teruggezet_op IS NOT NULL → Linda heeft lead teruggezet naar Castillo:
    //       reset linda_pushed_op + linda_lead_id zodat de "Push naar Linda" knop
    //       weer beschikbaar is. linda_status etc. clearen.
    //    b) normale status-update vanuit Linda
    for (var j = 0; j < changedLeads.length; j++) {
      var ll = changedLeads[j];
      var crmLead2 = DB.leads.find(function(l){ return l.id === ll.crm_lead_id; });
      if (!crmLead2) continue;

      if (ll.teruggezet_op) {
        // Linda heeft lead teruggezet — knop terug naar "Push naar Linda"
        crmLead2.linda_pushed_op = null;
        crmLead2.linda_lead_id = null;
        crmLead2.linda_status = null;
        crmLead2.linda_volgende_actie_datum = null;
        crmLead2.linda_laatst_bijgewerkt_op = ll.laatst_bijgewerkt_op;
        teruggezet++;
        // Sales-status overnemen ook bij teruggezette leads: Linda's keuze
        // is leidend, ook wanneer ze de lead daarna terugzet. (fix 22 mei 2026)
        if (ll.sales_status && String(ll.sales_status).trim() && ll.sales_status !== crmLead2.status) {
          crmLead2.status = ll.sales_status;
          try { crmLead2.lead_score = DB.berekenLeadScore(crmLead2); } catch (e) {}
          crmLead2.laatst_gewijzigd = new Date().toISOString();
          statusUpdated++;
        }
      } else {
        // Normale status-update
        var prevStatus = crmLead2.linda_status;
        var prevDatum = crmLead2.linda_volgende_actie_datum;
        crmLead2.linda_status = ll.status_collega || null;
        crmLead2.linda_volgende_actie_datum = ll.volgende_actie_datum || null;
        crmLead2.linda_laatst_bijgewerkt_op = ll.laatst_bijgewerkt_op;
        if (prevStatus !== crmLead2.linda_status || prevDatum !== crmLead2.linda_volgende_actie_datum) statusUpdated++;

        // Sales-status: Linda's keuze overschrijft OpticRM's lead.status.
        // Lege/null sales_status = Linda heeft niets gekozen → lead.status onveranderd.
        if (ll.sales_status && String(ll.sales_status).trim() && ll.sales_status !== crmLead2.status) {
          crmLead2.status = ll.sales_status;
          try { crmLead2.lead_score = DB.berekenLeadScore(crmLead2); } catch (e) {}
          crmLead2.laatst_gewijzigd = new Date().toISOString();
          statusUpdated++;
        }
      }
      pulledLeadIds.push(ll.id);
    }

    // 5) Markeren in Supabase: pulled_to_crm_op + pulled_back_op = NOW()
    var nowIso = new Date().toISOString();
    if (pulledNoteIds.length > 0) {
      var idList = pulledNoteIds.map(function(x){ return '"'+x+'"'; }).join(',');
      var markRes = await fetch(LINDA_SB_URL + '/rest/v1/linda_notities?id=in.(' + idList + ')', {
        method: 'PATCH',
        headers: Object.assign({}, headers, { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' }),
        body: JSON.stringify({ pulled_to_crm_op: nowIso })
      });
      if (!markRes.ok) console.warn('Notities markeren mislukt:', markRes.status, await markRes.text());
    }
    if (pulledLeadIds.length > 0) {
      var idList2 = pulledLeadIds.map(function(x){ return '"'+x+'"'; }).join(',');
      var markRes2 = await fetch(LINDA_SB_URL + '/rest/v1/linda_leads?id=in.(' + idList2 + ')', {
        method: 'PATCH',
        headers: Object.assign({}, headers, { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' }),
        body: JSON.stringify({ pulled_back_op: nowIso })
      });
      if (!markRes2.ok) console.warn('Leads markeren mislukt:', markRes2.status, await markRes2.text());
    }

    // 6) Opslaan + UI verversen
    DB.save();
    var msg;
    if (notesAdded === 0 && statusUpdated === 0 && teruggezet === 0) {
      msg = 'Geen nieuwe updates van Linda';
    } else {
      var parts = [];
      if (notesAdded > 0) parts.push(notesAdded + ' nieuwe notitie' + (notesAdded === 1 ? '' : 's'));
      if (statusUpdated > 0) parts.push(statusUpdated + ' status-update' + (statusUpdated === 1 ? '' : 's'));
      if (teruggezet > 0) parts.push(teruggezet + ' lead' + (teruggezet === 1 ? '' : 's') + ' teruggezet');
      msg = parts.join(', ') + ' opgehaald';
    }
    if (orphanNotes > 0) msg += ' (' + orphanNotes + ' notitie' + (orphanNotes === 1 ? '' : 's') + ' overgeslagen — lead niet gevonden)';
    // Bij silent run: alleen toast tonen als er echte wijzigingen waren
    if (!silent || notesAdded || statusUpdated || teruggezet) {
      toast(msg, (notesAdded || statusUpdated || teruggezet) ? 'success' : 'info');
    }
    DB.lastLindaSync = new Date().toISOString();
    try { localStorage.setItem('optistaal_crm_last_linda_sync', DB.lastLindaSync); } catch(e) {}

    if (currentPage === 'dashboard') renderDashboard();
    else if (currentPage === 'lead-detail') renderLeadDetail();
    else if (currentPage === 'leads') renderLeads();
  } catch(e) {
    console.error('Linda pull fout:', e);
    toast('Pull mislukt: ' + (e.message || e), 'error');
  }
}

// Parseer een datum-string uit de notitie naar ISO timestamp
function parseNotitieDatum(s) {
  if (!s) return null;
  // Format dd-mm-yyyy hh:mm
  var m = String(s).match(/^(\d{2})-(\d{2})-(\d{4})\s+(\d{2}):(\d{2})/);
  if (m) return m[3]+'-'+m[2]+'-'+m[1]+'T'+m[4]+':'+m[5]+':00';
  // Format yyyy-mm-dd hh:mm
  m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})/);
  if (m) return m[1]+'-'+m[2]+'-'+m[3]+'T'+m[4]+':'+m[5]+':00';
  // Format dd-mm-yyyy
  m = String(s).match(/^(\d{2})-(\d{2})-(\d{4})$/);
  if (m) return m[3]+'-'+m[2]+'-'+m[1]+'T00:00:00';
  // Anders: laat aan default ('now')
  return null;
}

    const r = await fetch(ANTIEKE_SB_URL + '/rest/v1/antieke_statusmail_wachtrij?order=toegevoegd_op.asc', {
      headers: { 'apikey': ANTIEKE_SB_KEY, 'Authorization': 'Bearer ' + ANTIEKE_SB_KEY }

  } catch(e) { return []; }
}

async function renderAntiekeStatusmail() {
  document.getElementById('topbar').innerHTML = `
    <div class="topbar-left"><h2>Antieke statusmail</h2>
    <span style="font-size:12px;color:var(--beton);margin-left:12px">Gegevens laden...</span></div>
    <div class="topbar-right"><button class="btn btn-outline btn-sm" onclick="renderAntiekeStatusmail()">↻ Vernieuwen</button></div>`;
  document.getElementById('content').innerHTML = '<div style="text-align:center;padding:60px;color:var(--beton)">⏳ Even laden...</div>';

  const sbRijen = await fetchAntiekeWachtrij();

  // Sync Supabase-statusupdates terug naar lokale leads
  sbRijen.forEach(rij => {
    if (rij.status === 'wachtrij') return; // nog niet verstuurd, niets te doen
    const lokaal = DB.leads.find(l => l.id === rij.lead_id);
    if (!lokaal) return;
    if (rij.status === 'verstuurd' && lokaal.status === 'antieke_statusmail_wachtrij') {
      lokaal.status = 'antieke_statusmail_verstuurd';
      lokaal.antieke_statusmail_datum = rij.verstuurd_op ? rij.verstuurd_op.slice(0,10) : '';
    } else if (rij.status === 'nieuwe_offerte') {
      lokaal.status = 'standaard'; // terug actief, nieuwe offerte nodig
      lokaal.antieke_statusmail_reactie = 'nieuwe_offerte';
    } else if (rij.status === 'lange_termijn') {
      lokaal.status = 'lange_termijn';
      lokaal.antieke_statusmail_reactie = 'lange_termijn';
    } else if (rij.status === 'vervallen') {
      lokaal.verloren = 'ja'; lokaal.verliesreden = 'Aanvraag vervallen (antieke statusmail)';
      lokaal.antieke_statusmail_reactie = 'vervallen';
    } else if (rij.status === 'verloren_geen_reactie') {
      lokaal.verloren = 'ja'; lokaal.verliesreden = 'Geen reactie op antieke statusmail';
      lokaal.antieke_statusmail_reactie = 'verloren_geen_reactie';
    }
  });
  DB.save();
  renderSidebar();

  // Wachtrij: ná sync bepalen, zodat leads die al verstuurd zijn niet dubbel verschijnen
  const wachtrij = DB.leads.filter(l => l.status === 'antieke_statusmail_wachtrij');

  // Groepeer Supabase-rijen per status
  const groepen = {
    wachtrij:              sbRijen.filter(r => r.status === 'wachtrij'),
    verstuurd:             sbRijen.filter(r => r.status === 'verstuurd'),
    nieuwe_offerte:        sbRijen.filter(r => r.status === 'nieuwe_offerte'),
    lange_termijn:         sbRijen.filter(r => r.status === 'lange_termijn'),
    vervallen:             sbRijen.filter(r => r.status === 'vervallen'),
    verloren_geen_reactie: sbRijen.filter(r => r.status === 'verloren_geen_reactie'),
  };
  // Wachtrij: gebruik lokale CRM-data (meest actueel)
  const totaalWachtrij = wachtrij.length;
  const totaalVerstuurd = groepen.verstuurd.length;
  const totaalReacties = groepen.nieuwe_offerte.length + groepen.lange_termijn.length + groepen.vervallen.length;
  const totaalVerloren = groepen.verloren_geen_reactie.length;

  document.getElementById('topbar').innerHTML = `
    <div class="topbar-left"><h2>Antieke statusmail</h2>
    <span style="font-size:12px;color:var(--beton);margin-left:12px">
      ${totaalWachtrij} wachtrij &nbsp;·&nbsp; ${totaalVerstuurd} verstuurd &nbsp;·&nbsp; ${totaalReacties} reacties &nbsp;·&nbsp; ${totaalVerloren} geen reactie
    </span></div>
    <div class="topbar-right"><button class="btn btn-outline btn-sm" onclick="renderAntiekeStatusmail()">↻ Vernieuwen</button></div>`;

  if (!sbRijen.length && !wachtrij.length) {
    document.getElementById('content').innerHTML = '<div style="text-align:center;padding:60px"><div style="font-size:48px;margin-bottom:12px">📬</div><p style="font-size:14px;color:var(--beton)">Geen leads in de wachtrij.<br>Selecteer leads via de Leads-pagina en klik op <strong>📬 Antieke statusmail</strong>.</p></div>';
    return;
  }

  const formatDatum = d => d ? new Date(d).toLocaleDateString('nl-NL') : '—';
  let html = '';

  // ---- WACHTRIJ ----
  if (wachtrij.length) {
    html += sectieHeader('⏳ Wachtrij — nog te versturen', wachtrij.length, '#D47A3A');
    html += '<div class="table-wrapper" style="margin-bottom:24px"><table class="data-table"><thead><tr><th>Naam</th><th>E-mail</th><th>Toegevoegd</th><th>Actie</th></tr></thead><tbody>';
    wachtrij.forEach(l => {
      html += `<tr onclick="openLead('${l.id}')" style="cursor:pointer">
        <td style="font-weight:600">${esc(l.naam)}</td>
        <td style="font-size:11px;color:var(--beton)">${esc(l.email||'—')}</td>
        <td style="font-size:11px">${esc(l.antieke_statusmail_toegevoegd||'—')}</td>
        <td><button class="btn btn-sm btn-outline" onclick="event.stopPropagation();verwijderUitWachtrij('${l.id}')" style="font-size:11px;color:var(--danger)">✕ Verwijderen</button></td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  }

  // ---- VERSTUURD (wacht op reactie) ----
  if (groepen.verstuurd.length) {
    html += sectieHeader('📨 Verstuurd — wacht op reactie', groepen.verstuurd.length, '#9B59B6');
    html += '<div class="table-wrapper" style="margin-bottom:24px"><table class="data-table"><thead><tr><th>Naam</th><th>E-mail</th><th>Verstuurd op</th><th>Dagen geleden</th></tr></thead><tbody>';
    groepen.verstuurd.forEach(r => {
      const dagen = r.verstuurd_op ? Math.floor((Date.now() - new Date(r.verstuurd_op)) / 86400000) : '?';
      const dagenKleur = dagen >= 5 ? 'var(--danger)' : dagen >= 3 ? 'var(--warning)' : 'inherit';
      const lokaal = DB.leads.find(l => l.id === r.lead_id);
      html += `<tr onclick="${lokaal ? `openLead('${lokaal.id}')` : ''}" style="cursor:pointer">
        <td style="font-weight:600">${esc(r.naam||'—')}</td>
        <td style="font-size:11px;color:var(--beton)">${esc(r.email)}</td>
        <td style="font-size:11px">${formatDatum(r.verstuurd_op)}</td>
        <td style="font-size:11px;font-weight:700;color:${dagenKleur}">${dagen}d</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  }

  // ---- REACTIES ----
  const reactieGroepen = [
    { key: 'nieuwe_offerte', label: '🔄 Reactie: nieuwe offerte aangevraagd', kleur: '#2D8659' },
    { key: 'lange_termijn',  label: '📅 Reactie: aanvraag op lange termijn',  kleur: '#1ABC9C' },
    { key: 'vervallen',      label: '❌ Reactie: aanvraag vervallen',          kleur: '#8B8B83' },
  ];
  reactieGroepen.forEach(g => {
    if (!groepen[g.key].length) return;
    html += sectieHeader(g.label, groepen[g.key].length, g.kleur);
    html += '<div class="table-wrapper" style="margin-bottom:24px"><table class="data-table"><thead><tr><th>Naam</th><th>E-mail</th><th>Gereageerd op</th></tr></thead><tbody>';
    groepen[g.key].forEach(r => {
      const lokaal = DB.leads.find(l => l.id === r.lead_id);
      html += `<tr onclick="${lokaal ? `openLead('${lokaal.id}')` : ''}" style="cursor:pointer">
        <td style="font-weight:600">${esc(r.naam||'—')}</td>
        <td style="font-size:11px;color:var(--beton)">${esc(r.email)}</td>
        <td style="font-size:11px">${formatDatum(r.reactie_op)}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  });

  // ---- GEEN REACTIE ----
  if (groepen.verloren_geen_reactie.length) {
    html += sectieHeader('🔇 Geen reactie — automatisch gesloten', groepen.verloren_geen_reactie.length, '#C0392B');

const SHOMI_HEADERS_LIST = ['DEELNEMERS','VERSLAG','VERVOLGACTIES','ONDERWERP','CONVERSATIE GESTART'];

function isShomiFakeLead(naam) {
  if (!naam) return false;
  const n = naam.trim();
  if (SHOMI_HEADERS_LIST.includes(n.toUpperCase())) return true;
  if (n.length > 60) return true;
  if (n.startsWith('-') || n.startsWith('*')) return true;
  if (/^\d{2}-\d{2}-\d{4}\s*@\s*\d{2}:\d{2}/.test(n)) return true;
  const kw = ['castillo müller heeft','castillo muller heeft','de gesprekspartner','afgesproken is dat','castillo müller neemt','castillo muller neemt','castillo müller zal','castillo muller zal','castillo müller overweegt','castillo muller overweegt','ina mulder','dit gesprek werd opgenomen'];
  return kw.some(k => n.toLowerCase().includes(k));
}

function detectShomiGroepen() {
  const leads = DB.leads;
  const groepen = [];
  const fakeIds = new Set();
  for (let i = 0; i < leads.length; i++) {
    if (!isShomiFakeLead(leads[i].naam)) continue;
    if (fakeIds.has(leads[i].id)) continue;
    let parent = null;
    for (let j = i - 1; j >= 0; j--) {
      if (!isShomiFakeLead(leads[j].naam) && !fakeIds.has(leads[j].id)) { parent = leads[j]; break; }
    }
    const groep = [];
    let k = i;
    while (k < leads.length && isShomiFakeLead(leads[k].naam)) {
      groep.push(leads[k]); fakeIds.add(leads[k].id); k++;
    }
    i = k - 1;
    if (groep.length) groepen.push({ parent, groep });
  }
  return groepen;
}

function toonShomiOpschonenModal() {
  const groepen = detectShomiGroepen();
  if (!groepen.length) { toast('Geen Shomi-leads gevonden — alles is al opgeschoond.', 'success'); return; }
  const totaal = groepen.reduce((s, g) => s + g.groep.length, 0);
  const html = `
    <p style="color:var(--beton);font-size:13px;margin-bottom:16px"><strong>${groepen.length} gesprekken</strong> (${totaal} regels) worden samengevoegd als notitie op de bijbehorende lead. Controleer de koppelingen hieronder.</p>
    <div style="max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:10px">
    ${groepen.map((g) => `
      <div style="border:1px solid #e0e0e0;border-radius:8px;padding:12px;background:#fafafa">
        <div style="font-size:11px;color:var(--beton);margin-bottom:2px">Notitie wordt toegevoegd aan:</div>
        <div style="font-weight:700;font-size:13px;color:var(--petrol);margin-bottom:8px">${esc(g.parent ? g.parent.naam : '⚠️ Geen lead gevonden')}</div>
        <div style="font-size:11px;color:#555;background:#f0f0f0;padding:8px;border-radius:4px;white-space:pre-wrap;max-height:80px;overflow:hidden">${esc(g.groep.map(l => l.naam).join('\n').substring(0, 250))}${g.groep.join('').length > 250 ? '...' : ''}</div>
      </div>`).join('')}
    </div>`;
  openModal('Shomi Notities Opschonen', html,
    `<button class="btn btn-outline" onclick="closeModal()">Annuleren</button>
     <button class="btn btn-primary" onclick="voerShomiMergeUit()">&#10003; Samenvoegen (${totaal} leads → ${groepen.length} notities)</button>`);
}

function voerShomiMergeUit() {
  const groepen = detectShomiGroepen();
  const teVerwijderen = new Set();
  let samengevoegd = 0;
  for (const { parent, groep } of groepen) {
    if (!parent) continue;
    const tekst = groep.map(l => l.naam.trim()).join('\n');
    if (!parent.notities) parent.notities = [];
    parent.notities.push({ id: 'n' + Date.now() + Math.random(), datum: new Date().toISOString().slice(0, 10), auteur: 'Shomi', inhoud: tekst });
    groep.forEach(l => teVerwijderen.add(l.id));
    samengevoegd++;
  }
  DB.leads = DB.leads.filter(l => !teVerwijderen.has(l.id));
  DB.save(); closeModal();
  toast('✅ ' + samengevoegd + ' gesprekken samengevoegd als notities. ' + teVerwijderen.size + ' nep-leads verwijderd.', 'success');
  renderPage();
}

// ================================================================
// SNAPSHOT-SYSTEEM (22 mei 2026, observatie 6)
// Bewaart kopieën van DB.leads in IndexedDB onder 'snapshot-<id>' met een
// 'snapshots-index'-array voor metadata. Maximaal SNAPSHOT_MAX, oudste worden
// automatisch verwijderd. Wordt gebruikt vóór elke import om rollback mogelijk
// te maken.
// ================================================================
const SNAPSHOT_MAX = 10;

async function maakSnapshot(label) {
  try {
    const id = 'snap-' + Date.now();
    const meta = {
      id,
      label: label || 'Handmatig',
      datum: new Date().toISOString(),
      aantal_leads: DB.leads.length
    };
    // Deep clone leads om mutaties later niet door te laten lekken
    const kopie = JSON.parse(JSON.stringify(DB.leads));
    await IDB.set('snapshot-' + id, kopie);
    let index = (await IDB.get('snapshots-index')) || [];
    index.unshift(meta);
    while (index.length > SNAPSHOT_MAX) {
      const oud = index.pop();
      if (oud && oud.id) { try { await IDB.del('snapshot-' + oud.id); } catch (e) { console.warn('snapshot del fout:', e); } }
    }
    await IDB.set('snapshots-index', index);
    console.log('[snapshot] gemaakt:', meta);
    return meta;
  } catch (e) {
    console.error('Snapshot maken mislukt:', e);
    return null;
  }
}

async function lijstSnapshots() {
  return (await IDB.get('snapshots-index')) || [];
}

async function herstelSnapshot(id) {
  try {
    const data = await IDB.get('snapshot-' + id);
    if (!data || !Array.isArray(data)) {
      toast('Snapshot niet gevonden of ongeldig', 'error');
      return;
    }
    const meta = ((await lijstSnapshots()).find(s => s.id === id)) || {};
    const bevestig = confirm(
      'Snapshot herstellen?\n\n' +
      'Label: ' + (meta.label || '(geen)') + '\n' +
      'Datum: ' + (meta.datum ? new Date(meta.datum).toLocaleString('nl-NL') : '?') + '\n' +
      'Aantal leads: ' + data.length + '\n\n' +
      'Je huidige ' + DB.leads.length + ' leads worden vervangen. Voor de zekerheid maak ik eerst een snapshot van de huidige staat, zodat je deze actie weer kunt terugdraaien.\n\n' +
      'Doorgaan?'
    );
    if (!bevestig) return;
    await maakSnapshot('Auto: voor herstel van ' + (meta.label || id));
    DB.leads = data;
    await DB.save();
    toast('Snapshot hersteld: ' + data.length + ' leads', 'success');
    if (typeof renderPage === 'function') renderPage();
  } catch (e) {
    toast('Herstel mislukt: ' + e.message, 'error');
    console.error('Snapshot herstel fout:', e);
  }
}

async function verwijderSnapshot(id) {
  if (!confirm('Snapshot definitief verwijderen?')) return;
  try {
    await IDB.del('snapshot-' + id);
  } catch (e) { console.warn('IDB.del fout:', e); }
  const index = (await IDB.get('snapshots-index')) || [];
  await IDB.set('snapshots-index', index.filter(s => s.id !== id));
  toast('Snapshot verwijderd', 'info');
  if (currentPage === 'import-export') renderImportExport();
}

async function downloadIntakeBijlage(bijlage) {
  if (!bijlage || !bijlage.path) { toast('Geen bijlage beschikbaar', 'error'); return; }
  try {
    toast('Bijlage ophalen...', 'info');
    const url = INTAKE_SUPABASE_URL + '/storage/v1/object/intake-bijlagen/' + bijlage.path;
    const resp = await fetch(url, {
      headers: { 'apikey': INTAKE_SUPABASE_KEY, 'Authorization': 'Bearer ' + INTAKE_SUPABASE_KEY }
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const blob = await resp.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = bijlage.name || 'bijlage';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    toast('Bijlage gedownload', 'success');
  } catch(e) {
    toast('Download mislukt: ' + e.message, 'error');
  }
}

async function importFromSupabaseIntake(silent) {
  const btn = document.getElementById('btn-intake-import');
  if (btn && !silent) { btn.disabled = true; btn.textContent = 'Ophalen...'; }
  try {
    const resp = await fetch(INTAKE_SUPABASE_URL + '/rest/v1/intake_submissions?status=eq.completed&order=created_at.desc&limit=500', {
      headers: { 'apikey': INTAKE_SUPABASE_KEY, 'Authorization': 'Bearer ' + INTAKE_SUPABASE_KEY }
    });
    if (!resp.ok) throw new Error('Supabase fout: ' + resp.status);
    const intakes = await resp.json();
    if (!intakes || intakes.length === 0) { if (!silent) toast('Geen voltooide intakes gevonden', 'info'); return; }

    // Snapshot alleen bij handmatige import (silent=false). Auto-syncs slaan dit
    // over om de snapshot-ring niet vol te lopen met identieke runs.
    if (!silent) {
      try { await maakSnapshot('Voor intake import (Supabase)'); } catch(e) { console.warn('Snapshot mislukt:', e); }
    }

    let added = 0, skipped = 0, updated = 0;
    intakes.forEach(function(o) {
      const naam = [o.voornaam, o.achternaam].filter(Boolean).join(' ');
      if (!naam) return;
      const email = (o.email || '').toLowerCase().trim();

      // Duplicate check: match op email of naam
      let existing = null;
      if (email) existing = DB.leads.find(l => l.email && l.email.toLowerCase().trim() === email);
      if (!existing && naam) existing = DB.leads.find(l => l.naam && l.naam.trim().toLowerCase() === naam.toLowerCase());

      // Zijde-labels
      function zLabel(z) {
        var m = { 'A':'Voorzijde (A)', 'B':'Linkerzijde (B)', 'C':'Rechterzijde (C)', 'D':'Achterzijde (D)' };
        return m[(z||'').toUpperCase()] || z || '';
      }

      // Sectionaaldeuren → platte velden
      var sdArr = Array.isArray(o.sectionaaldeuren) ? o.sectionaaldeuren : [];
      var sdDesc = sdArr.map(function(sd, i) {
        return (sd.breedte||'') + '×' + (sd.hoogte||'') + ' mm, ' + zLabel(sd.zijde) +
          (sd.beslag ? ', ' + sd.beslag : '') + (sd.bediening ? ', ' + sd.bediening : '');
      }).join('; ');

      // Loopdeuren → beschrijving
      var ldArr = Array.isArray(o.loopdeuren) ? o.loopdeuren : [];
      var ldDesc = ldArr.map(function(ld) {
        return (ld.naam||'Loopdeur') + (ld.afm ? ' ('+ld.afm+')' : '') + ', ' + zLabel(ld.zijde);
      }).join('; ');

      // Raamkozijnen → beschrijving
      var rkArr = Array.isArray(o.raamkozijnen) ? o.raamkozijnen : [];
      var rkDesc = rkArr.map(function(rk) {
        return (rk.naam||'Raamkozijn') + (rk.afm ? ' ('+rk.afm+')' : '') + ', ' + zLabel(rk.zijde);
      }).join('; ');

      // Wand zijdes → tekst
      var wz = o.wand_zijdes || {};
      var wzStr = Object.keys(wz).filter(function(k){ return wz[k]; }).join(', ');

      // Goottype naam
      var gootMap = { staal2:'Stalen bakgoot', staal3:'Stalen bakgoot groot', kunststof:'Kunststof goot', geen:'Geen goot' };
      var gootNaam = gootMap[o.goottype] || o.goottype || '';

      var mapped = {
        naam: naam,
        email: o.email || '',
        telefoon: o.telefoon || '',
        bedrijf: o.bedrijf || '',
        adres: o.adres || '',
        postcode: o.postcode || '',
        plaats: o.plaats || '',
        land: 'Nederland',
        provincie: o.provincie || '',
        vergunning_status: o.vergunning_status || '',
        dakvorm: o.dakvorm || '',
        breedte: o.breedte ? String(o.breedte) : '',
        lengte: o.lengte ? String(o.lengte) : '',
        goot: o.goothoogte ? String(o.goothoogte) : '',
        nok: o.nokhoogte ? String(o.nokhoogte) : '',
        helling: o.hellingshoek ? String(o.hellingshoek) : '',
        dakpaneel: o.dakprofiel || '',
        dikte_dakisolatie: o.dak_isolatie || '',
        dak_coating: o.dak_coating || '',
        dak_kleur: o.dak_kleur || '',
        wandpaneel: o.wandprofiel || '',
        dikte_wandisolatie: o.wand_isolatie || '',
        wand_coating: o.wand_coating || '',
        wand_kleur: o.wand_kleur || '',
        wand_schroefbevestiging: o.wand_schroefbevestiging || '',
        wand_zijdes: wzStr,
        aantal_sd: sdArr.length > 0 ? String(sdArr.length) : '',
        aantal_ld: ldArr.length > 0 ? String(ldArr.length) : '',
        aantal_rk: rkArr.length > 0 ? String(rkArr.length) : '',
        sectionaaldeuren_json: sdArr.length > 0 ? JSON.stringify(sdArr) : '',
        loopdeur_beschrijving: ldDesc,
        raamkozijn_beschrijving: rkDesc,
        goten: gootNaam,
        tussenwand: (Number(o.tussenwand_lengte) > 0 || Number(o.tussenwand_breedte) > 0) ? o.tussenwand_lengte + ' × ' + o.tussenwand_breedte + ' mm' : 'Nee',
        verdiepingsvloer: o.verdiepingsvloer ? 'Ja' + (Number(o.verdiepingsvloer_m2) > 0 ? ' (' + o.verdiepingsvloer_m2 + ' m²)' : '') : '',
        lichtpanelen: o.lichtplaten_dak ? (Number(o.lichtplaten_dak_aantal) > 0 ? String(o.lichtplaten_dak_aantal) : 'Ja') : '',
        anti_condens_vilt: o.anti_condens_vilt ? 'Ja' : '',
        brandwerendheid_dak: o.brandwerendheid_erfgrens || (o.brandwerendheid_dak ? 'Ja' : ''),
        brandwerendheid_wand: o.brandwerendheid_toepassen || (o.brandwerendheid_wand ? 'Ja' : ''),
        brandwerendheid_zijdes: (function(z) { if (!z) return ''; var parts = []; if(z.a) parts.push('Voorzijde'); if(z.b) parts.push('Links'); if(z.c) parts.push('Rechts'); if(z.d) parts.push('Achter'); return parts.join(', '); })(o.brandwerendheid_zijdes),
        sectionaaldeur_keuze: o.sectionaaldeur_keuze || (sdArr.length > 0 ? 'ja' : ''),
        sectionaaldeur_zelf_leveren: o.sectionaaldeur_zelf_leveren ? 'Ja' : '',
        loopdeur_keuze: o.loopdeur_keuze || (ldArr.length > 0 ? 'ja' : ''),
        loopdeur_zelf_leveren: o.loopdeur_zelf_leveren ? 'Ja' : '',
        raamkozijn_keuze: o.raamkozijn_keuze || (rkArr.length > 0 ? 'ja' : ''),
        raamkozijn_zelf_leveren: o.raamkozijn_zelf_leveren ? 'Ja' : '',
        opmerking: o.opmerkingen || '',
        beoogde_start_bouw: o.beoogde_start_bouw || '',
        datum_aanvraag: o.created_at ? o.created_at.slice(0,10) : new Date().toISOString().slice(0,10),
        intake_bijlage: o.uploaded_file || null,
      };

      // SD platte velden (sd1_breedte etc.)
      sdArr.forEach(function(sd, idx) {
        var n = idx + 1;
        if (n <= 4) {
          mapped['sd'+n+'_breedte'] = sd.breedte ? String(sd.breedte) : '';
          mapped['sd'+n+'_hoogte'] = sd.hoogte ? String(sd.hoogte) : '';
          mapped['sd'+n+'_beslag'] = sd.beslag || sd.beslagType || '';
          mapped['sd'+n+'_zijde'] = sd.zijde || '';
          mapped['sd'+n+'_bediening'] = sd.bediening || '';
        }
      });

      if (existing) {
        // Update alleen lege velden (niet overschrijven), maar intake_bijlage altijd
        var didUpdate = false;
        Object.keys(mapped).forEach(function(key) {
          var val = mapped[key];
          if (key === 'intake_bijlage') {
            // Bijlage altijd overschrijven zodat bestaande leads hun bijlage alsnog krijgen
            if (val !== existing[key]) { existing[key] = val; didUpdate = true; }
          } else if (val && (!existing[key] || existing[key] === '' || existing[key] === '—')) {
            existing[key] = val;
            didUpdate = true;
          }
        });
        if (didUpdate) {
          existing.laatst_gewijzigd = new Date().toISOString();
          existing.lead_score = DB.berekenLeadScore(existing);
          updated++;
        } else {
          skipped++;
        }
      } else {
        // Nieuwe lead aanmaken
        var lead = Object.assign({
          id: DB.genId(),
          status: 'standaard',
          prioriteit: 'medium',
          beslisdatum: '',
          lead_score: 0,
          gewonnen: 'nee',
          verloren: 'nee',
          verliesreden: '',
          datum_beslissing: '',
          offertebedrag: '',
          scoringskans: 0,
          totaal_incl: '',
          prijs_per_m2: '',
          levertijd_weken: '',
          transport_inbegrepen: '',
          referentie: '',
          gemeente: '',
          oppervlakte_m2: '',
          sd1_breedte:'', sd1_hoogte:'', sd1_beslag:'',
          sd2_breedte:'', sd2_hoogte:'', sd2_beslag:'',
          sd3_breedte:'', sd3_hoogte:'', sd3_beslag:'',
          offerte_datum_2:'', offerte_datum_3:'', offerte_datum_4:'', aantal_versies:'',
          notities: [],
          taken: [],
          aangemaakt: new Date().toISOString(),
          laatst_gewijzigd: new Date().toISOString(),
        }, mapped);

        // Auto-bereken beslisdatum
        if (lead.beoogde_start_bouw && !lead.beslisdatum) {
          var d = new Date(lead.beoogde_start_bouw);
          d.setMonth(d.getMonth() - 2);
          lead.beslisdatum = d.toISOString().slice(0,10);
        }
        lead.lead_score = DB.berekenLeadScore(lead);
        DB.leads.push(lead);
        added++;
      }
    });

    DB.save();
    DB.lastIntakeSync = new Date().toISOString();
    localStorage.setItem('optistaal_crm_last_intake_sync', DB.lastIntakeSync);
    var msg = '';
    if (added > 0) msg += added + ' nieuwe leads toegevoegd. ';
    if (updated > 0) msg += updated + ' bestaande leads bijgewerkt. ';
    if (skipped > 0) msg += skipped + ' ongewijzigd overgeslagen.';
    if (!silent) {
      toast(msg || 'Geen nieuwe data', added > 0 ? 'success' : 'info');
      try { renderImportExport(); } catch(e) {}
    } else if (added > 0 || updated > 0) {
      // Stille sync: alleen toast als er daadwerkelijk iets nieuws is
      toast('Intake-sync: ' + msg, 'success');
      try { if (typeof renderPage === 'function') renderPage(); } catch(e) {}
    }
    console.log('[Intake] sync:', { totaal: intakes.length, nieuw: added, bijgewerkt: updated, overgeslagen: skipped, methode: silent ? 'silent' : 'manueel' });
  } catch(err) {
    if (!silent) toast('Import fout: ' + err.message, 'error');
    console.error('Intake import error:', err);
  } finally {
    if (btn && !silent) { btn.disabled = false; btn.textContent = 'Intakes ophalen'; }
  }
}

function deduplicateLeads() {
  // Groepeer leads op referentie (uniek offerte-nummer)
  const refMap = {};
  const noRef = [];
  DB.leads.forEach(l => {
    const ref = (l.referentie || '').trim();
    if (ref) {
      if (!refMap[ref]) refMap[ref] = [];
      refMap[ref].push(l);
    } else {
      noRef.push(l);
    }
  });

  let merged = 0;
  const keepLeads = [];

  // Per referentie: houd 1 lead, merge notities/taken van duplicaten
  Object.keys(refMap).forEach(ref => {
    const dupes = refMap[ref];
    if (dupes.length === 1) { keepLeads.push(dupes[0]); return; }

    // Kies de lead met de meeste data (langste laatst_gewijzigd of meeste notities)
    dupes.sort((a, b) => {
      const na = (a.notities||[]).length + (a.taken||[]).length;
      const nb = (b.notities||[]).length + (b.taken||[]).length;
      if (nb !== na) return nb - na;
      return (b.laatst_gewijzigd||'').localeCompare(a.laatst_gewijzigd||'');
    });

    const keep = dupes[0];

    // Merge notities en taken van duplicaten
    for (let i = 1; i < dupes.length; i++) {
      const d = dupes[i];
      (d.notities||[]).forEach(n => {
        if (!(keep.notities||[]).some(kn => kn.datum === n.datum && kn.inhoud === n.inhoud)) {
          if (!keep.notities) keep.notities = [];
          keep.notities.push(n);
        }
      });
      (d.taken||[]).forEach(t => {
        if (!(keep.taken||[]).some(kt => kt.titel === t.titel && kt.deadline === t.deadline)) {
          if (!keep.taken) keep.taken = [];
          keep.taken.push(t);
        }
      });
      // Vul lege velden aan vanuit duplicaat
      Object.keys(d).forEach(key => {
        if (['id','notities','taken','aangemaakt','laatst_gewijzigd'].includes(key)) return;
        if (!keep[key] && d[key]) keep[key] = d[key];
      });
      merged++;
    }

    keep.lead_score = DB.berekenLeadScore(keep);
    keep.laatst_gewijzigd = new Date().toISOString();
    keepLeads.push(keep);
  });

  // Deduplicatie op klantnaam voor leads zonder referentie
  const naamMap = {};
  noRef.forEach(l => {
    const naam = (l.naam || '').trim().toLowerCase();
    if (!naam) { keepLeads.push(l); return; }
    if (!naamMap[naam]) naamMap[naam] = [];
    naamMap[naam].push(l);
  });

  Object.keys(naamMap).forEach(naam => {
    const dupes = naamMap[naam];
    if (dupes.length === 1) { keepLeads.push(dupes[0]); return; }

    dupes.sort((a, b) => {
      const na = (a.notities||[]).length + (a.taken||[]).length;
      const nb = (b.notities||[]).length + (b.taken||[]).length;
      if (nb !== na) return nb - na;
      return (b.laatst_gewijzigd||'').localeCompare(a.laatst_gewijzigd||'');
    });

    const keep = dupes[0];
    for (let i = 1; i < dupes.length; i++) {
      const d = dupes[i];
      (d.notities||[]).forEach(n => {
        if (!(keep.notities||[]).some(kn => kn.datum === n.datum && kn.inhoud === n.inhoud)) {
          if (!keep.notities) keep.notities = [];
          keep.notities.push(n);
        }
      });
      (d.taken||[]).forEach(t => {
        if (!(keep.taken||[]).some(kt => kt.titel === t.titel && kt.deadline === t.deadline)) {
          if (!keep.taken) keep.taken = [];
          keep.taken.push(t);
        }
      });
      Object.keys(d).forEach(key => {
        if (['id','notities','taken','aangemaakt','laatst_gewijzigd'].includes(key)) return;
        if (!keep[key] && d[key]) keep[key] = d[key];
      });
      merged++;
    }
    keep.lead_score = DB.berekenLeadScore(keep);
    keepLeads.push(keep);
  });

  DB.leads = keepLeads;
  DB.save();
  toast(merged > 0 ? merged + ' duplicaten samengevoegd' : 'Geen duplicaten gevonden', merged > 0 ? 'success' : 'info');
  renderPage();
}

let dbChanges = {};
let dbSort = 'naam';
let dbSortDir = 'asc';
let dbSearch = '';
let dbStatusFilter = '';
let dbEditCell = null;

const DB_VALIDATORS = {
  text: v => null,
  email: v => { if(!v) return null; return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)?null:'Ongeldig email (naam@domein.nl)'; },
  tel: v => { if(!v) return null; return /^[\d\s\-\+\(\)\.]+$/.test(v)?null:'Alleen cijfers, +, - en spaties'; },
  pc: v => { if(!v) return null; return (/^\d{4}\s?[A-Za-z]{2}$/.test(v)||/^\d{4}$/.test(v))?null:'Formaat: 1234AB of 1234'; },
  pct: v => { if(!v&&v!==0) return null; const n=parseFloat(v); if(isNaN(n)) return 'Moet een getal zijn'; if(n<0||n>100) return '0-100'; return null; },
  int: v => { if(!v&&v!==0) return null; return /^\-?\d*$/.test(String(v).trim())?null:'Geheel getal verwacht'; },
  bedrag: v => { if(!v) return null; return /^[\d€\s.,\-]+$/.test(v)?null:'Ongeldig bedrag'; },
  datum: v => { if(!v) return null; return (/^\d{2}[\-\/]\d{2}[\-\/]\d{4}$/.test(v)||/^\d{4}[\-\/]\d{2}[\-\/]\d{2}/.test(v))?null:'Formaat: dd-mm-jjjj'; },
  status: v => null, prio: v => null, jn: v => null,
};

function dbGetVal(lead, col) {
  if (dbChanges[lead.id] && dbChanges[lead.id][col.key] !== undefined) return dbChanges[lead.id][col.key];
  return lead[col.key] || '';
}

function renderDatabase() {
  const changeCount = Object.keys(dbChanges).length;
  const changedFields = Object.values(dbChanges).reduce((s,c) => s+Object.keys(c).length, 0);
  document.getElementById('topbar').innerHTML = `
    <div class="topbar-left"><h2>Database</h2></div>
    <div class="topbar-right" style="display:flex;align-items:center;gap:8px">
      <input class="search-input" style="width:180px;padding:5px 10px" placeholder="Zoeken..." value="${esc(dbSearch)}" oninput="dbSearch=this.value;renderDbGrid()">
      <select class="filter-select" onchange="dbStatusFilter=this.value;renderDbGrid()">
        <option value="">Alle statussen</option>
        ${DB.settings.statussen.map(s=>'<option value="'+s.id+'" '+(dbStatusFilter===s.id?'selected':'')+'>'+s.label+'</option>').join('')}
        <option value="opdracht" ${dbStatusFilter==='opdracht'?'selected':''}>Opdracht</option>
        <option value="offerte_verstuurd" ${dbStatusFilter==='offerte_verstuurd'?'selected':''}>Offerte verstuurd</option>
      </select>
      <span style="font-size:11px;color:var(--beton)" id="dbStats"></span>
      ${changeCount > 0 ? '<button class="btn btn-primary btn-sm" onclick="dbSaveChanges()">Opslaan ('+changedFields+' wijzigingen)</button><button class="btn btn-outline btn-sm" onclick="dbDiscardChanges()">Annuleren</button>' : ''}
    </div>`;
  document.getElementById('content').innerHTML = '<div class="db-grid-wrap"><table class="db-grid"><thead id="dbHead"></thead><tbody id="dbBody"></tbody></table></div>';
  renderDbGrid();
}

function renderDbGrid() {
  let list = [...DB.leads];
  if (dbStatusFilter) list = list.filter(l => l.status === dbStatusFilter);
  if (dbSearch) { const q = dbSearch.toLowerCase(); list = list.filter(l => [l.naam,l.email,l.telefoon,l.plaats,l.referentie,l.ordernummer].join(' ').toLowerCase().includes(q)); }
  list.sort((a,b) => {
    let va = a[dbSort]||'', vb = b[dbSort]||'';
    const col = DB_COLS.find(c=>c.key===dbSort);
    if (col && (col.type==='pct'||col.type==='int'||col.type==='bedrag')) { va=parseFloat(String(va).replace(/[^\d.\-]/g,''))||0; vb=parseFloat(String(vb).replace(/[^\d.\-]/g,''))||0; }
    else { va=String(va).toLowerCase(); vb=String(vb).toLowerCase(); }
    if(va<vb) return dbSortDir==='asc'?-1:1; if(va>vb) return dbSortDir==='asc'?1:-1; return 0;
  });

  // Header
  let hh = '<tr><th>#</th>';
  DB_COLS.forEach(col => {
    const s = dbSort===col.key?'db-sorted':'';
    const a = dbSort===col.key?(dbSortDir==='asc'?' ▲':' ▼'):'';
    hh += '<th class="'+s+'" onclick="dbToggleSort(\''+col.key+'\')">'+col.label+a+'</th>';
  });
  document.getElementById('dbHead').innerHTML = hh+'</tr>';

  // Body
  let bh = '';
  list.forEach((lead,idx) => {
    const mod = dbChanges[lead.id]?'db-modified':'';
    bh += '<tr class="'+mod+'" data-id="'+lead.id+'"><td>'+(idx+1)+'</td>';
    DB_COLS.forEach(col => {
      const val = dbGetVal(lead, col);
      const changed = (dbChanges[lead.id]&&dbChanges[lead.id][col.key]!==undefined)?'db-changed':'';
      const cls = col.ro?'':'db-edit';
      if (col.type==='status') {
        const allSt = [...DB.settings.statussen, {id:'opdracht',label:'Opdracht',kleur:'#2D8659'},{id:'offerte_verstuurd',label:'Offerte verstuurd',kleur:'#3498DB'}];
        const si = allSt.find(s=>s.id===val);
        const k = si?si.kleur:'#8B8B83';
        bh += '<td class="'+cls+' '+changed+'" data-f="'+col.key+'" onclick="dbStartEdit(this,\''+lead.id+'\',\''+col.key+'\')"><span class="status-badge" style="background:'+k+'22;color:'+k+'">'+(si?si.label:(val||'—'))+'</span></td>';
      } else {
        bh += '<td class="'+cls+' '+changed+'" data-f="'+col.key+'" onclick="dbStartEdit(this,\''+lead.id+'\',\''+col.key+'\')">'+esc(String(val||''))+'</td>';
      }
    });
    bh += '</tr>';
  });
  document.getElementById('dbBody').innerHTML = bh || '<tr><td colspan="'+(DB_COLS.length+1)+'" style="padding:40px;text-align:center;color:var(--beton)">Geen resultaten</td></tr>';
  document.getElementById('dbStats').textContent = list.length + ' van ' + DB.leads.length + ' leads';
}

function dbToggleSort(col) {
  if(dbSort===col) dbSortDir=dbSortDir==='asc'?'desc':'asc'; else { dbSort=col; dbSortDir='asc'; }
  renderDbGrid();
}

function dbStartEdit(td, leadId, field) {
  const col = DB_COLS.find(c=>c.key===field);
  if(!col||col.ro) return;
  if(td.classList.contains('db-editing')) return;
  dbCloseEdit();
  const lead = DB.leads.find(l=>l.id===leadId);
  if(!lead) return;
  const cur = dbGetVal(lead, col);
  td.classList.add('db-editing');
  dbEditCell = { td, leadId, field, orig: lead[field]||'' };

  if(col.type==='status') {
    const allSt = [...DB.settings.statussen, {id:'opdracht',label:'Opdracht'},{id:'offerte_verstuurd',label:'Offerte verstuurd'}];
    td.innerHTML = '<select onchange="dbCommit(this.value)" onblur="dbCloseEdit()" onkeydown="if(event.key===\'Escape\')dbCloseEdit()">'+allSt.map(s=>'<option value="'+s.id+'" '+(cur===s.id?'selected':'')+'>'+s.label+'</option>').join('')+'</select>';
    td.querySelector('select').focus();
  } else if(col.type==='prio') {
    td.innerHTML = '<select onchange="dbCommit(this.value)" onblur="dbCloseEdit()" onkeydown="if(event.key===\'Escape\')dbCloseEdit()"><option value="low" '+(cur==='low'?'selected':'')+'>Low</option><option value="medium" '+(cur==='medium'?'selected':'')+'>Medium</option><option value="high" '+(cur==='high'?'selected':'')+'>High</option></select>';
    td.querySelector('select').focus();
  } else if(col.type==='jn') {
    td.innerHTML = '<select onchange="dbCommit(this.value)" onblur="dbCloseEdit()" onkeydown="if(event.key===\'Escape\')dbCloseEdit()"><option value="">—</option><option value="ja" '+(cur==='ja'?'selected':'')+'>Ja</option><option value="nee" '+(cur==='nee'?'selected':'')+'>Nee</option></select>';
    td.querySelector('select').focus();
  } else {
    td.innerHTML = '<input type="text" value="'+esc(String(cur))+'" onblur="dbCommit(this.value)" onkeydown="if(event.key===\'Enter\')dbCommit(this.value);if(event.key===\'Escape\')dbCloseEdit()">';
    const inp=td.querySelector('input'); inp.focus(); inp.select();
  }
}

function dbCommit(val) {
  if(!dbEditCell) return;
  const {td, leadId, field, orig} = dbEditCell;
  const col = DB_COLS.find(c=>c.key===field);
  const v = String(val).trim();

  // Validate
  const err = (DB_VALIDATORS[col.type]||DB_VALIDATORS.text)(v);
  if(err) { toast(err, 'warning'); const inp=td.querySelector('input'); if(inp){inp.style.borderColor='var(--danger)';inp.focus();} return; }

  if(v !== String(orig).trim()) {
    if(!dbChanges[leadId]) dbChanges[leadId]={};
    dbChanges[leadId][field]=v;
  } else {
    if(dbChanges[leadId]) { delete dbChanges[leadId][field]; if(!Object.keys(dbChanges[leadId]).length) delete dbChanges[leadId]; }
  }
  dbCloseEdit();
  renderDatabase();
}

function dbCloseEdit() {
  if(!dbEditCell) return;
  dbEditCell.td.classList.remove('db-editing');
  dbEditCell=null;
}

function dbSaveChanges() {
  let count=0;
  for(const [id, flds] of Object.entries(dbChanges)) {
    const lead = DB.leads.find(l=>l.id===id);
    if(!lead) continue;
    for(const [f,v] of Object.entries(flds)) lead[f]=v;
    lead.lead_score = DB.berekenLeadScore(lead);
    lead.laatst_gewijzigd = new Date().toISOString();
    count++;
  }
  DB.save();
  dbChanges={};
  toast(count+' lead(s) opgeslagen','success');
  renderDatabase();
}

function dbDiscardChanges() {
  dbChanges={};
  toast('Wijzigingen ongedaan gemaakt','info');
  renderDatabase();
}

// Click outside to close editor
document.addEventListener('click', e => {
  if(dbEditCell && !e.target.closest('td.db-editing')) {
    const inp = dbEditCell.td.querySelector('input,select');
    if(inp) dbCommit(inp.value);
  }
});

async function kaartZoekAdres() {
  const q = document.getElementById('kaartZoek').value.trim();
  if (!q) return;
  const box = document.getElementById('kaartSuggesties');
  box.innerHTML = '<p style="color:var(--beton)">Zoeken...</p>';
  try {
    const resp = await fetch('https://api.pdok.nl/bzk/locatieserver/search/v3_1/suggest?q=' + encodeURIComponent(q) + '&rows=8&wt=json');
    const data = await resp.json();
    const docs = data.response?.docs || [];
    if (!docs.length) { box.innerHTML = '<p style="color:var(--beton)">Geen resultaten</p>'; return; }
    box.innerHTML = docs.map(d =>
      `<div style="padding:6px 8px;cursor:pointer;border-bottom:1px solid var(--kalk);font-size:11px"
        onmouseover="this.style.background='var(--kalk)'" onmouseout="this.style.background=''"
        onclick="kaartSelectSuggestie('${d.id}')">${esc(d.weergavenaam)}</div>`
    ).join('');
  } catch(e) { box.innerHTML = '<p style="color:var(--danger)">Fout: '+e.message+'</p>'; }
}

async function kaartSelectSuggestie(id) {
  try {
    const resp = await fetch('https://api.pdok.nl/bzk/locatieserver/search/v3_1/lookup?id=' + encodeURIComponent(id) + '&wt=json');
    const data = await resp.json();
    const doc = data.response?.docs?.[0];
    if (!doc) return;
    // Parse centroide_ll (POINT(lng lat))
    const match = (doc.centroide_ll || '').match(/POINT\(([\d.]+)\s+([\d.]+)\)/);
    if (!match) { toast('Geen coördinaten gevonden','error'); return; }
    const lng = parseFloat(match[1]);
    const lat = parseFloat(match[2]);
    kaartMap.setView([lat, lng], 16);
    const marker = L.marker([lat, lng]).addTo(kaartMap);
    marker.bindPopup('<strong>' + esc(doc.weergavenaam) + '</strong>').openPopup();
    kaartMarkers.push(marker);
  } catch(e) { toast('Lookup fout: '+e.message,'error'); }
}

async function kaartGeocodeer(adresTekst) {
  // Cache check
  const key = adresTekst.toLowerCase().trim();
  if (kaartLeadCache[key]) return kaartLeadCache[key];
  try {
    const resp = await fetch('https://api.pdok.nl/bzk/locatieserver/search/v3_1/suggest?q=' + encodeURIComponent(adresTekst) + '&rows=1&wt=json');
    const data = await resp.json();
    const doc = data.response?.docs?.[0];
    if (!doc?.id) return null;
    const resp2 = await fetch('https://api.pdok.nl/bzk/locatieserver/search/v3_1/lookup?id=' + encodeURIComponent(doc.id) + '&wt=json');
    const data2 = await resp2.json();
    const d2 = data2.response?.docs?.[0];
    if (!d2) return null;
    const m = (d2.centroide_ll || '').match(/POINT\(([\d.]+)\s+([\d.]+)\)/);
    if (!m) return null;
    const result = { lat: parseFloat(m[2]), lng: parseFloat(m[1]) };
    kaartLeadCache[key] = result;
    return result;
  } catch(e) { return null; }
}

async function kaartToonAlleLeads() {
  if (!kaartMap) { toast('Kaart niet geladen','error'); return; }
  // Verwijder bestaande markers
  kaartMarkers.forEach(m => kaartMap.removeLayer(m));
  kaartMarkers = [];

  const leadsMetAdres = DB.leads.filter(l => {
    return (l.postcode && l.plaats) || (l.adres && l.plaats) || l.geo_locatie;
  });

  if (!leadsMetAdres.length) { toast('Geen leads met adresgegevens','info'); return; }

  const listEl = document.getElementById('kaartLeadsList');
  listEl.innerHTML = '<p style="color:var(--beton)">Geocoderen... 0/' + leadsMetAdres.length + '</p>';

  let geplaatst = 0;
  const bounds = [];

  for (let i = 0; i < leadsMetAdres.length; i++) {
    const l = leadsMetAdres[i];
    let coords = null;

    // Eerst geo_locatie proberen als die al lat/lng bevat
    if (l.geo_locatie && l.geo_locatie.includes(',')) {
      const parts = l.geo_locatie.split(',').map(p => parseFloat(p.trim()));
      if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
        coords = { lat: parts[0], lng: parts[1] };
      }
    }

    // Anders geocoderen via PDOK
    if (!coords) {
      let zoekTekst = '';
      if (l.postcode && l.plaats) zoekTekst = (l.adres || '') + ' ' + l.postcode + ' ' + l.plaats;
      else if (l.adres && l.plaats) zoekTekst = l.adres + ' ' + l.plaats;
      else zoekTekst = l.postcode || l.plaats || '';
      if (zoekTekst.trim()) coords = await kaartGeocodeer(zoekTekst);
    }

    if (coords) {
      const statusInfo = DB.getStatusInfo(l.status);
      const scoreVal = l.lead_score || 0;
      const marker = L.circleMarker([coords.lat, coords.lng], {
        radius: Math.max(6, Math.min(14, scoreVal / 8)),
        fillColor: statusInfo.kleur,
        color: '#fff',
        weight: 2,
        fillOpacity: 0.8,
      }).addTo(kaartMap);

      marker.bindPopup(`
        <div style="font-family:Montserrat,sans-serif;min-width:180px">
          <strong style="font-size:13px;color:#2A4A5E">${esc(l.naam)}</strong><br>
          <span style="font-size:11px;color:#8B8B83">${esc(l.adres || '')} ${esc(l.postcode || '')} ${esc(l.plaats || '')}</span><br>
          <span style="display:inline-block;margin-top:4px;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;background:${statusInfo.kleur}20;color:${statusInfo.kleur}">${esc(statusInfo.label)}</span>
          ${l.offertebedrag ? '<br><span style="font-size:11px;font-weight:600;margin-top:2px;display:inline-block">&euro; '+esc(String(l.offertebedrag))+'</span>' : ''}
          <br><a href="#" onclick="event.preventDefault();openLead('${l.id}')" style="font-size:11px;color:#2A4A5E;font-weight:600">Bekijk lead &rarr;</a>
        </div>
      `);
      kaartMarkers.push(marker);
      bounds.push([coords.lat, coords.lng]);
      geplaatst++;
    }

    // Update teller elke 5 leads
    if (i % 5 === 0) {
      listEl.innerHTML = '<p style="color:var(--beton)">Geocoderen... ' + (i+1) + '/' + leadsMetAdres.length + '</p>';
      await new Promise(r => setTimeout(r, 50)); // UI laten bijwerken
    }
  }

  // Zoom naar alle markers
  if (bounds.length > 1) {
    kaartMap.fitBounds(bounds, { padding: [30, 30] });
  } else if (bounds.length === 1) {
    kaartMap.setView(bounds[0], 14);
  }

  // Toon lijst
  const gevondenLeads = DB.leads.filter(l => {
    const adres = ((l.adres||'') + ' ' + (l.postcode||'') + ' ' + (l.plaats||'')).trim();
    return kaartLeadCache[adres.toLowerCase()] || (l.geo_locatie && l.geo_locatie.includes(','));
  });

  listEl.innerHTML = '<p style="font-weight:600;margin-bottom:8px;color:var(--petrol)">' + geplaatst + ' van ' + leadsMetAdres.length + ' leads geplaatst</p>' +
    kaartMarkers.map((m, i) => {
      const lead = leadsMetAdres[i];
      if (!lead) return '';
      const si = DB.getStatusInfo(lead.status);
      return '<div style="padding:4px 0;border-bottom:1px solid var(--kalk);cursor:pointer" onclick="openLead(\''+lead.id+'\')">' +
        '<span style="font-weight:600;color:var(--petrol)">' + esc(lead.naam) + '</span><br>' +
        '<span style="font-size:10px;color:var(--beton)">' + esc(lead.plaats||'') + '</span> ' +
        '<span style="font-size:9px;padding:1px 5px;border-radius:6px;background:'+si.kleur+'20;color:'+si.kleur+'">' + esc(si.label) + '</span></div>';
    }).join('');
}

function exporteerInstellingenJSON() {
  try {
    const payload = {
      _meta: {
        bron: 'Optistaal OpticRM',
        export_datum: new Date().toISOString(),
        export_versie: 1,
        bevat_api_keys: false
      },
      settings: {
        statussen: DB.settings.statussen,
        taakTypes: DB.settings.taakTypes,
        auteurs: DB.settings.auteurs,
        notitieTypes: DB.settings.notitieTypes,
        leadScoreGewichten: DB.settings.leadScoreGewichten,
        snelnotities: DB.settings.snelnotities,
        offerteToelichting: DB.settings.offerteToelichting,
        afsluitmail: DB.settings.afsluitmail
      }
    };
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'opticrm-instellingen-' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
    toast('Instellingen geëxporteerd','success');
  } catch (e) {
    toast('Export mislukt: ' + e.message, 'error');
    console.error('Export fout:', e);
  }
}

async function importeerInstellingenJSON(event) {
  const file = event.target.files && event.target.files[0];
  event.target.value = '';
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data || !data.settings || typeof data.settings !== 'object') {
      toast('Onverwacht JSON-format (geen settings-veld)','error');
      return;
    }
    const s = data.settings;
    const aantal = {
      statussen: (s.statussen || []).length,
      taakTypes: (s.taakTypes || []).length,
      auteurs: (s.auteurs || []).length,
      notitieTypes: (s.notitieTypes || []).length
    };
    const bevestig = confirm(
      'Instellingen importeren?\n\n' +
      'Het bestand bevat:\n' +
      '• ' + aantal.statussen + ' statussen\n' +
      '• ' + aantal.taakTypes + ' taaktypes\n' +
      '• ' + aantal.auteurs + ' auteurs\n' +
      '• ' + aantal.notitieTypes + ' notitietypes\n\n' +
      'Je huidige instellingen worden VERVANGEN. Voor de zekerheid wordt eerst een snapshot gemaakt waarmee je dit kunt terugdraaien.\n\n' +
      'Doorgaan?'
    );
    if (!bevestig) return;

    // Snapshot vóór wijziging (als snapshot-systeem beschikbaar is)
    if (typeof maakSnapshot === 'function') {
      try { await maakSnapshot('Voor import instellingen'); } catch(e) { console.warn('Snapshot mislukt:', e); }
    }

    // Apply (alleen velden die in JSON staan, rest behoud)
    if (Array.isArray(s.statussen)) DB.settings.statussen = s.statussen;
    if (Array.isArray(s.taakTypes)) DB.settings.taakTypes = s.taakTypes;
    if (Array.isArray(s.auteurs)) DB.settings.auteurs = s.auteurs;
    if (Array.isArray(s.notitieTypes)) DB.settings.notitieTypes = s.notitieTypes;
    if (s.leadScoreGewichten && typeof s.leadScoreGewichten === 'object') DB.settings.leadScoreGewichten = s.leadScoreGewichten;
    if (Array.isArray(s.snelnotities)) DB.settings.snelnotities = s.snelnotities;
    if (s.offerteToelichting && typeof s.offerteToelichting === 'object') DB.settings.offerteToelichting = s.offerteToelichting;
    if (s.afsluitmail && typeof s.afsluitmail === 'object') DB.settings.afsluitmail = s.afsluitmail;

    await DB.save();
    toast('Instellingen geïmporteerd','success');
    renderInstellingen();
  } catch (e) {
    toast('Import mislukt: ' + e.message, 'error');
    console.error('Import fout:', e);
  }
}

  if (lastBackup === today) return; // Al gedaan vandaag
  if (DB.leads.length === 0) return; // Geen data

    exportCSV();

  } catch(e) { console.error('Backup fout:', e); }
}

function exportFullBackup() {

  // Bij restore: keys moeten handmatig opnieuw worden ingevoerd in Instellingen.
  const backup = {
    version: 'optistaal-crm-backup-v2',
    datum: new Date().toISOString(),
    bevat_api_keys: false,
    leads: DB.leads,
    emailHistory: DB.emailHistory,
    gcalEvents: DB.gcalEvents || [],
    settings: DB.settings,
    lastMixmaxSync: DB.lastMixmaxSync,
    lastGmailSync: DB.lastGmailSync
  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'CRM backup ' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  DB.lastBackupDate = new Date().toLocaleString('nl-NL', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  localStorage.setItem('optistaal_crm_last_backup_date', DB.lastBackupDate);
  toast('Volledige backup geëxporteerd (zonder API-keys)', 'success');
}

function importFullBackup(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.version || !backup.version.startsWith('optistaal-crm-backup')) {
        toast('Dit is geen geldig CRM backup bestand', 'error'); return;
      }
      openModal('Backup herstellen', `
        <p style="font-size:13px;margin-bottom:10px">Backup van: <strong>${new Date(backup.datum).toLocaleString('nl-NL')}</strong></p>
        <p style="font-size:12px;color:var(--beton);margin-bottom:6px">${backup.leads ? backup.leads.length : 0} leads, ${backup.emailHistory ? backup.emailHistory.length : 0} emails, ${backup.gcalEvents ? backup.gcalEvents.length : 0} agenda-items</p>
        <p style="font-size:12px;color:var(--danger);font-weight:600;margin-top:12px">Let op: dit vervangt ALLE huidige data in de CRM!</p>
      `, '<button class="btn btn-outline" onclick="closeModal()">Annuleren</button><button class="btn btn-danger" onclick="doRestoreBackup()">Herstellen</button>');
      window._pendingBackup = backup;
    } catch(err) {
      toast('Fout bij lezen backup: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function doRestoreBackup() {
  const backup = window._pendingBackup;
  if (!backup) return;
  DB.leads = backup.leads || [];
  DB.emailHistory = backup.emailHistory || [];
  DB.gcalEvents = backup.gcalEvents || [];
  DB.settings = backup.settings || DB.settings;
  // Sinds backup-v2 (1 juni 2026): API-keys worden NIET meer in backup opgeslagen.
  // Bij restore van oudere v1-backups worden eventuele keys nog wel overgenomen voor backwards compat.
  // Bij restore van v2-backup: bestaande lokale keys blijven intact.
  if (backup.version !== 'optistaal-crm-backup-v2') {
    if (backup.claudeApiKey) DB.claudeApiKey = backup.claudeApiKey;
    if (backup.mixmaxApiKey) DB.mixmaxApiKey = backup.mixmaxApiKey;
    if (backup.gmailSyncUrl) DB.gmailSyncUrl = backup.gmailSyncUrl;
  }
  DB.lastMixmaxSync = backup.lastMixmaxSync || null;
  DB.lastGmailSync = backup.lastGmailSync || null;
  DB.save();
  delete window._pendingBackup;
  closeModal();
  toast('Backup hersteld! ' + DB.leads.length + ' leads geladen.', 'success');
  renderSidebar();
  renderDashboard();
}

// Check backup aan het einde van de dag (na 17:00) of bij eerste sessie
function scheduleBackupCheck() {
  const now = new Date();
  if (now.getHours() >= 17) checkDailyBackup();
  // Check elk uur
  setInterval(() => { const h = new Date().getHours(); if (h >= 17 && h < 20) checkDailyBackup(); }, 3600000);
}

// ================================================================
function migreerBestaandeLeads() {
  let gewijzigd = 0;
  const gewijzigdeLeads = [];
  for (const lead of DB.leads) {
    let changed = false;
    // 1. Auto-bereken beslisdatum als beoogde_start_bouw gevuld is maar beslisdatum niet
    if (lead.beoogde_start_bouw && !lead.beslisdatum) {
      const d = new Date(lead.beoogde_start_bouw);
      if (!isNaN(d)) {
        d.setMonth(d.getMonth() - 2);
        lead.beslisdatum = d.toISOString().slice(0,10);
        changed = true;
      }
    }
    // 2. Fix lead_score als die undefined/NaN is
    if (lead.lead_score === undefined || lead.lead_score === null || isNaN(lead.lead_score)) {
      lead.lead_score = DB.berekenLeadScore(lead);
      changed = true;
    }
    // 3. Zet datum_aanvraag als die ontbreekt (gebruik aangemaakt-datum als fallback)
    if (!lead.datum_aanvraag && lead.aangemaakt) {
      lead.datum_aanvraag = new Date(lead.aangemaakt).toISOString().slice(0,10);
      changed = true;
    }
    // 4. Zorg dat prioriteit altijd een waarde heeft
    if (!lead.prioriteit) {
      lead.prioriteit = 'medium';
      changed = true;
    }
    // 5. Defensieve init van alle array-velden — voorkomt 'undefined.push' bugs
    //    op nieuwe leads die ze nog niet hadden. (22 mei 2026)
    const arrayVelden = ['notities','taken','afspraken','followup_mails','offerte_versturingen','offerte_engagement'];
    for (const veld of arrayVelden) {
      if (!Array.isArray(lead[veld])) { lead[veld] = []; changed = true; }
    }
    if (changed) {
      gewijzigd++;
      gewijzigdeLeads.push(lead);
    }
  }
  if (gewijzigd > 0) {
    DB.save();
    console.log(`Migratie: ${gewijzigd} leads bijgewerkt (beslisdatum, lead_score, datum_aanvraag, prioriteit)`);
    // V23.1 — sync cleanup-wijzigingen ook naar Supabase, anders loopt dezelfde
    // migratie elke pagina-load opnieuw (Supabase blijft achter, IndexedDB is bij)
    if (window.sbHelpers) {
      gewijzigdeLeads.forEach(l => window.sbHelpers.upsertLead(l));
    }
  }
}

// ================================================================
// MULTI-TAB SYNC LOCK (22 mei 2026)
// ================================================================
// Voorkomt dat meerdere CRM-tabbladen tegelijk een sync uitvoeren en daarbij
// elkaars wijzigingen overschrijven in IndexedDB. Werkwijze:
//   1) Vraag een exclusieve Web Lock 'crm-sync' aan (cross-tab geldig)
//   2) Herlaad in-memory leads/emails uit IndexedDB om stale state in
//      andere tabs te verversen vóór we gaan muteren
//   3) Voer de sync-functie uit (kan zelf DB.save aanroepen — die heeft een
//      aparte 'crm-db-save' lock voor serialisatie van het schrijven)
//
// ifAvailable=true → als een ander tabblad al sync doet, sla deze run over
// (alleen voor silent achtergrond-syncs; expliciete user-syncs blijven wachten).
async function withSyncLock(fn, opts) {
  const ifAvailable = opts && opts.ifAvailable;
  if (typeof navigator === 'undefined' || !navigator.locks || !navigator.locks.request) {
    return await fn();
  }
  return await navigator.locks.request('crm-sync',
    { mode: 'exclusive', ifAvailable: !!ifAvailable },
    async (lock) => {
      if (ifAvailable && !lock) {
        console.log('[sync-lock] andere tab is bezig met sync, overgeslagen');
        return null;
      }
      // V23.1 — Refresh in-memory state uit SUPABASE ipv IndexedDB.
      // Sinds 1 juni 2026 is Supabase de bron van waarheid. IndexedDB is alleen
      // een lokale cache. Refresh-from-IndexedDB miste Supabase-only notities
      // (bv. SHOMI-verslagen die door scheduled task in Supabase belanden, niet
      // in IndexedDB) — die verdwenen tijdelijk uit DB.leads na elke sync.
      try {
        if (typeof DB.loadFromSupabase === 'function') {
          const sb = await DB.loadFromSupabase();
          if (sb && sb.leads && sb.leads.length > 0) {
            DB.leads = sb.leads;
            if (Array.isArray(sb.emails)) DB.emailHistory = sb.emails;
          }
        } else {
          // Fallback: IndexedDB (oude gedrag)
          const freshLeads = await IDB.get('leads');
          if (Array.isArray(freshLeads) && freshLeads.length > 0) DB.leads = freshLeads;
          const freshEm = await IDB.get('emails');
          if (Array.isArray(freshEm)) DB.emailHistory = freshEm;
        }
      } catch (e) { console.warn('[sync-lock] refresh:', e); }
      return await fn();
    }
  );
}
